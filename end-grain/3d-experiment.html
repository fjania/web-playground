<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>End Grain — 3D Experiment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1c1917; overflow: hidden; font-family: 'Geist Mono', monospace; }
  #info {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    color: #a8a29e; font-size: 10px; line-height: 1.5;
    pointer-events: none; user-select: none;
  }
  #info strong { color: #e4cc8f; }
  .step-label {
    position: fixed; z-index: 10; pointer-events: none; user-select: none;
    color: #b45309; font-size: 9px; letter-spacing: 0.5px;
    background: rgba(28,25,23,0.8); padding: 3px 8px; border-radius: 3px;
  }
  .divider { position: fixed; background: #3d3835; z-index: 5; }
  #statusbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    height: 28px; display: flex; align-items: center; gap: 16px;
    padding: 0 12px;
    background: rgba(28,25,23,0.92); border-top: 1px solid #3d3835;
    font-size: 10px; color: #78716c;
  }
  #statusbar .label { color: #a8a29e; text-transform: uppercase; letter-spacing: 0.5px; }
  #statusbar .val { color: #e4cc8f; }
  #statusbar .dim { color: #555; }
  #controls {
    position: fixed; top: 10px; right: 10px; z-index: 10;
    background: rgba(28,25,23,0.92); border: 1px solid #3d3835;
    border-radius: 6px; padding: 12px 16px;
    color: #a8a29e; font-size: 10px;
  }
  #controls label { display: block; margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  #controls input[type="range"] {
    width: 160px; accent-color: #b45309;
  }
  #controls .angle-val { color: #e4cc8f; font-weight: bold; }
</style>
</head>
<body>
<div id="info">
  <strong>End Grain — Cut + Combine</strong><br>
  left: diagonal cut &middot; right: joined
</div>
<div id="controls">
  <label>cut angle: <span id="angle-val" class="angle-val">7°</span></label>
  <input type="range" id="angle-slider" min="-45" max="45" step="1" value="7">
</div>
<div id="statusbar"><span class="dim">hover a piece to inspect</span></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Brush, Evaluator, SUBTRACTION, INTERSECTION, ADDITION } from 'three-bvh-csg';

// ─── Renderer ──────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// ─── Scene ─────────────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1917);

scene.add((() => {
  const k = new THREE.DirectionalLight(0xfff5e6, 1.6);
  k.position.set(300, 400, 200); k.castShadow = true;
  k.shadow.mapSize.set(1024, 1024);
  k.shadow.camera.near = 50; k.shadow.camera.far = 1200;
  k.shadow.camera.left = -500; k.shadow.camera.right = 500;
  k.shadow.camera.top = 500; k.shadow.camera.bottom = -500;
  return k;
})());
scene.add(new THREE.DirectionalLight(0xc8d8e8, 0.8).translateX(-200).translateY(100).translateZ(-100));
scene.add(new THREE.DirectionalLight(0xd4c8b8, 0.7).translateY(-300));
scene.add(new THREE.DirectionalLight(0xb8c0c8, 0.4).translateX(-100).translateY(200).translateZ(-300));
scene.add(new THREE.AmbientLight(0x4a4440, 1.2));

// ─── Wood materials ────────────────────────────────────────────────

function makeEndGrainTex(base, ring) {
  const s = 256, c = document.createElement('canvas'); c.width = s; c.height = s;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, s, s);
  for (let i = 12; i >= 1; i--) {
    x.beginPath(); x.arc(s*.48, s*.52, (i/12)*s*.45, 0, Math.PI*2);
    x.strokeStyle = ring; x.lineWidth = 1.2; x.globalAlpha = .25+(i/12)*.15; x.stroke();
  }
  x.globalAlpha = 1;
  return new THREE.CanvasTexture(c);
}
function makeSideMat(base, grain) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 30; i++) {
    const px = Math.random()*256; x.beginPath(); x.moveTo(px, 0);
    for (let y = 0; y < 256; y += 10) x.lineTo(px+(Math.random()-.5)*4, y);
    x.strokeStyle = grain; x.lineWidth = .8+Math.random(); x.globalAlpha = .1+Math.random()*.15; x.stroke();
  }
  return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(c), roughness: 0.65 });
}
function makeWoodMats(base, ring, grain) {
  const e = new THREE.MeshStandardMaterial({ map: makeEndGrainTex(base, ring), roughness: 0.7 });
  const s = makeSideMat(base, grain);
  return [s, s, e, e, s, s];
}
const mapleMats = makeWoodMats('#e4cc8f', '#b5a06a', '#c4aa70');
const walnutMats = makeWoodMats('#3d2416', '#2a1a0e', '#4a2e1a');
const mapleCut = new THREE.MeshStandardMaterial({ color: 0xe4cc8f, roughness: 0.75 });
const walnutCut = new THREE.MeshStandardMaterial({ color: 0x3d2416, roughness: 0.75 });

// Map every material to a species name for status bar lookup
const matSpecies = new Map();
mapleMats.forEach(m => matSpecies.set(m, 'maple'));
walnutMats.forEach(m => matSpecies.set(m, 'walnut'));
matSpecies.set(mapleCut, 'maple');
matSpecies.set(walnutCut, 'walnut');

// ─── Geometry stats helpers ───────────────────────────────────────

// Signed volume of a triangle with vertices a, b, c (relative to origin)
function signedTriVol(a, b, c) {
  return a.dot(new THREE.Vector3().crossVectors(b, c)) / 6;
}

function meshVolume(geo) {
  const pos = geo.attributes.position;
  const idx = geo.index;
  if (!idx) return 0;
  let vol = 0;
  const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
  for (let i = 0; i < idx.count; i += 3) {
    a.fromBufferAttribute(pos, idx.getX(i));
    b.fromBufferAttribute(pos, idx.getX(i + 1));
    c.fromBufferAttribute(pos, idx.getX(i + 2));
    vol += signedTriVol(a, b, c);
  }
  return Math.abs(vol);
}

function meshSurfaceArea(geo) {
  const pos = geo.attributes.position;
  const idx = geo.index;
  if (!idx) return 0;
  let area = 0;
  const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
  const ab = new THREE.Vector3(), ac = new THREE.Vector3();
  for (let i = 0; i < idx.count; i += 3) {
    a.fromBufferAttribute(pos, idx.getX(i));
    b.fromBufferAttribute(pos, idx.getX(i + 1));
    c.fromBufferAttribute(pos, idx.getX(i + 2));
    ab.subVectors(b, a);
    ac.subVectors(c, a);
    area += ab.cross(ac).length() / 2;
  }
  return area;
}

function meshMaterialCount(mesh) {
  const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
  // With CSG multi-material, groups map triangle ranges to material indices
  const geo = mesh.geometry;
  const usedIndices = new Set();
  if (geo.groups && geo.groups.length > 0) {
    geo.groups.forEach(g => usedIndices.add(g.materialIndex));
  } else {
    return mats.length;
  }
  return usedIndices.size;
}

function hitSpecies(hit) {
  const mesh = hit.object;
  const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
  const geo = mesh.geometry;
  // Find which material group this face belongs to
  if (geo.groups && geo.groups.length > 0) {
    const faceStart = hit.faceIndex * 3;
    for (const g of geo.groups) {
      if (faceStart >= g.start && faceStart < g.start + g.count) {
        const mat = mats[g.materialIndex];
        return matSpecies.get(mat) || '?';
      }
    }
  }
  // Single material
  return matSpecies.get(mats[0]) || '?';
}

function fmtVol(mm3) {
  if (mm3 > 1e6) return (mm3 / 1e6).toFixed(1) + ' cm³';
  return mm3.toFixed(0) + ' mm³';
}

function fmtArea(mm2) {
  if (mm2 > 1e4) return (mm2 / 1e4).toFixed(1) + ' cm²';
  return mm2.toFixed(0) + ' mm²';
}

// ─── Dimensions ────────────────────────────────────────────────────

const segW = 50, segH = 50, segD = 500, cubeCount = 32;
const halfLen = (cubeCount * segW) / 2;

// ─── CSG helpers ───────────────────────────────────────────────────

const HS = 2000;
const evaluator = new Evaluator();

function makeHalfSpace(normal, constant, mat) {
  const b = new Brush(new THREE.BoxGeometry(HS, HS, HS), mat);
  b.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
  const pp = normal.clone().multiplyScalar(-constant);
  b.position.copy(pp.add(normal.clone().multiplyScalar(-HS / 2)));
  b.updateMatrixWorld();
  return b;
}

// ─── Build initial panel (one-time union of all segments) ─────────

console.log('Building initial panel...');
let panel;
{
  let acc = null;
  for (let i = 0; i < cubeCount; i++) {
    const x = i * segW - halfLen + segW / 2;
    const y = segH / 2;
    const isMaple = i % 2 === 0;
    const mats = isMaple ? mapleMats : walnutMats;
    const seg = new Brush(new THREE.BoxGeometry(segW, segH, segD), mats);
    seg.position.set(x, y, 0);
    seg.updateMatrixWorld();
    if (!acc) {
      acc = seg;
    } else {
      acc = evaluator.evaluate(acc, seg, ADDITION);
      acc.updateMatrixWorld();
    }
  }
  panel = acc;
  // Center the panel geometry at the origin
  panel.geometry.computeBoundingBox();
  const center = new THREE.Vector3();
  panel.geometry.boundingBox.getCenter(center);
  panel.geometry.translate(-center.x, -center.y, -center.z);
  panel.geometry.computeBoundingBox();

  const bb = new THREE.Box3().setFromObject(panel);
  const sz = new THREE.Vector3(); bb.getSize(sz);
  console.log(`Initial panel: ${panel.geometry.index.count / 3} tris, bounds: ${sz.x.toFixed(0)} × ${sz.y.toFixed(0)} × ${sz.z.toFixed(0)}, centered at origin`);
}

// ─── Groups (persistent across rebuilds) ──────────────────────────

const step1_top = new THREE.Group(); // strip A (above cut plane)
const step1_bot = new THREE.Group(); // strip B (below cut plane)
scene.add(step1_top);
scene.add(step1_bot);

const panelLen = cubeCount * segW;  // 1600mm
const pvA = new THREE.Mesh(
  new THREE.PlaneGeometry(panelLen + 200, segD + 200),
  new THREE.MeshBasicMaterial({ color: 0xc0392b, transparent: true, opacity: 0.07, side: THREE.DoubleSide, depthWrite: false })
);
scene.add(pvA);

const step2_panel = new THREE.Group(); // rejoined panel
scene.add(step2_panel);

// Wireframe bounding boxes (blue)
const bbMat = new THREE.LineBasicMaterial({ color: 0x4488ff });
const bbStripA = new THREE.Box3Helper(new THREE.Box3(), 0x4488ff);
const bbStripB = new THREE.Box3Helper(new THREE.Box3(), 0x4488ff);
const bbPanel2 = new THREE.Box3Helper(new THREE.Box3(), 0x4488ff);
scene.add(bbStripA);
scene.add(bbStripB);
scene.add(bbPanel2);

// ─── Build pipeline from angle ────────────────────────────────────

function rebuild(angleDeg) {
  const rad = angleDeg * Math.PI / 180;
  const planeN = new THREE.Vector3(Math.sin(rad), 0, -Math.cos(rad)).normalize();
  const planeD = 0;

  // Clear previous geometry
  step1_top.clear();
  step1_bot.clear();
  step2_panel.clear();

  // ── Step 1: Cut the panel into two strips ──
  const cutMat = new THREE.MeshStandardMaterial({ color: 0xaa8855, roughness: 0.7 });
  const hs = makeHalfSpace(planeN, planeD, cutMat);

  const panelBrush1 = new Brush(panel.geometry.clone(), panel.material);
  panelBrush1.updateMatrixWorld();
  const stripA = evaluator.evaluate(panelBrush1, hs, SUBTRACTION);
  stripA.castShadow = true;
  step1_top.add(stripA);

  const panelBrush2 = new Brush(panel.geometry.clone(), panel.material);
  panelBrush2.updateMatrixWorld();
  const stripB = evaluator.evaluate(panelBrush2, hs, INTERSECTION);
  stripB.castShadow = true;
  step1_bot.add(stripB);

  // Separate strips along the cut normal so bounding boxes don't overlap.
  // Compute each strip's extent along the cut normal, then push apart.
  stripA.geometry.computeBoundingBox();
  stripB.geometry.computeBoundingBox();
  const bbA = stripA.geometry.boundingBox;
  const bbB = stripB.geometry.boundingBox;
  // Project bounding box corners onto the cut normal to find extent
  function extentAlongNormal(box, n) {
    let minD = Infinity, maxD = -Infinity;
    for (let ix = 0; ix < 2; ix++) for (let iy = 0; iy < 2; iy++) for (let iz = 0; iz < 2; iz++) {
      const d = n.x * (ix ? box.max.x : box.min.x) +
                n.y * (iy ? box.max.y : box.min.y) +
                n.z * (iz ? box.max.z : box.min.z);
      minD = Math.min(minD, d);
      maxD = Math.max(maxD, d);
    }
    return { min: minD, max: maxD };
  }
  const extA = extentAlongNormal(bbA, planeN);
  const extB = extentAlongNormal(bbB, planeN);
  // Strip A is on positive normal side, strip B on negative.
  // Push each outward by half the max extent + a gap.
  const gap = 30;
  const sepA = Math.abs(extA.min) + gap / 2; // push A in +normal direction
  const sepB = Math.abs(extB.max) + gap / 2; // push B in -normal direction
  step1_top.position.copy(planeN.clone().multiplyScalar(sepA));
  step1_bot.position.copy(planeN.clone().multiplyScalar(-sepB));

  // Update plane viz
  pvA.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), planeN);

  // ── Step 2: Rejoin strips into a new panel ──
  // Use the same Z-offset approach: slide strip A so its uncut face
  // meets strip B's uncut face.
  function cloneBaked(mesh) {
    const geo = mesh.geometry.clone();
    const m4 = new THREE.Matrix4();
    m4.compose(mesh.position, mesh.quaternion, mesh.scale);
    geo.applyMatrix4(m4);
    return geo;
  }

  const geoA = cloneBaked(stripA);
  const geoB = cloneBaked(stripB);
  geoA.computeBoundingBox();
  geoB.computeBoundingBox();

  const topMinZ = geoA.boundingBox.min.z;
  const botMaxZ = geoB.boundingBox.max.z;
  const zOffset = botMaxZ - topMinZ;

  // Apply Z offset to strip A
  const pos = geoA.attributes.position;
  for (let v = 0; v < pos.count; v++) {
    pos.setZ(v, pos.getZ(v) + zOffset);
  }
  pos.needsUpdate = true;

  // Union the two strips into a panel
  console.log(`Rebuilding: angle=${angleDeg}°, unioning 2 strips...`);
  const brushA = new Brush(geoA, stripA.material);
  brushA.updateMatrixWorld();
  const brushB = new Brush(geoB, stripB.material);
  brushB.updateMatrixWorld();
  const result = evaluator.evaluate(brushA, brushB, ADDITION);
  result.updateMatrixWorld();

  result.castShadow = true;
  step2_panel.add(result);

  // Log result
  const bb = new THREE.Box3().setFromObject(result);
  const sz = new THREE.Vector3(); bb.getSize(sz);
  const tris = result.geometry.index ? result.geometry.index.count / 3 : 0;
  console.log(`Panel 2: ${tris} tris, bounds: ${sz.x.toFixed(1)} × ${sz.y.toFixed(1)} × ${sz.z.toFixed(1)}`);

  // Update wireframe bounding boxes
  bbStripA.box.setFromObject(step1_top);
  bbStripB.box.setFromObject(step1_bot);
  bbPanel2.box.setFromObject(step2_panel);
}

// Initial build
rebuild(7);

// ─── Slider ───────────────────────────────────────────────────────

const slider = document.getElementById('angle-slider');
const angleVal = document.getElementById('angle-val');

slider.addEventListener('input', () => {
  const v = parseInt(slider.value, 10);
  angleVal.textContent = `${v}°`;
  rebuild(v);
});

// ─── Camera + controls ─────────────────────────────────────────────

const camera = new THREE.PerspectiveCamera(45, 1, 1, 10000);
camera.position.set(1000, 600, 800);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.target.set(0, 25, 0);

// ─── Layout ────────────────────────────────────────────────────────

const dv = document.createElement('div'); dv.className = 'divider';
dv.style.cssText = 'top:0; left:50%; width:1px; height:100%';
document.body.appendChild(dv);

function mkLabel(txt, css) {
  const el = document.createElement('div'); el.className = 'step-label';
  el.textContent = txt; el.style.cssText = css; document.body.appendChild(el);
}
mkLabel('step 1: diagonal cut', 'top:8px; left:calc(25% - 50px)');
mkLabel('step 2: joined', 'top:8px; left:calc(75% - 30px)');

// ─── Hover / raycaster ─────────────────────────────────────────────

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const statusbar = document.getElementById('statusbar');
let hoveredMesh = null, hoveredOrig = null;

renderer.domElement.addEventListener('mousemove', (e) => {
  const W = window.innerWidth, H = window.innerHeight;
  const leftW = Math.floor(W / 2);
  const inLeft = e.clientX < leftW;
  let nx = inLeft
    ? (e.clientX / leftW) * 2 - 1
    : ((e.clientX - leftW) / (W - leftW)) * 2 - 1;
  const ny = -(e.clientY / H) * 2 + 1;
  mouse.set(nx, ny);
  raycaster.setFromCamera(mouse, camera);

  const groups = inLeft ? [step1_top, step1_bot] : [step2_panel];
  const meshes = [];
  groups.forEach(g => g.traverse(m => { if (m.isMesh) meshes.push(m); }));
  const hits = raycaster.intersectObjects(meshes, false);

  if (hoveredMesh && hoveredMesh !== hits[0]?.object) {
    const mats = Array.isArray(hoveredMesh.material) ? hoveredMesh.material : [hoveredMesh.material];
    mats.forEach((m, i) => { if (hoveredOrig?.[i]) m.emissive?.copy(hoveredOrig[i]); });
    hoveredMesh = null; hoveredOrig = null;
  }
  if (hits.length > 0) {
    const hit = hits[0], mesh = hit.object;
    if (mesh !== hoveredMesh) {
      hoveredMesh = mesh;
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      hoveredOrig = mats.map(m => m.emissive ? m.emissive.clone() : new THREE.Color(0));
      mats.forEach(m => { if (m.emissive) m.emissive.set(0x333333); });
    }
    const geo = mesh.geometry;
    const tris = geo.index ? geo.index.count / 3 : 0;
    const pt = hit.point;
    const bb = new THREE.Box3().setFromObject(mesh);
    const sz = new THREE.Vector3(); bb.getSize(sz);
    const vol = meshVolume(geo);
    const area = meshSurfaceArea(geo);
    const matCount = meshMaterialCount(mesh);
    const species = hitSpecies(hit);
    const fn = hit.face ? hit.face.normal : null;
    const normalStr = fn ? `(${fn.x.toFixed(2)}, ${fn.y.toFixed(2)}, ${fn.z.toFixed(2)})` : '—';
    statusbar.innerHTML =
      `<span class="label">species</span> <span class="val">${species}</span>  ` +
      `<span class="label">vol</span> <span class="val">${fmtVol(vol)}</span>  ` +
      `<span class="label">area</span> <span class="val">${fmtArea(area)}</span>  ` +
      `<span class="label">materials</span> <span class="val">${matCount}</span>  ` +
      `<span class="label">normal</span> <span class="val">${normalStr}</span>  ` +
      `<span class="label">bounds</span> <span class="val">${sz.x.toFixed(0)}×${sz.y.toFixed(0)}×${sz.z.toFixed(0)}</span>  ` +
      `<span class="label">tris</span> <span class="val">${tris}</span>`;
  } else {
    statusbar.innerHTML = '<span class="dim">hover a piece to inspect</span>';
  }
});

// ─── Axes gizmo (corner reference) ─────────────────────────────────

const axesScene = new THREE.Scene();
const axesCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
axesCamera.position.set(0, 0, 3);
axesCamera.lookAt(0, 0, 0);

function makeAxis(dir, color) {
  const mat = new THREE.LineBasicMaterial({ color });
  const pts = [new THREE.Vector3(0,0,0), dir.clone()];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, mat);
}
const axesGroup = new THREE.Group();
axesGroup.add(makeAxis(new THREE.Vector3(1,0,0), 0xff4444));
axesGroup.add(makeAxis(new THREE.Vector3(0,1,0), 0x44ff44));
axesGroup.add(makeAxis(new THREE.Vector3(0,0,1), 0x4488ff));

function makeAxisLabel(text, position, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 32, 32);
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  sprite.position.copy(position);
  sprite.scale.set(0.3, 0.3, 1);
  return sprite;
}
axesGroup.add(makeAxisLabel('X', new THREE.Vector3(1.2, 0, 0), '#ff4444'));
axesGroup.add(makeAxisLabel('Y', new THREE.Vector3(0, 1.2, 0), '#44ff44'));
axesGroup.add(makeAxisLabel('Z', new THREE.Vector3(0, 0, 1.2), '#4488ff'));
axesScene.add(axesGroup);

// ─── Render loop: 2 viewports ──────────────────────────────────────

const axesSize = 100;

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const W = window.innerWidth, H = window.innerHeight;
  const halfW = Math.floor(W / 2);
  renderer.setScissorTest(true);

  axesGroup.quaternion.copy(camera.quaternion).invert();

  // ── Left: Step 1 (cut strips separated + plane viz) ──
  step1_top.visible = true; step1_bot.visible = true;
  pvA.visible = true;
  bbStripA.visible = true; bbStripB.visible = true;
  step2_panel.visible = false;
  bbPanel2.visible = false;

  renderer.setViewport(0, 0, halfW, H);
  renderer.setScissor(0, 0, halfW, H);
  camera.aspect = halfW / H;
  camera.updateProjectionMatrix();
  renderer.setClearColor(0x1c1917, 1); renderer.clear();
  renderer.render(scene, camera);

  renderer.setViewport(8, 8, axesSize, axesSize);
  renderer.setScissor(8, 8, axesSize, axesSize);
  renderer.clearDepth();
  renderer.render(axesScene, axesCamera);

  // ── Right: Step 2 (rejoined panel) ──
  step1_top.visible = false; step1_bot.visible = false;
  pvA.visible = false;
  bbStripA.visible = false; bbStripB.visible = false;
  step2_panel.visible = true;
  bbPanel2.visible = true;

  renderer.setViewport(halfW, 0, W - halfW, H);
  renderer.setScissor(halfW, 0, W - halfW, H);
  camera.aspect = (W - halfW) / H;
  camera.updateProjectionMatrix();
  renderer.setClearColor(0x1a1816, 1); renderer.clear();
  renderer.render(scene, camera);

  renderer.setViewport(halfW + 8, 8, axesSize, axesSize);
  renderer.setScissor(halfW + 8, 8, axesSize, axesSize);
  renderer.clearDepth();
  renderer.render(axesScene, axesCamera);

  renderer.setScissorTest(false);
}
animate();

window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));
</script>
