<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>End Grain — 3D Experiment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1c1917; overflow: hidden; font-family: 'Geist Mono', monospace; }
  #info {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    color: #a8a29e; font-size: 10px; line-height: 1.5;
    pointer-events: none; user-select: none;
  }
  #info strong { color: #e4cc8f; }
  .step-label {
    position: fixed; z-index: 10; pointer-events: none; user-select: none;
    color: #b45309; font-size: 9px; letter-spacing: 0.5px;
    background: rgba(28,25,23,0.8); padding: 3px 8px; border-radius: 3px;
  }
  .divider { position: fixed; background: #3d3835; z-index: 5; }
  #statusbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    height: 28px; display: flex; align-items: center; gap: 16px;
    padding: 0 12px;
    background: rgba(28,25,23,0.92); border-top: 1px solid #3d3835;
    font-size: 10px; color: #78716c;
  }
  #statusbar .label { color: #a8a29e; text-transform: uppercase; letter-spacing: 0.5px; }
  #statusbar .val { color: #e4cc8f; }
  #statusbar .dim { color: #555; }
  .ctrl-panel {
    position: fixed; z-index: 10;
    background: rgba(28,25,23,0.92); border: 1px solid #3d3835;
    border-radius: 6px; padding: 12px 16px;
    color: #a8a29e; font-size: 10px;
  }
  #controls { top: 10px; right: calc(50% + 10px); }
  #controls2 { top: calc(50% + 10px); right: calc(50% + 10px); }
  button.join-btn:disabled { opacity: 0.4; cursor: default; }
  button.join-btn:not(:disabled):hover { background: #3d7a37; }
  button.join-btn {
    margin-top:6px; width:100%; padding:6px; background:#2d5a27;
    color:#e4cc8f; border:1px solid #3d5a37; border-radius:4px;
    font-family:inherit; font-size:10px; letter-spacing:0.5px;
    cursor:pointer; text-transform:uppercase;
  }
  .ctrl-panel label { display: block; margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  .ctrl-panel input[type="range"] {
    width: 160px; accent-color: #b45309;
  }
  .ctrl-panel .angle-val { color: #e4cc8f; font-weight: bold; }
</style>
</head>
<body>
<div id="info">
  <strong>End Grain — Cut + Combine</strong><br>
  left: diagonal cut &middot; right: joined
</div>
<div id="controls" class="ctrl-panel">
  <label>cut A angle: <span id="angle-val" class="angle-val">7°</span></label>
  <input type="range" id="angle-slider" min="-45" max="45" step="1" value="7">
  <div style="margin-top:8px; font-size:9px; color:#78716c;">click a face on each strip to select join faces</div>
  <button id="join-btn" class="join-btn" disabled>join selected faces</button>
  <div id="join-error" style="margin-top:4px; font-size:9px; color:#c0392b;"></div>
</div>
<div id="controls2" class="ctrl-panel">
  <label>cut B angle: <span id="angle-b-val" class="angle-val">7°</span></label>
  <input type="range" id="angle-b-slider" min="-45" max="45" step="1" value="7">
  <div style="margin-top:8px; font-size:9px; color:#78716c;">select faces on strips C/D, then join</div>
  <button id="join2-btn" class="join-btn" disabled>join selected faces</button>
  <div id="join2-error" style="margin-top:4px; font-size:9px; color:#c0392b;"></div>
</div>
<div id="statusbar"><span class="dim">hover a piece to inspect</span></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import Module from 'manifold-3d';
import wasmUrl from 'manifold-3d/manifold.wasm?url';

// ─── Renderer ──────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// ─── Scene ─────────────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1917);

scene.add((() => {
  const k = new THREE.DirectionalLight(0xfff5e6, 1.6);
  k.position.set(300, 400, 200); k.castShadow = true;
  k.shadow.mapSize.set(1024, 1024);
  k.shadow.camera.near = 50; k.shadow.camera.far = 1200;
  k.shadow.camera.left = -500; k.shadow.camera.right = 500;
  k.shadow.camera.top = 500; k.shadow.camera.bottom = -500;
  return k;
})());
scene.add(new THREE.DirectionalLight(0xc8d8e8, 0.8).translateX(-200).translateY(100).translateZ(-100));
scene.add(new THREE.DirectionalLight(0xd4c8b8, 0.7).translateY(-300));
scene.add(new THREE.DirectionalLight(0xb8c0c8, 0.4).translateX(-100).translateY(200).translateZ(-300));
scene.add(new THREE.AmbientLight(0x4a4440, 1.2));

// ─── Wood materials ────────────────────────────────────────────────

function makeEndGrainTex(base, ring) {
  const s = 256, c = document.createElement('canvas'); c.width = s; c.height = s;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, s, s);
  for (let i = 12; i >= 1; i--) {
    x.beginPath(); x.arc(s*.48, s*.52, (i/12)*s*.45, 0, Math.PI*2);
    x.strokeStyle = ring; x.lineWidth = 1.2; x.globalAlpha = .25+(i/12)*.15; x.stroke();
  }
  x.globalAlpha = 1;
  return new THREE.CanvasTexture(c);
}
function makeSideMat(base, grain) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 30; i++) {
    const px = Math.random()*256; x.beginPath(); x.moveTo(px, 0);
    for (let y = 0; y < 256; y += 10) x.lineTo(px+(Math.random()-.5)*4, y);
    x.strokeStyle = grain; x.lineWidth = .8+Math.random(); x.globalAlpha = .1+Math.random()*.15; x.stroke();
  }
  return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(c), roughness: 0.65 });
}
function makeWoodMats(base, ring, grain) {
  const e = new THREE.MeshStandardMaterial({ map: makeEndGrainTex(base, ring), roughness: 0.7 });
  const s = makeSideMat(base, grain);
  return [s, s, e, e, s, s];
}
const mapleMats = makeWoodMats('#e4cc8f', '#b5a06a', '#c4aa70');
const walnutMats = makeWoodMats('#3d2416', '#2a1a0e', '#4a2e1a');
const mapleCut = new THREE.MeshStandardMaterial({ color: 0xe4cc8f, roughness: 0.75 });
const walnutCut = new THREE.MeshStandardMaterial({ color: 0x3d2416, roughness: 0.75 });

// Map every material to a species name for status bar lookup
const matSpecies = new Map();
mapleMats.forEach(m => matSpecies.set(m, 'maple'));
walnutMats.forEach(m => matSpecies.set(m, 'walnut'));
matSpecies.set(mapleCut, 'maple');
matSpecies.set(walnutCut, 'walnut');

// ─── Geometry stats helpers ───────────────────────────────────────

// Signed volume of a triangle with vertices a, b, c (relative to origin)
function signedTriVol(a, b, c) {
  return a.dot(new THREE.Vector3().crossVectors(b, c)) / 6;
}

function meshVolume(geo) {
  const pos = geo.attributes.position;
  const idx = geo.index;
  if (!idx) return 0;
  let vol = 0;
  const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
  for (let i = 0; i < idx.count; i += 3) {
    a.fromBufferAttribute(pos, idx.getX(i));
    b.fromBufferAttribute(pos, idx.getX(i + 1));
    c.fromBufferAttribute(pos, idx.getX(i + 2));
    vol += signedTriVol(a, b, c);
  }
  return Math.abs(vol);
}

function meshSurfaceArea(geo) {
  const pos = geo.attributes.position;
  const idx = geo.index;
  if (!idx) return 0;
  let area = 0;
  const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
  const ab = new THREE.Vector3(), ac = new THREE.Vector3();
  for (let i = 0; i < idx.count; i += 3) {
    a.fromBufferAttribute(pos, idx.getX(i));
    b.fromBufferAttribute(pos, idx.getX(i + 1));
    c.fromBufferAttribute(pos, idx.getX(i + 2));
    ab.subVectors(b, a);
    ac.subVectors(c, a);
    area += ab.cross(ac).length() / 2;
  }
  return area;
}

function meshMaterialCount(mesh) {
  const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
  // With CSG multi-material, groups map triangle ranges to material indices
  const geo = mesh.geometry;
  const usedIndices = new Set();
  if (geo.groups && geo.groups.length > 0) {
    geo.groups.forEach(g => usedIndices.add(g.materialIndex));
  } else {
    return mats.length;
  }
  return usedIndices.size;
}

function hitSpecies(hit) {
  const mesh = hit.object;
  const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
  const geo = mesh.geometry;
  // Find which material group this face belongs to
  if (geo.groups && geo.groups.length > 0) {
    const faceStart = hit.faceIndex * 3;
    for (const g of geo.groups) {
      if (faceStart >= g.start && faceStart < g.start + g.count) {
        const mat = mats[g.materialIndex];
        return matSpecies.get(mat) || '?';
      }
    }
  }
  // Single material
  return matSpecies.get(mats[0]) || '?';
}

function fmtVol(mm3) {
  if (mm3 > 1e6) return (mm3 / 1e6).toFixed(1) + ' cm³';
  return mm3.toFixed(0) + ' mm³';
}

function fmtArea(mm2) {
  if (mm2 > 1e4) return (mm2 / 1e4).toFixed(1) + ' cm²';
  return mm2.toFixed(0) + ' mm²';
}

// ─── Dimensions ────────────────────────────────────────────────────

const segW = 50, segH = 50, segD = 500, cubeCount = 32;
const halfLen = (cubeCount * segW) / 2;
const panelLen = cubeCount * segW;

// ─── Manifold init + assembly model ───────────────────────────────
//
// A "panel" is an array of { manifold, species } objects — an assembly
// of individual segments that are treated as one logical piece.
// Cutting a panel = cutting each segment individually with the same plane.
// No CSG union needed — segments keep their identity and materials.

// Scene groups
const step1_top = new THREE.Group(); // strip A
const step1_bot = new THREE.Group(); // strip B
scene.add(step1_top);
scene.add(step1_bot);

const pvA = new THREE.Mesh(
  new THREE.PlaneGeometry(panelLen + 200, segD + 200),
  new THREE.MeshBasicMaterial({ color: 0xc0392b, transparent: true, opacity: 0.07, side: THREE.DoubleSide, depthWrite: false })
);
scene.add(pvA);

const step2_panel = new THREE.Group();
scene.add(step2_panel);

// View 3 (second cut) — strips C and D
const step3_top = new THREE.Group();
const step3_bot = new THREE.Group();
scene.add(step3_top);
scene.add(step3_bot);

// Plane viz for the second cut
const pvB = new THREE.Mesh(
  new THREE.PlaneGeometry(panelLen + 200, segD + 200),
  new THREE.MeshBasicMaterial({ color: 0x2980b9, transparent: true, opacity: 0.07, side: THREE.DoubleSide, depthWrite: false })
);
scene.add(pvB);

// View 4 (second join) — final panel
const step4_panel = new THREE.Group();
scene.add(step4_panel);

// Wireframe bounding boxes
const bbStripA = new THREE.Box3Helper(new THREE.Box3(), 0x4488ff);
const bbStripB = new THREE.Box3Helper(new THREE.Box3(), 0x4488ff);
const bbPanel2 = new THREE.Box3Helper(new THREE.Box3(), 0x4488ff);
const bbStripC = new THREE.Box3Helper(new THREE.Box3(), 0x4488ff);
const bbStripD = new THREE.Box3Helper(new THREE.Box3(), 0x4488ff);
const bbPanel4 = new THREE.Box3Helper(new THREE.Box3(), 0x4488ff);
scene.add(bbStripA);
scene.add(bbStripB);
scene.add(bbPanel2);
scene.add(bbStripC);
scene.add(bbStripD);
scene.add(bbPanel4);

// Clickable bounding box face planes (6 per strip)
// State: 0 = off, 1 = selected, 2 = selected with rotation
const faceUnselectedMat = new THREE.MeshBasicMaterial({
  color: 0x4488ff, transparent: true, opacity: 0.08,
  side: THREE.DoubleSide, depthWrite: false
});
const faceSelectedMat = new THREE.MeshBasicMaterial({
  color: 0x22cc44, transparent: true, opacity: 0.4,
  side: THREE.DoubleSide, depthWrite: false
});
const faceSelectedRotMat = new THREE.MeshBasicMaterial({
  color: 0xff9922, transparent: true, opacity: 0.5,
  side: THREE.DoubleSide, depthWrite: false
});

// Face definitions: axis, sign, rotation to orient a Z-facing plane to that face
const FACE_DEFS = [
  { axis: 'x', sign: +1, rot: [0, Math.PI/2, 0] },   // +X
  { axis: 'x', sign: -1, rot: [0, -Math.PI/2, 0] },  // -X
  { axis: 'y', sign: +1, rot: [-Math.PI/2, 0, 0] },  // +Y
  { axis: 'y', sign: -1, rot: [Math.PI/2, 0, 0] },   // -Y
  { axis: 'z', sign: +1, rot: [0, 0, 0] },            // +Z
  { axis: 'z', sign: -1, rot: [0, Math.PI, 0] },      // -Z
];

function createFacePlanes(strip) {
  const group = new THREE.Group();
  for (let i = 0; i < 6; i++) {
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), faceUnselectedMat.clone());
    mesh.userData = { strip, faceIdx: i, def: FACE_DEFS[i], state: 0 };
    group.add(mesh);
  }
  return group;
}

const facePlanesA = createFacePlanes('A');
const facePlanesB = createFacePlanes('B');
const facePlanesC = createFacePlanes('C');
const facePlanesD = createFacePlanes('D');
scene.add(facePlanesA);
scene.add(facePlanesB);
scene.add(facePlanesC);
scene.add(facePlanesD);

// Selection state: { faceIdx, rotate } per strip (null = none selected)
let selectionA = null, selectionB = null;
let selectionC = null, selectionD = null;

// Hover tracker: which strip/panel is being hovered ('A', 'B', 'P', or null)
let hoveredStrip = null;

function updateFacePlanes(facePlanesGroup, box) {
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);

  facePlanesGroup.children.forEach((mesh, i) => {
    const def = FACE_DEFS[i];
    const state = mesh.userData.state;
    mesh.material = state === 2 ? faceSelectedRotMat.clone()
                  : state === 1 ? faceSelectedMat.clone()
                  : faceUnselectedMat.clone();

    // Size: the two dimensions perpendicular to the face axis
    if (def.axis === 'x') mesh.scale.set(size.z, size.y, 1);
    else if (def.axis === 'y') mesh.scale.set(size.x, size.z, 1);
    else mesh.scale.set(size.x, size.y, 1);

    // Position: center of the box face, nudged outward slightly to prevent z-fighting
    const nudge = 2;
    mesh.position.copy(center);
    if (def.axis === 'x') mesh.position.x = (def.sign > 0 ? box.max.x : box.min.x) + def.sign * nudge;
    else if (def.axis === 'y') mesh.position.y = (def.sign > 0 ? box.max.y : box.min.y) + def.sign * nudge;
    else mesh.position.z = (def.sign > 0 ? box.max.z : box.min.z) + def.sign * nudge;

    mesh.rotation.set(...def.rot);
  });
}

// Get the two dimensions of a bounding box face
function faceDims(box, faceIdx) {
  const size = new THREE.Vector3(); box.getSize(size);
  const def = FACE_DEFS[faceIdx];
  if (def.axis === 'x') return [size.y, size.z].sort((a,b) => a-b);
  if (def.axis === 'y') return [size.x, size.z].sort((a,b) => a-b);
  return [size.x, size.y].sort((a,b) => a-b);
}

function updateJoinButton() {
  const btn = document.getElementById('join-btn');
  const errEl = document.getElementById('join-error');

  if (selectionA === null || selectionB === null) {
    btn.disabled = true;
    errEl.textContent = '';
    return;
  }

  // Check dimension match
  const dimsA = faceDims(bbStripA.box, selectionA.faceIdx);
  const dimsB = faceDims(bbStripB.box, selectionB.faceIdx);
  const tol = 1;
  const match = Math.abs(dimsA[0] - dimsB[0]) < tol && Math.abs(dimsA[1] - dimsB[1]) < tol;

  if (match) {
    btn.disabled = false;
    errEl.textContent = '';
  } else {
    btn.disabled = true;
    errEl.textContent = `face mismatch: ${dimsA[0].toFixed(0)}×${dimsA[1].toFixed(0)} vs ${dimsB[0].toFixed(0)}×${dimsB[1].toFixed(0)}`;
  }
}

// Material per species: index 0 = maple, index 1 = walnut
const speciesMaterials = { maple: mapleMats[0], walnut: walnutMats[0] };

let Manifold;
let initialPanel; // array of { manifold, species }

async function init() {
  console.log('Loading manifold-3d WASM...');
  const wasm = await Module({ locateFile: () => wasmUrl });
  wasm.setup();
  Manifold = wasm.Manifold;
  console.log('Manifold ready.');

  // Build initial panel as an assembly of individual segments
  initialPanel = [];
  for (let i = 0; i < cubeCount; i++) {
    const x = i * segW - halfLen + segW / 2;
    const mf = Manifold.cube([segW, segH, segD], true).translate([x, 0, 0]);
    initialPanel.push({ manifold: mf, species: i % 2 === 0 ? 'maple' : 'walnut' });
  }
  console.log(`Initial panel: ${cubeCount} segments, ${panelLen}×${segH}×${segD}mm`);

  rebuild(7);

  // Frame the camera to show all entities with buffer
  const frame = new THREE.Box3();
  frame.expandByObject(step1_top);
  frame.expandByObject(step1_bot);
  frameCameraToBox(frame, 1.3);
}

// Convert a single Manifold to a Three.js Mesh with the given material
function manifoldToThree(mf, material) {
  const mesh = mf.getMesh();
  const numVerts = mesh.numVert;
  const numProp = mesh.numProp;

  const positions = new Float32Array(numVerts * 3);
  for (let i = 0; i < numVerts; i++) {
    positions[i * 3]     = mesh.vertProperties[i * numProp];
    positions[i * 3 + 1] = mesh.vertProperties[i * numProp + 1];
    positions[i * 3 + 2] = mesh.vertProperties[i * numProp + 2];
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setIndex(new THREE.BufferAttribute(new Uint32Array(mesh.triVerts), 1));
  geo.computeVertexNormals();

  // Clone material and enable flat shading for hard edges
  const mat = material.clone();
  mat.flatShading = true;
  const obj = new THREE.Mesh(geo, mat);
  obj.castShadow = true;
  return obj;
}

// Cut a panel (assembly) with a plane. Returns { above: [...], below: [...] }
function cutPanel(panel, normal, offset) {
  const above = [], below = [];
  for (const seg of panel) {
    const [a, b] = seg.manifold.splitByPlane(normal, offset);
    // splitByPlane may return empty manifolds for segments entirely on one side
    if (a.numVert() > 0) above.push({ manifold: a, species: seg.species });
    else a.delete();
    if (b.numVert() > 0) below.push({ manifold: b, species: seg.species });
    else b.delete();
  }
  return { above, below };
}

// Render a panel assembly into a Three.js Group
function renderPanel(panel, group) {
  group.clear();
  for (const seg of panel) {
    const mat = speciesMaterials[seg.species];
    const mesh = manifoldToThree(seg.manifold, mat);
    group.add(mesh);
  }
}

// Compute the bounding box of a panel assembly by sampling manifold bounds
function panelBoundingBox(panel) {
  const bb = new THREE.Box3();
  for (const seg of panel) {
    const mbb = seg.manifold.boundingBox();
    bb.expandByPoint(new THREE.Vector3(mbb.min[0], mbb.min[1], mbb.min[2]));
    bb.expandByPoint(new THREE.Vector3(mbb.max[0], mbb.max[1], mbb.max[2]));
  }
  return bb;
}

// Apply a 4x4 transform (as 16-element row-major array) to a manifold assembly
function transformPanel(panel, matrix4) {
  // manifold-3d .transform() takes a 3x4 matrix (12 elements, row-major, no perspective)
  const m = matrix4.elements; // Three.js is column-major!
  // Convert column-major to 3x4 row-major
  const mat3x4 = [
    m[0], m[4], m[8],  m[12],
    m[1], m[5], m[9],  m[13],
    m[2], m[6], m[10], m[14],
  ];
  return panel.map(seg => ({
    manifold: seg.manifold.transform(mat3x4),
    species: seg.species,
  }));
}

// Rotate a panel assembly 180° about the axis parallel to the given face's normal,
// through the panel's bounding box center.
function rotatePanelAboutFace(panel, faceDef) {
  const bb = panelBoundingBox(panel);
  const center = new THREE.Vector3(); bb.getCenter(center);
  const axis = new THREE.Vector3(
    faceDef.axis === 'x' ? 1 : 0,
    faceDef.axis === 'y' ? 1 : 0,
    faceDef.axis === 'z' ? 1 : 0
  );
  const m = new THREE.Matrix4()
    .makeTranslation(-center.x, -center.y, -center.z);
  const rot = new THREE.Matrix4().makeRotationAxis(axis, Math.PI);
  const back = new THREE.Matrix4().makeTranslation(center.x, center.y, center.z);
  const full = back.multiply(rot).multiply(m);
  const out = transformPanel(panel, full);
  // Free old manifolds
  panel.forEach(s => s.manifold.delete());
  return out;
}

// Translate a panel assembly
function translatePanel(panel, tx, ty, tz) {
  return panel.map(seg => ({
    manifold: seg.manifold.translate([tx, ty, tz]),
    species: seg.species,
  }));
}

// Join two strip assemblies at the selected faces.
// Returns a new panel assembly (array of {manifold, species}).
function joinStrips(stripA, stripB, selA, selB) {
  const defA = FACE_DEFS[selA.faceIdx];
  const defB = FACE_DEFS[selB.faceIdx];

  // Apply rotations if enabled
  let workA = selA.rotate ? rotatePanelAboutFace(stripA, defA) : stripA.map(s => ({
    manifold: s.manifold.translate([0, 0, 0]), // clone
    species: s.species,
  }));
  let workB = selB.rotate ? rotatePanelAboutFace(stripB, defB) : stripB.map(s => ({
    manifold: s.manifold.translate([0, 0, 0]), // clone
    species: s.species,
  }));

  const bbA = panelBoundingBox(workA);
  const bbB = panelBoundingBox(workB);
  const faceAPos = defA.sign > 0 ? bbA.max[defA.axis] : bbA.min[defA.axis];
  const faceBPos = defB.sign > 0 ? bbB.max[defB.axis] : bbB.min[defB.axis];

  // Translation for strip B so its selected face meets strip A's
  const centerA = new THREE.Vector3(); bbA.getCenter(centerA);
  const centerB = new THREE.Vector3(); bbB.getCenter(centerB);
  const offset = { x: 0, y: 0, z: 0 };
  if (defA.axis === defB.axis) {
    offset[defA.axis] = faceAPos - faceBPos;
  }
  for (const ax of ['x', 'y', 'z']) {
    if (ax !== defA.axis) {
      offset[ax] = centerA[ax] - centerB[ax];
    }
  }

  const translatedB = translatePanel(workB, offset.x, offset.y, offset.z);
  workB.forEach(s => s.manifold.delete());

  return [...workA, ...translatedB];
}

// ─── Build pipeline from angle ────────────────────────────────────

// Track current cut results for cleanup
let currentStripAbove = null, currentStripBelow = null;

function rebuild(angleDeg) {
  if (!Manifold) return;

  const rad = angleDeg * Math.PI / 180;
  const nx = Math.sin(rad), nz = -Math.cos(rad);

  // Clean up previous cut manifolds
  if (currentStripAbove) currentStripAbove.forEach(s => s.manifold.delete());
  if (currentStripBelow) currentStripBelow.forEach(s => s.manifold.delete());

  step1_top.clear();
  step1_bot.clear();
  step2_panel.clear();

  // ── Step 1: Cut each segment with the plane ──
  const { above, below } = cutPanel(initialPanel, [nx, 0, nz], 0);
  currentStripAbove = above;
  currentStripBelow = below;

  renderPanel(above, step1_top);
  renderPanel(below, step1_bot);

  // Push strips apart by a fixed amount along the cut normal
  const planeN = new THREE.Vector3(nx, 0, nz);
  const sep = 40;
  step1_top.position.copy(planeN.clone().multiplyScalar(sep));
  step1_bot.position.copy(planeN.clone().multiplyScalar(-sep));

  // Update plane viz
  pvA.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), planeN);

  // Update bounding boxes
  bbStripA.box.setFromObject(step1_top);
  bbStripB.box.setFromObject(step1_bot);

  // Update clickable face planes on each strip's bounding box
  updateFacePlanes(facePlanesA, bbStripA.box);
  updateFacePlanes(facePlanesB, bbStripB.box);

  console.log(`Cut at ${angleDeg}°: strip A = ${above.length} segs, strip B = ${below.length} segs`);
}

// ─── Slider ───────────────────────────────────────────────────────

const slider = document.getElementById('angle-slider');
const angleVal = document.getElementById('angle-val');

slider.addEventListener('input', () => {
  const v = parseInt(slider.value, 10);
  angleVal.textContent = `${v}°`;
  rebuild(v);
});

const sliderB = document.getElementById('angle-b-slider');
const angleBVal = document.getElementById('angle-b-val');

sliderB.addEventListener('input', () => {
  const v = parseInt(sliderB.value, 10);
  angleBVal.textContent = `${v}°`;
  currentAngleB = v;
  if (panel2) rebuildCut2();
});

document.getElementById('join2-btn').addEventListener('click', () => {
  if (selectionC === null || selectionD === null) return;
  if (!currentStripC || !currentStripD) return;

  let joined = joinStrips(currentStripC, currentStripD, selectionC, selectionD);
  const bb = panelBoundingBox(joined);
  const c = new THREE.Vector3(); bb.getCenter(c);
  const centered = translatePanel(joined, -c.x, -c.y, -c.z);
  joined.forEach(s => s.manifold.delete());

  if (panel4) panel4.forEach(s => s.manifold.delete());
  panel4 = centered;

  step4_panel.clear();
  renderPanel(panel4, step4_panel);
  bbPanel4.box.setFromObject(step4_panel);

  const sz = new THREE.Vector3(); bbPanel4.box.getSize(sz);
  console.log(`Joined panel4: ${panel4.length} segments, bounds ${sz.x.toFixed(0)}×${sz.y.toFixed(0)}×${sz.z.toFixed(0)}`);
});

// Start async init
init();

// ─── Camera + controls ─────────────────────────────────────────────

const camera = new THREE.PerspectiveCamera(45, 1, 1, 10000);
camera.position.set(1000, 600, 800);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;

// Frame the camera so the given Box3 fits with some buffer.
// Keeps the existing view direction (orbital angle).
function frameCameraToBox(box, buffer = 1.3) {
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);

  // Account for the split viewport — each half is the full scene's aspect
  const halfAspect = (window.innerWidth / 2) / window.innerHeight;
  const fovV = camera.fov * Math.PI / 180;
  const fovH = 2 * Math.atan(Math.tan(fovV / 2) * halfAspect);

  // Radius of enclosing sphere
  const radius = size.length() / 2;
  const distV = radius / Math.sin(fovV / 2);
  const distH = radius / Math.sin(fovH / 2);
  const dist = Math.max(distV, distH) * buffer;

  // Keep current view direction
  const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
  camera.position.copy(center).addScaledVector(dir, dist);
  controls.target.copy(center);
  controls.update();
}
controls.target.set(0, 25, 0);

// ─── Layout ────────────────────────────────────────────────────────

function mkDivider(css) {
  const d = document.createElement('div'); d.className = 'divider';
  d.style.cssText = css; document.body.appendChild(d);
}
mkDivider('top:0; left:50%; width:1px; height:100%');
mkDivider('top:50%; left:0; height:1px; width:100%');

function mkLabel(txt, css) {
  const el = document.createElement('div'); el.className = 'step-label';
  el.textContent = txt; el.style.cssText = css; document.body.appendChild(el);
}
mkLabel('step 1: cut A', 'top:8px; left:calc(25% - 30px)');
mkLabel('step 2: join 1', 'top:8px; left:calc(75% - 30px)');
mkLabel('step 3: cut B', 'top:calc(50% + 8px); left:calc(25% - 30px)');
mkLabel('step 4: join 2', 'top:calc(50% + 8px); left:calc(75% - 30px)');

// ─── Hover / raycaster ─────────────────────────────────────────────

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const statusbar = document.getElementById('statusbar');
let hoveredMesh = null, hoveredOrig = null;

// Determine which viewport a client point is in (0=TL, 1=TR, 2=BL, 3=BR)
function viewportFor(clientX, clientY) {
  const W = window.innerWidth, H = window.innerHeight;
  const inLeft = clientX < W / 2;
  const inTop = clientY < H / 2;
  return (inTop ? 0 : 2) + (inLeft ? 0 : 1);
}

function viewportNDC(clientX, clientY) {
  const W = window.innerWidth, H = window.innerHeight;
  const halfW = Math.floor(W / 2), halfH = Math.floor(H / 2);
  const vpIdx = viewportFor(clientX, clientY);
  const vpX = (vpIdx & 1) * halfW;
  const vpY = (vpIdx >> 1) * halfH;
  const vpW = (vpIdx & 1) ? W - halfW : halfW;
  const vpH = (vpIdx >> 1) ? H - halfH : halfH;
  const nx = ((clientX - vpX) / vpW) * 2 - 1;
  const ny = -((clientY - vpY) / vpH) * 2 + 1;
  return { nx, ny, vpIdx };
}

renderer.domElement.addEventListener('mousemove', (e) => {
  const { nx, ny, vpIdx } = viewportNDC(e.clientX, e.clientY);
  mouse.set(nx, ny);
  raycaster.setFromCamera(mouse, camera);

  const groups = vpIdx === 0 ? [step1_top, step1_bot]
    : vpIdx === 1 ? [step2_panel]
    : vpIdx === 2 ? [step3_top, step3_bot]
    : [step4_panel];
  const meshes = [];
  groups.forEach(g => g.traverse(m => { if (m.isMesh) meshes.push(m); }));
  const hits = raycaster.intersectObjects(meshes, false);

  if (hoveredMesh && hoveredMesh !== hits[0]?.object) {
    const mats = Array.isArray(hoveredMesh.material) ? hoveredMesh.material : [hoveredMesh.material];
    mats.forEach((m, i) => { if (hoveredOrig?.[i]) m.emissive?.copy(hoveredOrig[i]); });
    hoveredMesh = null; hoveredOrig = null;
  }
  if (hits.length > 0) {
    const hit = hits[0], mesh = hit.object;
    if (mesh !== hoveredMesh) {
      hoveredMesh = mesh;
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      hoveredOrig = mats.map(m => m.emissive ? m.emissive.clone() : new THREE.Color(0));
      mats.forEach(m => { if (m.emissive) m.emissive.set(0x333333); });
    }
    // Determine which strip/panel the hovered mesh belongs to
    let p = mesh.parent;
    while (p && p !== step1_top && p !== step1_bot && p !== step2_panel
             && p !== step3_top && p !== step3_bot && p !== step4_panel) p = p.parent;
    hoveredStrip = p === step1_top ? 'A' : p === step1_bot ? 'B'
      : p === step2_panel ? 'P'
      : p === step3_top ? 'C' : p === step3_bot ? 'D'
      : p === step4_panel ? 'P4' : null;
    const geo = mesh.geometry;
    const tris = geo.index ? geo.index.count / 3 : 0;
    const pt = hit.point;
    const bb = new THREE.Box3().setFromObject(mesh);
    const sz = new THREE.Vector3(); bb.getSize(sz);
    const vol = meshVolume(geo);
    const area = meshSurfaceArea(geo);
    const matCount = meshMaterialCount(mesh);
    const species = hitSpecies(hit);
    const fn = hit.face ? hit.face.normal : null;
    const normalStr = fn ? `(${fn.x.toFixed(2)}, ${fn.y.toFixed(2)}, ${fn.z.toFixed(2)})` : '—';
    // Compute the bounding box face area under the cursor.
    // The face normal tells us which bbox face we're on:
    // dominant axis of the normal determines the face plane,
    // and the face area is the product of the other two dimensions.
    let faceArea = 0;
    if (fn) {
      const ax = Math.abs(fn.x), ay = Math.abs(fn.y), az = Math.abs(fn.z);
      if (ax >= ay && ax >= az) faceArea = sz.y * sz.z;       // X face
      else if (ay >= ax && ay >= az) faceArea = sz.x * sz.z;  // Y face
      else faceArea = sz.x * sz.y;                             // Z face
    }
    statusbar.innerHTML =
      `<span class="label">species</span> <span class="val">${species}</span>  ` +
      `<span class="label">vol</span> <span class="val">${fmtVol(vol)}</span>  ` +
      `<span class="label">area</span> <span class="val">${fmtArea(area)}</span>  ` +
      `<span class="label">materials</span> <span class="val">${matCount}</span>  ` +
      `<span class="label">normal</span> <span class="val">${normalStr}</span>  ` +
      `<span class="label">face area</span> <span class="val">${fmtArea(faceArea)}</span>  ` +
      `<span class="label">bounds</span> <span class="val">${sz.x.toFixed(0)}×${sz.y.toFixed(0)}×${sz.z.toFixed(0)}</span>  ` +
      `<span class="label">tris</span> <span class="val">${tris}</span>`;
  } else {
    statusbar.innerHTML = '<span class="dim">hover a piece to inspect</span>';
    hoveredStrip = null;
  }
});

// ─── Click handler for face selection ──────────────────────────────

renderer.domElement.addEventListener('click', (e) => {
  const { nx, ny, vpIdx } = viewportNDC(e.clientX, e.clientY);
  // Only TL (0) and BL (2) viewports have face selection
  if (vpIdx !== 0 && vpIdx !== 2) return;

  const clickMouse = new THREE.Vector2(nx, ny);
  const clickRay = new THREE.Raycaster();
  clickRay.setFromCamera(clickMouse, camera);

  // Test against the appropriate face planes for this viewport
  const allFaces = vpIdx === 0
    ? [...facePlanesA.children, ...facePlanesB.children]
    : [...facePlanesC.children, ...facePlanesD.children];
  const hits = clickRay.intersectObjects(allFaces, false);
  if (hits.length === 0) return;

  const hit = hits[0].object;
  const strip = hit.userData.strip;
  const faceIdx = hit.userData.faceIdx;
  const faceGroup = { A: facePlanesA, B: facePlanesB, C: facePlanesC, D: facePlanesD }[strip];
  const getSel = () => ({ A: selectionA, B: selectionB, C: selectionC, D: selectionD }[strip]);
  const currentSel = getSel();

  if (currentSel && currentSel.faceIdx !== faceIdx) {
    faceGroup.children[currentSel.faceIdx].userData.state = 0;
  }

  const targetMesh = faceGroup.children[faceIdx];
  const prevState = currentSel && currentSel.faceIdx === faceIdx ? (currentSel.rotate ? 2 : 1) : 0;
  const newState = (prevState + 1) % 3;
  targetMesh.userData.state = newState;

  const newSel = newState === 0 ? null : { faceIdx, rotate: newState === 2 };
  if (strip === 'A') selectionA = newSel;
  else if (strip === 'B') selectionB = newSel;
  else if (strip === 'C') selectionC = newSel;
  else selectionD = newSel;

  if (vpIdx === 0) {
    updateFacePlanes(facePlanesA, bbStripA.box);
    updateFacePlanes(facePlanesB, bbStripB.box);
    updateJoinButton();
  } else {
    updateFacePlanes(facePlanesC, bbStripC.box);
    updateFacePlanes(facePlanesD, bbStripD.box);
    updateJoin2Button();
  }

  const fmt = (sel) => sel === null ? 'none' : FACE_DEFS[sel.faceIdx].axis + (FACE_DEFS[sel.faceIdx].sign > 0 ? '+' : '-') + (sel.rotate ? ' (rot)' : '');
  console.log(`Face selection: A=${fmt(selectionA)}, B=${fmt(selectionB)}, C=${fmt(selectionC)}, D=${fmt(selectionD)}`);
});

// ─── Join button handler ──────────────────────────────────────────

// Panel assemblies for step 2 (joined) and step 4 (final join)
let panel2 = null; // result of first join — input to second cut
let panel4 = null; // result of second join

// View 3 state
let currentStripC = null, currentStripD = null;
let currentAngleB = 7;

function rebuildCut2() {
  if (!panel2) return;

  // Clean up previous cut strips
  if (currentStripC) currentStripC.forEach(s => s.manifold.delete());
  if (currentStripD) currentStripD.forEach(s => s.manifold.delete());

  step3_top.clear();
  step3_bot.clear();
  step4_panel.clear();

  const rad = currentAngleB * Math.PI / 180;
  const nx = Math.sin(rad), nz = -Math.cos(rad);
  const planeN = new THREE.Vector3(nx, 0, nz);

  // Cut panel2 with the second plane
  const { above, below } = cutPanel(panel2, [nx, 0, nz], 0);
  currentStripC = above;
  currentStripD = below;

  // Render strips with offset for visual separation
  renderPanel(above, step3_top);
  renderPanel(below, step3_bot);
  const sep = 40;
  step3_top.position.copy(planeN.clone().multiplyScalar(sep));
  step3_bot.position.copy(planeN.clone().multiplyScalar(-sep));

  // Update plane B viz position/rotation
  pvB.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), planeN);

  // Update bounding boxes and face planes
  bbStripC.box.setFromObject(step3_top);
  bbStripD.box.setFromObject(step3_bot);
  updateFacePlanes(facePlanesC, bbStripC.box);
  updateFacePlanes(facePlanesD, bbStripD.box);

  // Reset face selections for strips C/D since geometry changed
  selectionC = null;
  selectionD = null;
  facePlanesC.children.forEach(f => f.userData.state = 0);
  facePlanesD.children.forEach(f => f.userData.state = 0);
  updateFacePlanes(facePlanesC, bbStripC.box);
  updateFacePlanes(facePlanesD, bbStripD.box);
  updateJoin2Button();

  console.log(`Cut 2 at ${currentAngleB}°: strip C = ${above.length} segs, strip D = ${below.length} segs`);
}

function updateJoin2Button() {
  const btn = document.getElementById('join2-btn');
  const errEl = document.getElementById('join2-error');
  if (!btn) return;

  if (selectionC === null || selectionD === null) {
    btn.disabled = true;
    errEl.textContent = '';
    return;
  }
  const dimsC = faceDims(bbStripC.box, selectionC.faceIdx);
  const dimsD = faceDims(bbStripD.box, selectionD.faceIdx);
  const tol = 1;
  const match = Math.abs(dimsC[0] - dimsD[0]) < tol && Math.abs(dimsC[1] - dimsD[1]) < tol;
  if (match) {
    btn.disabled = false;
    errEl.textContent = '';
  } else {
    btn.disabled = true;
    errEl.textContent = `face mismatch: ${dimsC[0].toFixed(0)}×${dimsC[1].toFixed(0)} vs ${dimsD[0].toFixed(0)}×${dimsD[1].toFixed(0)}`;
  }
}

document.getElementById('join-btn').addEventListener('click', () => {
  if (selectionA === null || selectionB === null) return;
  if (!currentStripAbove || !currentStripBelow) return;

  // Build panel2 as an assembly, then center it at the origin
  let joined = joinStrips(currentStripAbove, currentStripBelow, selectionA, selectionB);

  // Center at origin
  const bb = panelBoundingBox(joined);
  const c = new THREE.Vector3(); bb.getCenter(c);
  const centered = translatePanel(joined, -c.x, -c.y, -c.z);
  joined.forEach(s => s.manifold.delete());

  // Free old panel2
  if (panel2) panel2.forEach(s => s.manifold.delete());
  panel2 = centered;

  // Render panel2 into view 2
  step2_panel.clear();
  renderPanel(panel2, step2_panel);
  bbPanel2.box.setFromObject(step2_panel);

  const sz = new THREE.Vector3(); bbPanel2.box.getSize(sz);
  console.log(`Joined panel2: ${panel2.length} segments, bounds ${sz.x.toFixed(0)}×${sz.y.toFixed(0)}×${sz.z.toFixed(0)}`);

  // Rebuild view 3 (second cut) with current second slider angle
  rebuildCut2();
});

// ─── Axes gizmo (corner reference) ─────────────────────────────────

const axesScene = new THREE.Scene();
const axesCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
axesCamera.position.set(0, 0, 3);
axesCamera.lookAt(0, 0, 0);

function makeAxis(dir, color) {
  const mat = new THREE.LineBasicMaterial({ color });
  const pts = [new THREE.Vector3(0,0,0), dir.clone()];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, mat);
}
const axesGroup = new THREE.Group();
axesGroup.add(makeAxis(new THREE.Vector3(1,0,0), 0xff4444));
axesGroup.add(makeAxis(new THREE.Vector3(0,1,0), 0x44ff44));
axesGroup.add(makeAxis(new THREE.Vector3(0,0,1), 0x4488ff));

function makeAxisLabel(text, position, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 32, 32);
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  sprite.position.copy(position);
  sprite.scale.set(0.3, 0.3, 1);
  return sprite;
}
axesGroup.add(makeAxisLabel('X', new THREE.Vector3(1.2, 0, 0), '#ff4444'));
axesGroup.add(makeAxisLabel('Y', new THREE.Vector3(0, 1.2, 0), '#44ff44'));
axesGroup.add(makeAxisLabel('Z', new THREE.Vector3(0, 0, 1.2), '#4488ff'));
axesScene.add(axesGroup);

// ─── Render loop: 2x2 viewports ────────────────────────────────────

const axesSize = 80;

function setView(name) {
  // Show/hide everything based on which viewport we're rendering
  step1_top.visible = name === 'cut1';
  step1_bot.visible = name === 'cut1';
  pvA.visible = name === 'cut1';
  facePlanesA.visible = name === 'cut1';
  facePlanesB.visible = name === 'cut1';
  bbStripA.visible = name === 'cut1' && hoveredStrip === 'A';
  bbStripB.visible = name === 'cut1' && hoveredStrip === 'B';

  step2_panel.visible = name === 'join1';
  bbPanel2.visible = name === 'join1' && hoveredStrip === 'P';

  step3_top.visible = name === 'cut2';
  step3_bot.visible = name === 'cut2';
  pvB.visible = name === 'cut2';
  facePlanesC.visible = name === 'cut2';
  facePlanesD.visible = name === 'cut2';
  bbStripC.visible = name === 'cut2' && hoveredStrip === 'C';
  bbStripD.visible = name === 'cut2' && hoveredStrip === 'D';

  step4_panel.visible = name === 'join2';
  bbPanel4.visible = name === 'join2' && hoveredStrip === 'P4';
}

function renderViewport(x, y, w, h, viewName, bg) {
  setView(viewName);
  renderer.setViewport(x, y, w, h);
  renderer.setScissor(x, y, w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setClearColor(bg, 1); renderer.clear();
  renderer.render(scene, camera);

  // Axes gizmo in bottom-left of this viewport
  renderer.setViewport(x + 8, y + 8, axesSize, axesSize);
  renderer.setScissor(x + 8, y + 8, axesSize, axesSize);
  renderer.clearDepth();
  renderer.render(axesScene, axesCamera);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const W = window.innerWidth, H = window.innerHeight;
  const halfW = Math.floor(W / 2);
  const halfH = Math.floor(H / 2);
  renderer.setScissorTest(true);

  axesGroup.quaternion.copy(camera.quaternion).invert();

  // Y in setViewport is measured from the bottom
  // Top row = y = halfH, Bottom row = y = 0
  // TL (cut 1)
  renderViewport(0,       halfH,     halfW,       H - halfH, 'cut1',  0x1c1917);
  // TR (join 1)
  renderViewport(halfW,   halfH,     W - halfW,   H - halfH, 'join1', 0x1a1816);
  // BL (cut 2)
  renderViewport(0,       0,         halfW,       halfH,     'cut2',  0x1a1816);
  // BR (join 2)
  renderViewport(halfW,   0,         W - halfW,   halfH,     'join2', 0x1c1917);

  renderer.setScissorTest(false);
}
animate();

window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));
