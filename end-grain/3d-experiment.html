<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>End-grain — 3D shapes experiment</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #fafaf7;
      color: #222;
      display: flex;
      flex-direction: column;
    }
    body > header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #e4e4e0;
      background: #fff;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    body > header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
    body > header .subtitle {
      margin: 0;
      font-size: 0.8rem;
      color: #888;
    }
    main {
      flex: 1;
      min-height: 0;
      padding: 1.5rem;
      display: flex;
      gap: 1rem;
      overflow: auto;
    }
    .tile {
      background: #fff;
      border: 1px solid #e4e4e0;
      border-radius: 8px;
      padding: 0.75rem 0.75rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
      min-width: 0;
      flex: 1 1 0;
    }
    .tile header {
      padding: 0;
      border: none;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .tile h2 {
      margin: 0;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .tile .subtitle {
      margin: 0;
      font-size: 0.7rem;
      color: #888;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .tile .render {
      flex: 1;
      background: #f6f5f1;
      border-radius: 4px;
      min-height: 320px;
      overflow: hidden;
      position: relative;
    }
    .tile canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .status {
      padding: 0.75rem 1.5rem;
      font-size: 0.75rem;
      color: #888;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <header>
    <h1>End-grain — 3D shapes experiment</h1>
    <p class="subtitle">rect / parallelogram / wedge · <code>3d-experiment.html</code></p>
  </header>
  <main>
    <section class="tile" data-tile="rect">
      <header>
        <h2>Rectangle</h2>
        <p class="subtitle">500 × 50 × 50 mm · no cuts</p>
      </header>
      <div class="render" data-slot="render"></div>
    </section>
    <section class="tile" data-tile="parallelogram">
      <header>
        <h2>Parallelogram</h2>
        <p class="subtitle">short ends chopped 45° in XZ</p>
      </header>
      <div class="render" data-slot="render"></div>
    </section>
    <section class="tile" data-tile="wedge">
      <header>
        <h2>Wedge</h2>
        <p class="subtitle">long sides cut to triangular YZ cross-section</p>
      </header>
      <div class="render" data-slot="render"></div>
    </section>
  </main>
  <div class="status" data-slot="status">initializing…</div>
  <script type="module" src="./src/main-experiment.ts"></script>
</body>
</html>
