<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>End Grain — 3D Experiment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1c1917; overflow: hidden; font-family: 'Geist Mono', monospace; }
  #info {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    color: #a8a29e; font-size: 10px; line-height: 1.5;
    pointer-events: none; user-select: none;
  }
  #info strong { color: #e4cc8f; }
  .step-label {
    position: fixed; z-index: 10; pointer-events: none; user-select: none;
    color: #b45309; font-size: 9px; letter-spacing: 0.5px;
    background: rgba(28,25,23,0.8); padding: 3px 8px; border-radius: 3px;
  }
  .divider { position: fixed; background: #3d3835; z-index: 5; }
  /* Per-view status footers — full-width footers for their respective
     viewport tiles, styled to match the global page footer. */
  .tile-status {
    position: fixed; z-index: 10; pointer-events: none; user-select: none;
    height: 28px; display: flex; align-items: center;
    padding: 0 12px;
    background: rgba(28,25,23,0.92); border-top: 1px solid #3d3835;
    font-size: 10px; color: #a8a29e;
  }
  #join1-status { bottom: 28px; left: 66.667%; right: 0; }
  #statusbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    height: 28px; display: flex; align-items: center; gap: 16px;
    padding: 0 12px;
    background: rgba(28,25,23,0.92); border-top: 1px solid #3d3835;
    font-size: 10px; color: #78716c;
  }
  #statusbar .label { color: #a8a29e; text-transform: uppercase; letter-spacing: 0.5px; }
  #statusbar .val { color: #e4cc8f; }
  #statusbar .dim { color: #555; }
  .ctrl-panel {
    position: fixed; z-index: 10;
    background: rgba(28,25,23,0.92); border: 1px solid #3d3835;
    border-radius: 6px; padding: 12px 16px;
    color: #a8a29e; font-size: 10px;
  }
  /* Starting panel tile occupies left third → strip controls dock to its
     top-right corner. Cut A controls dock to top-right of the cut A tile
     (middle column). Cut B controls dock to top-right of the cut B tile
     (middle column, bottom row). */
  #strip-controls {
    top: 10px; right: calc(66.667% + 10px);
    max-height: calc(100vh - 20px); overflow-y: auto;
    width: 280px;
  }
  #controls { top: 10px; right: calc(33.333% + 10px); }
  #strip-controls .row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 10px; }
  #strip-controls select {
    background: #2a2622; color: #e4cc8f; border: 1px solid #3d3835;
    border-radius: 3px; padding: 2px 4px; font-family: inherit; font-size: 10px;
  }
  #strip-controls .swatch {
    width: 14px; height: 14px; border: 1px solid #3d3835; border-radius: 2px;
    display: inline-block; vertical-align: middle; flex: 0 0 auto;
  }
  #strip-controls .strip-row {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 0; font-size: 10px;
  }
  #strip-controls .strip-row select { flex: 1 1 auto; min-width: 0; }
  #strip-controls .strip-row input[type="number"] {
    width: 42px; background: #2a2622; color: #e4cc8f;
    border: 1px solid #3d3835; border-radius: 3px;
    padding: 2px 3px; font-family: inherit; font-size: 10px;
  }
  #strip-controls .strip-row button {
    width: 18px; height: 18px; padding: 0; line-height: 1;
    background: #2a2622; color: #a8a29e; border: 1px solid #3d3835;
    border-radius: 3px; font-family: inherit; font-size: 10px;
    cursor: pointer; flex: 0 0 auto;
  }
  #strip-controls .strip-row button:disabled { opacity: 0.3; cursor: default; }
  #strip-controls .strip-row button:not(:disabled):hover { background: #3d3835; color: #e4cc8f; }
  #strip-controls .strip-list {
    max-height: 360px; overflow-y: auto;
    border: 1px solid #3d3835; border-radius: 4px;
    padding: 4px; margin-bottom: 6px;
  }
  #strip-controls .action-row {
    display: flex; gap: 4px; margin-top: 4px;
  }
  #strip-controls .action-row button {
    flex: 1; padding: 4px; background: #2d3a4a; color: #a8a29e;
    border: 1px solid #3d4a5a; border-radius: 3px;
    font-family: inherit; font-size: 9px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  #strip-controls .action-row button:hover { background: #3d4a5a; color: #e4cc8f; }
  #strip-controls .preset-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 10px; }
  #strip-controls .preset-row select { flex: 1; }
  button.join-btn:disabled { opacity: 0.4; cursor: default; }
  button.join-btn:not(:disabled):hover { background: #3d7a37; }
  button.flip-btn {
    flex: 1; padding: 4px; background: #2d3a4a; color: #a8a29e;
    border: 1px solid #3d4a5a; border-radius: 3px;
    font-family: inherit; font-size: 10px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  button.flip-btn:disabled { opacity: 0.3; cursor: default; }
  button.flip-btn.selected { background: #2d5a8a; color: #e4cc8f; border-color: #4d7aaa; }
  button.flip-btn:not(:disabled):not(.selected):hover { background: #3d4a5a; }
  button.join-btn {
    margin-top:6px; width:100%; padding:6px; background:#2d5a27;
    color:#e4cc8f; border:1px solid #3d5a37; border-radius:4px;
    font-family:inherit; font-size:10px; letter-spacing:0.5px;
    cursor:pointer; text-transform:uppercase;
  }
  .ctrl-panel label { display: block; margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  .ctrl-panel input[type="range"] {
    width: 160px; accent-color: #b45309;
  }
  .ctrl-panel .angle-val { color: #e4cc8f; font-weight: bold; }
  /* Quick camera-angle buttons positioned next to each viewport's
     axes gizmo in the lower-left corner of the tile. */
  .view-quick-btns {
    position: fixed; z-index: 11;
    display: flex; gap: 4px;
    pointer-events: auto;
  }
  /* Three-tile layout: panel | cut A | join 1, each full-height. */
  .view-quick-btns[data-tile="panel"] { bottom: 60px; left: 96px; }
  .view-quick-btns[data-tile="cutA"]  { bottom: 60px; left: calc(33.333% + 96px); }
  .view-quick-btns[data-tile="join1"] { bottom: 60px; left: calc(66.667% + 96px); }
  .view-quick-btns button {
    padding: 3px 8px; font-size: 9px;
    font-family: inherit; letter-spacing: 0.5px;
    background: rgba(28,25,23,0.85); color: #a8a29e;
    border: 1px solid #3d3835; border-radius: 3px;
    cursor: pointer; text-transform: uppercase;
  }
  .view-quick-btns button:hover { background: #3d3835; color: #e4cc8f; }
  button.mode-btn {
    flex: 1; padding: 3px; background: #2d3a4a; color: #a8a29e;
    border: 1px solid #3d4a5a; border-radius: 3px;
    font-family: inherit; font-size: 9px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  button.mode-btn.selected { background: #2d5a8a; color: #e4cc8f; border-color: #4d7aaa; }
  button.mode-btn:not(.selected):hover { background: #3d4a5a; }
  .ctrl-panel .shift-val { color: #e4cc8f; font-weight: bold; }
</style>
</head>
<body>
<div id="info">
  <strong>End Grain — Cut + Combine</strong><br>
  left: diagonal cut &middot; right: joined
</div>
<div id="strip-controls" class="ctrl-panel">
  <label>starting strips</label>
  <label style="margin-top:6px;">height: <span id="strip-h-val" class="angle-val">50mm</span></label>
  <input type="range" id="strip-h-slider" min="10" max="120" step="1" value="50">
  <label style="margin-top:6px;">length: <span id="strip-l-val" class="angle-val">400mm</span></label>
  <input type="range" id="strip-l-slider" min="100" max="800" step="10" value="400">
  <label style="margin-top:8px;">strips (left &rarr; right)</label>
  <div id="strip-list" class="strip-list"></div>
  <div class="action-row">
    <button id="strip-add" type="button">+ add</button>
    <button id="strip-dup" type="button">duplicate last</button>
  </div>
  <div class="preset-row">
    <label style="margin:0;">preset:</label>
    <select id="strip-preset">
      <option value="">(choose&hellip;)</option>
      <option value="ab8">A/B &times;8 (maple/walnut)</option>
      <option value="abc4">A/B/C &times;4 (maple/walnut/cherry)</option>
      <option value="bookmatch">bookmatch maple/walnut</option>
      <option value="single">single maple slab</option>
      <option value="rainbow">rainbow (all 5)</option>
    </select>
  </div>
</div>
<div id="controls" class="ctrl-panel">
  <label>cut A &mdash; rip: <span id="rip-val" class="angle-val">0°</span></label>
  <input type="range" id="rip-slider" min="-90" max="90" step="1" value="0">
  <label style="margin-top:6px;">bevel: <span id="bevel-val" class="angle-val">90°</span></label>
  <input type="range" id="bevel-slider" min="45" max="90" step="1" value="90">
  <label style="margin-top:6px;">slice thickness: <span id="pitch-val" class="angle-val">50mm</span></label>
  <input type="range" id="pitch-slider" min="5" max="200" step="5" value="50">
  <label style="margin-top:6px; display:flex; align-items:center; gap:6px; text-transform:none; letter-spacing:0;">
    <input type="checkbox" id="offcuts-cb" checked> show offcuts
  </label>
  <div style="margin-top:10px; padding-top:8px; border-top:1px solid #3d3835; font-size:9px; color:#a8a29e;">arrangement</div>
  <div class="mode-switch" style="display:flex; gap:4px; margin-top:4px;">
    <button class="mode-btn selected" data-view="1" data-mode="pattern">pattern</button>
    <button class="mode-btn" data-view="1" data-mode="custom">custom</button>
  </div>
  <div class="pattern-ctrls" data-view="1" style="margin-top:6px;">
    <select class="pattern-select" data-view="1"
            style="width:100%; background:#2a2622; color:#e4cc8f; border:1px solid #3d3835; border-radius:3px; padding:3px; font-family:inherit; font-size:10px;">
      <option value="identity">identity (reassemble)</option>
      <option value="flipAlternate" selected>flipAlternate (checker)</option>
      <option value="rotateAlternate">rotateAlternate</option>
      <option value="shiftAlternate">shiftAlternate (running bond)</option>
      <option value="mirrorAlternate">mirrorAlternate (chevron)</option>
    </select>
    <div class="shift-row" data-view="1" style="display:none; margin-top:6px;">
      <label>shift: <span class="shift-val" data-view="1" class="angle-val">25mm</span></label>
      <input type="range" class="shift-slider" data-view="1" min="-200" max="200" step="5" value="25">
    </div>
  </div>
  <div class="custom-ctrls" data-view="1" style="display:none; margin-top:6px;">
    <div style="font-size:9px; color:#78716c;">click a face on each strip to select join faces</div>
    <button id="join-btn" class="join-btn" disabled>join selected faces</button>
    <div id="flip-axis-row" style="display:none; margin-top:6px;">
      <div style="font-size:9px; color:#78716c; margin-bottom:4px;">parallel normals — pick flip axis:</div>
      <div style="display:flex; gap:4px;">
        <button class="flip-btn" data-pair="1" data-axis="x">X</button>
        <button class="flip-btn" data-pair="1" data-axis="y">Y</button>
        <button class="flip-btn" data-pair="1" data-axis="z">Z</button>
      </div>
    </div>
    <div id="join-error" style="margin-top:4px; font-size:9px; color:#c0392b;"></div>
  </div>
</div>
<!-- Per-view join status footers are injected by JS only when
     ANIMATE_JOINS is enabled (see tile-status CSS + ANIMATE_JOINS flag). -->
<div id="statusbar"><span class="dim">hover a piece to inspect</span></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import {
  Panel,
  initManifold,
  planeNormal,
  panelExtentAlongNormal,
  classifyNormals,
  perpAxes,
  checkJoinCompat,
  buildJoinStages,
  stageMatrixAtProgress,
  PATTERN_RULES,
  PATTERN_RULES_AT,
  applyArrangement,
} from './src/domain/index.ts';

// ─── Renderer ──────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// ─── Scene ─────────────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1917);

scene.add((() => {
  const k = new THREE.DirectionalLight(0xfff5e6, 1.6);
  k.position.set(300, 400, 200); k.castShadow = true;
  k.shadow.mapSize.set(1024, 1024);
  k.shadow.camera.near = 50; k.shadow.camera.far = 1200;
  k.shadow.camera.left = -500; k.shadow.camera.right = 500;
  k.shadow.camera.top = 500; k.shadow.camera.bottom = -500;
  return k;
})());
scene.add(new THREE.DirectionalLight(0xc8d8e8, 0.8).translateX(-200).translateY(100).translateZ(-100));
scene.add(new THREE.DirectionalLight(0xd4c8b8, 0.7).translateY(-300));
scene.add(new THREE.DirectionalLight(0xb8c0c8, 0.4).translateX(-100).translateY(200).translateZ(-300));
scene.add(new THREE.AmbientLight(0x4a4440, 1.2));

// ─── Wood materials ────────────────────────────────────────────────

function makeEndGrainTex(base, ring) {
  const s = 256, c = document.createElement('canvas'); c.width = s; c.height = s;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, s, s);
  for (let i = 12; i >= 1; i--) {
    x.beginPath(); x.arc(s*.48, s*.52, (i/12)*s*.45, 0, Math.PI*2);
    x.strokeStyle = ring; x.lineWidth = 1.2; x.globalAlpha = .25+(i/12)*.15; x.stroke();
  }
  x.globalAlpha = 1;
  return new THREE.CanvasTexture(c);
}
function makeSideMat(base, grain) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 30; i++) {
    const px = Math.random()*256; x.beginPath(); x.moveTo(px, 0);
    for (let y = 0; y < 256; y += 10) x.lineTo(px+(Math.random()-.5)*4, y);
    x.strokeStyle = grain; x.lineWidth = .8+Math.random(); x.globalAlpha = .1+Math.random()*.15; x.stroke();
  }
  return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(c), roughness: 0.65 });
}
function makeWoodMats(base, ring, grain) {
  const e = new THREE.MeshStandardMaterial({ map: makeEndGrainTex(base, ring), roughness: 0.7 });
  const s = makeSideMat(base, grain);
  return [s, s, e, e, s, s];
}
const mapleMats      = makeWoodMats('#e4cc8f', '#b5a06a', '#c4aa70');
const walnutMats     = makeWoodMats('#3d2416', '#2a1a0e', '#4a2e1a');
const cherryMats     = makeWoodMats('#c97050', '#8a3018', '#a8503a');
const padaukMats     = makeWoodMats('#c84020', '#8a2010', '#a83018');
const purpleheartMats= makeWoodMats('#5a2a6a', '#3a1545', '#4a2055');

// Available species (label → side material). speciesMaterials below is
// derived from this list.
const SPECIES_DEFS = {
  maple:       mapleMats,
  walnut:      walnutMats,
  cherry:      cherryMats,
  padauk:      padaukMats,
  purpleheart: purpleheartMats,
};
const SPECIES_LIST = Object.keys(SPECIES_DEFS);

// Map every material to a species name for status bar lookup
const matSpecies = new Map();
for (const [name, mats] of Object.entries(SPECIES_DEFS)) {
  mats.forEach(m => matSpecies.set(m, name));
}

// ─── Geometry stats helpers ───────────────────────────────────────

// Signed volume of a triangle with vertices a, b, c (relative to origin)
function signedTriVol(a, b, c) {
  return a.dot(new THREE.Vector3().crossVectors(b, c)) / 6;
}

function meshVolume(geo) {
  const pos = geo.attributes.position;
  const idx = geo.index;
  if (!idx) return 0;
  let vol = 0;
  const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
  for (let i = 0; i < idx.count; i += 3) {
    a.fromBufferAttribute(pos, idx.getX(i));
    b.fromBufferAttribute(pos, idx.getX(i + 1));
    c.fromBufferAttribute(pos, idx.getX(i + 2));
    vol += signedTriVol(a, b, c);
  }
  return Math.abs(vol);
}

function meshSurfaceArea(geo) {
  const pos = geo.attributes.position;
  const idx = geo.index;
  if (!idx) return 0;
  let area = 0;
  const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
  const ab = new THREE.Vector3(), ac = new THREE.Vector3();
  for (let i = 0; i < idx.count; i += 3) {
    a.fromBufferAttribute(pos, idx.getX(i));
    b.fromBufferAttribute(pos, idx.getX(i + 1));
    c.fromBufferAttribute(pos, idx.getX(i + 2));
    ab.subVectors(b, a);
    ac.subVectors(c, a);
    area += ab.cross(ac).length() / 2;
  }
  return area;
}

function meshMaterialCount(mesh) {
  const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
  // With CSG multi-material, groups map triangle ranges to material indices
  const geo = mesh.geometry;
  const usedIndices = new Set();
  if (geo.groups && geo.groups.length > 0) {
    geo.groups.forEach(g => usedIndices.add(g.materialIndex));
  } else {
    return mats.length;
  }
  return usedIndices.size;
}

function hitSpecies(hit) {
  const mesh = hit.object;
  const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
  const geo = mesh.geometry;
  // Find which material group this face belongs to
  if (geo.groups && geo.groups.length > 0) {
    const faceStart = hit.faceIndex * 3;
    for (const g of geo.groups) {
      if (faceStart >= g.start && faceStart < g.start + g.count) {
        const mat = mats[g.materialIndex];
        return matSpecies.get(mat) || '?';
      }
    }
  }
  // Single material
  return matSpecies.get(mats[0]) || '?';
}

function fmtVol(mm3) {
  if (mm3 > 1e6) return (mm3 / 1e6).toFixed(1) + ' cm³';
  return mm3.toFixed(0) + ' mm³';
}

function fmtArea(mm2) {
  if (mm2 > 1e4) return (mm2 / 1e4).toFixed(1) + ' cm²';
  return mm2.toFixed(0) + ' mm²';
}

// ─── Dimensions ────────────────────────────────────────────────────

// Default starting-strip dimensions. Used ONLY when constructing the
// initial panel from the strip controls — nothing downstream may assume
// these values; instead, downstream code must read the panel's actual
// bounding box. The user wants per-strip sizing eventually.
// Ordered list of starting strips, glued edge-to-edge along X.
// Each entry is { species, width }. Height (Y) + length (Z) are
// uniform across all strips.
let initialStrips = [];
for (let i = 0; i < 16; i++) {
  initialStrips.push({ species: i % 2 === 0 ? 'maple' : 'walnut', width: 50 });
}
let initialStripHeight = 50;
let initialStripLength = 400;

// ─── Manifold init + assembly model ───────────────────────────────
//
// A "panel" is an array of { manifold, species } objects — an assembly
// of individual segments that are treated as one logical piece.
// Cutting a panel = cutting each segment individually with the same plane.
// No CSG union needed — segments keep their identity and materials.

// Scene groups
const step0_panel = new THREE.Group(); // starting (assembled) panel
scene.add(step0_panel);
const step1_top = new THREE.Group(); // strip A
const step1_bot = new THREE.Group(); // strip B
scene.add(step1_top);
scene.add(step1_bot);

// Plane viz: starts as a unit-size placeholder; resized on each rebuild
// to safely cover whatever panel is being cut (the panel's diagonal
// guarantees full coverage at any blade angle).
const pvA = new THREE.Mesh(
  new THREE.PlaneGeometry(1, 1),
  new THREE.MeshBasicMaterial({ color: 0xc0392b, transparent: true, opacity: 0.07, side: THREE.DoubleSide, depthWrite: false })
);
scene.add(pvA);

const step2_panel = new THREE.Group();
scene.add(step2_panel);

// Bounding boxes (kept as data only — not added to scene; used for join logic)
const bbStripA = { box: new THREE.Box3() };
const bbStripB = { box: new THREE.Box3() };
const bbPanel2 = { box: new THREE.Box3() };

// ─── New face selection: click any part of a face to select the whole face ──
//
// A "face" is the set of all coplanar triangles in a strip that share the same
// plane equation (same normal + same signed distance from origin).
//
// Selection stores face properties:
//   { normal, centroid, u, v, minU, maxU, minV, maxV, width, height, planeD, rotate }

let selectionA = null, selectionB = null;

// Highlight meshes for each strip's selected face.
// Added as children of each strip group so they inherit the strip's offset.
const highlightA = new THREE.Group(); scene.add(highlightA);
const highlightB = new THREE.Group(); scene.add(highlightB);

const HL_COLOR_SEL = 0x22cc44;      // green — selected
const HL_COLOR_ROT = 0xff9922;      // orange — selected with rotation

// Find the full face (all coplanar triangles) that contains the clicked triangle.
// stripGroup is the THREE.Group containing all segment meshes of the strip.
// hit is the raycaster hit object.
function findFaceAtHit(hit, stripGroup) {
  // Compute face data in MODEL space (the strip group's local coords).
  // Each segment mesh has identity local transform, so its raw vertex
  // positions match the underlying manifold's coords. The strip group
  // has only a translation offset for visual separation in the cut view —
  // we ignore that here so the face data aligns with the manifold data.
  const mesh = hit.object;
  const geo = mesh.geometry;
  const pos = geo.attributes.position;
  const idx = geo.index;
  const faceIdx = hit.faceIndex;

  // Get clicked triangle vertices in model space
  const a = new THREE.Vector3().fromBufferAttribute(pos, idx.getX(faceIdx * 3));
  const b = new THREE.Vector3().fromBufferAttribute(pos, idx.getX(faceIdx * 3 + 1));
  const c = new THREE.Vector3().fromBufferAttribute(pos, idx.getX(faceIdx * 3 + 2));

  const normal = new THREE.Vector3().subVectors(b, a).cross(new THREE.Vector3().subVectors(c, a)).normalize();
  const planeD = normal.dot(a);

  // Find all coplanar triangles in the strip
  const normalTol = 0.001;
  const distTol = 0.5;
  const verts = [];

  stripGroup.traverse(m => {
    if (!m.isMesh) return;
    const g = m.geometry;
    const p = g.attributes.position;
    const i = g.index;
    const va = new THREE.Vector3(), vb = new THREE.Vector3(), vc = new THREE.Vector3();
    const ab = new THREE.Vector3(), ac = new THREE.Vector3();
    const n = new THREE.Vector3();
    for (let t = 0; t < i.count; t += 3) {
      va.fromBufferAttribute(p, i.getX(t));
      vb.fromBufferAttribute(p, i.getX(t + 1));
      vc.fromBufferAttribute(p, i.getX(t + 2));
      ab.subVectors(vb, va);
      ac.subVectors(vc, va);
      n.crossVectors(ab, ac).normalize();
      if (Math.abs(1 - n.dot(normal)) > normalTol) continue;
      const dT = n.dot(va);
      if (Math.abs(dT - planeD) > distTol) continue;
      verts.push(va.clone(), vb.clone(), vc.clone());
    }
  });

  if (verts.length === 0) return null;

  // Centroid
  const centroid = new THREE.Vector3();
  verts.forEach(v => centroid.add(v));
  centroid.divideScalar(verts.length);

  // 2D basis in the face plane
  const ref = Math.abs(normal.y) < 0.9 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
  const u = new THREE.Vector3().crossVectors(ref, normal).normalize();
  const v = new THREE.Vector3().crossVectors(normal, u).normalize();

  // 2D bounds in (u, v) relative to centroid
  let minU = Infinity, maxU = -Infinity, minV = Infinity, maxV = -Infinity;
  const tmp = new THREE.Vector3();
  verts.forEach(vert => {
    tmp.subVectors(vert, centroid);
    const uu = tmp.dot(u), vv = tmp.dot(v);
    if (uu < minU) minU = uu;
    if (uu > maxU) maxU = uu;
    if (vv < minV) minV = vv;
    if (vv > maxV) maxV = vv;
  });

  return {
    normal, centroid, u, v,
    minU, maxU, minV, maxV,
    width: maxU - minU, height: maxV - minV,
    planeD,
    rotate: false,
  };
}

// Build a flat polygon mesh that highlights the selected face.
// The highlight is positioned in MODEL space (matching the face data) — it
// will be added as a child of the strip group, so it inherits the group's
// world offset for display.
function buildFaceHighlight(face, color) {
  const geo = new THREE.PlaneGeometry(face.width, face.height);
  const mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.45,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);

  const center = face.centroid.clone()
    .addScaledVector(face.u, (face.minU + face.maxU) / 2)
    .addScaledVector(face.v, (face.minV + face.maxV) / 2)
    .addScaledVector(face.normal, 2);
  const matrix = new THREE.Matrix4().makeBasis(face.u, face.v, face.normal);
  matrix.setPosition(center);
  mesh.matrix.copy(matrix);
  mesh.matrixAutoUpdate = false;
  return mesh;
}

function setStripSelection(strip, selection) {
  const hlGroup = { A: highlightA, B: highlightB }[strip];
  const stripGroup = { A: step1_top, B: step1_bot }[strip];
  hlGroup.clear();
  if (!selection) {
    if (strip === 'A') selectionA = null;
    else selectionB = null;
    return;
  }
  const color = selection.rotate ? HL_COLOR_ROT : HL_COLOR_SEL;
  hlGroup.add(buildFaceHighlight(selection, color));
  hlGroup.position.copy(stripGroup.position);
  if (strip === 'A') selectionA = selection;
  else selectionB = selection;
}

// Check if two selection faces are "the same face" (same plane).
function sameFace(selA, faceB) {
  if (!selA || !faceB) return false;
  if (Math.abs(1 - selA.normal.dot(faceB.normal)) > 0.001) return false;
  if (Math.abs(selA.planeD - faceB.planeD) > 0.5) return false;
  return true;
}

// Material per species: index 0 = maple, index 1 = walnut
const speciesMaterials = Object.fromEntries(
  SPECIES_LIST.map(name => [name, SPECIES_DEFS[name][0]]),
);

let manifoldReady = false;
let initialPanel; // Panel

async function init() {
  console.log('Loading manifold-3d WASM...');
  await initManifold();
  manifoldReady = true;
  console.log('Manifold ready.');

  rebuildInitialPanel();

  // Frame the camera around the starting panel — its size sets the scale
  // of everything downstream.
  const frame = new THREE.Box3();
  frame.expandByObject(step0_panel);
  frameCameraToBox(frame, 1.4);
}

// Convert a single Manifold to a Three.js Mesh with the given material
function manifoldToThree(mf, material) {
  const mesh = mf.getMesh();
  const numVerts = mesh.numVert;
  const numProp = mesh.numProp;

  const positions = new Float32Array(numVerts * 3);
  for (let i = 0; i < numVerts; i++) {
    positions[i * 3]     = mesh.vertProperties[i * numProp];
    positions[i * 3 + 1] = mesh.vertProperties[i * numProp + 1];
    positions[i * 3 + 2] = mesh.vertProperties[i * numProp + 2];
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setIndex(new THREE.BufferAttribute(new Uint32Array(mesh.triVerts), 1));
  geo.computeVertexNormals();

  // Clone material and enable flat shading for hard edges
  const mat = material.clone();
  mat.flatShading = true;
  const obj = new THREE.Mesh(geo, mat);
  obj.castShadow = true;
  return obj;
}

// Render a Panel into a Three.js group. Idempotent — clears the group
// (disposing geometry) and rebuilds meshes from the Panel's current
// manifold state. The group's position/rotation are untouched: this is
// purely a geometry write.
function renderPanel(panel, group) {
  while (group.children.length) {
    const c = group.children[0];
    group.remove(c);
    if (c.geometry) c.geometry.dispose();
  }
  for (const seg of panel.segments) {
    const mat = speciesMaterials[seg.species];
    group.add(manifoldToThree(seg.manifold, mat));
  }
}

function fmtAxis(v) {
  const ax = Math.abs(v.x), ay = Math.abs(v.y), az = Math.abs(v.z);
  if (ax > 0.99) return (v.x > 0 ? '+' : '-') + 'X';
  if (ay > 0.99) return (v.y > 0 ? '+' : '-') + 'Y';
  if (az > 0.99) return (v.z > 0 ? '+' : '-') + 'Z';
  return `(${v.x.toFixed(2)}, ${v.y.toFixed(2)}, ${v.z.toFixed(2)})`;
}

function stageStatus(stage, progress) {
  if (stage.type === 'rotation') {
    const deg = stage.angle * progress * 180 / Math.PI;
    return `${stage.label}: ${deg.toFixed(1)}° about ${fmtAxis(stage.axis)} axis`;
  }
  const d = stage.delta.clone().multiplyScalar(progress);
  return `${stage.label}: Δ=(${d.x.toFixed(1)}, ${d.y.toFixed(1)}, ${d.z.toFixed(1)}) mm`;
}

// ─── Arrangement animation (debug) ────────────────────────────────
//
// When ANIMATE_ARRANGEMENT is true, applyPatternA/B start an animation
// that renders the arrangement step frame-by-frame: each slice's rule
// matrix is scaled by an eased progress, baked into manifold geometry,
// and rendered. On the final frame the slices are concat'd into a
// single Panel and handed off as panel2. Designed as a debug
// tool to make the rule-applied transforms visible.
const ANIMATE_ARRANGEMENT = false;
const ARRANGEMENT_DURATION_MS = 1500;

let arrangeAnim = null;

function cancelArrangeAnim() {
  if (!arrangeAnim) return;
  if (arrangeAnim.rafId) cancelAnimationFrame(arrangeAnim.rafId);
  // Per-frame baked panels — not yet handed off, safe to dispose.
  for (const p of arrangeAnim.lastBakes) p.dispose();
  arrangeAnim = null;
}

function animateArrangement(slices, pattern, cutNormal, pitch, options, targetGroup, onComplete) {
  cancelArrangeAnim();
  if (slices.length === 0) { onComplete?.(null); return; }

  const ruleAt = PATTERN_RULES_AT[pattern] ?? PATTERN_RULES_AT.identity;
  const center = (slices.length - 1) / 2;
  const start = performance.now();

  arrangeAnim = { rafId: null, lastBakes: [], targetGroup };

  function frame(now) {
    if (!arrangeAnim) return;
    const t = Math.min((now - start) / ARRANGEMENT_DURATION_MS, 1);
    const eased = 0.5 - Math.cos(t * Math.PI) / 2;

    // Dispose previous frame's bakes, then build new ones.
    for (const p of arrangeAnim.lastBakes) p.dispose();
    arrangeAnim.lastBakes = [];
    targetGroup.clear();

    for (let i = 0; i < slices.length; i++) {
      const slice = slices[i];
      const bb = slice.boundingBox();
      const sc = new THREE.Vector3(); bb.getCenter(sc);
      const toLocal = new THREE.Matrix4().makeTranslation(-sc.x, -sc.y, -sc.z);
      const ruleMat = ruleAt(i, slices.length, options, eased);
      const target = cutNormal.clone().multiplyScalar((i - center) * pitch);
      const toStack = new THREE.Matrix4().makeTranslation(target.x, target.y, target.z);
      const full = new THREE.Matrix4().multiplyMatrices(toStack, ruleMat).multiply(toLocal);

      const baked = slice.transform(full);
      arrangeAnim.lastBakes.push(baked);

      const g = new THREE.Group();
      renderPanel(baked, g);
      targetGroup.add(g);
    }

    if (t < 1) {
      arrangeAnim.rafId = requestAnimationFrame(frame);
      return;
    }

    // Final frame: concat all bakes into a single Panel, center, hand off.
    // After concat, segments are shared with `final` so DON'T dispose bakes.
    let final = null;
    for (const baked of arrangeAnim.lastBakes) {
      final = final ? final.concat(baked) : baked;
    }
    if (final) {
      const bb2 = final.boundingBox();
      const c = new THREE.Vector3(); bb2.getCenter(c);
      if (c.length() > 1e-6) {
        const centered = final.translate(-c.x, -c.y, -c.z);
        final.dispose();
        final = centered;
      }
      targetGroup.clear();
      renderPanel(final, targetGroup);
    }
    arrangeAnim.lastBakes = []; // ownership transferred to `final`
    arrangeAnim = null;
    onComplete?.(final);
  }

  arrangeAnim.rafId = requestAnimationFrame(frame);
}

// ─── Build pipeline from rip + bevel ──────────────────────────────

// Current cut A result: array of slice Panels and two offcut Panels.
// slicesA[i] is an individual slice; offcutsA is a 2-element array.
let slicesA = [];
let offcutsA = [];

// Legacy single-joint state — populated only in custom mode (for the
// existing face-click flow). Pattern mode uses slicesA directly.
let currentStripAbove = null, currentStripBelow = null;

// Build a semi-transparent material per species for rendering offcuts.
const offcutMats = {};
for (const sp of SPECIES_LIST) {
  const m = speciesMaterials[sp].clone();
  m.transparent = true;
  m.opacity = 0.25;
  m.depthWrite = false;
  m.flatShading = true;
  offcutMats[sp] = m;
}

// Render a Panel with greyed-out/dim material (for offcuts).
function renderPanelDim(panel, group) {
  while (group.children.length) {
    const c = group.children[0];
    group.remove(c);
    if (c.geometry) c.geometry.dispose();
  }
  for (const seg of panel.segments) {
    const mat = offcutMats[seg.species] ?? offcutMats.maple;
    group.add(manifoldToThree(seg.manifold, mat));
  }
}

// Resize a plane-viz mesh to safely cover the given panel at any blade
// angle (uses the panel's bounding-box diagonal as the side length, so
// the plane is square and big enough no matter how it's oriented).
function sizePlaneViz(plane, panel) {
  const sz = new THREE.Vector3();
  panel.boundingBox().getSize(sz);
  const diag = sz.length() + 200;
  plane.geometry.dispose();
  plane.geometry = new THREE.PlaneGeometry(diag, diag);
}

function rebuild(rip, bevel, pitch) {
  if (!manifoldReady) return;

  const planeN = planeNormal(rip, bevel);
  const planeNArr = [planeN.x, planeN.y, planeN.z];
  // Slice count is a consequence of panel extent and pitch — the panel
  // sets the upper bound, the pitch sets the spacing.
  const extent = panelExtentAlongNormal(initialPanel, planeN);
  const count = Math.max(1, Math.floor(extent / pitch));

  // Dispose previous slices + offcuts + legacy custom-mode halves.
  for (const s of slicesA) s.dispose();
  for (const o of offcutsA) o.dispose();
  slicesA = []; offcutsA = [];
  if (currentStripAbove) { currentStripAbove.dispose(); currentStripAbove = null; }
  if (currentStripBelow) { currentStripBelow.dispose(); currentStripBelow = null; }

  step1_top.clear();
  step1_bot.clear();
  step2_panel.clear();

  // Cut the initial panel into `count` slices plus 2 end offcuts.
  const { slices, offcuts } = initialPanel.cutRepeated(planeNArr, pitch, count, 0);
  slicesA = slices;
  offcutsA = offcuts;

  // Fan slices out along the cut normal so the user can see them separately.
  // Each slice is offset by (i - (count-1)/2) * sliceSpacing.
  const SLICE_SPACING = Math.max(pitch * 1.5, 80);
  const center = (count - 1) / 2;
  slices.forEach((slice, i) => {
    const g = new THREE.Group();
    g.userData.sliceIdx = i;
    renderPanel(slice, g);
    g.position.copy(planeN.clone().multiplyScalar((i - center) * SLICE_SPACING));
    step1_top.add(g);
  });

  // Offcuts pushed further out beyond the end slices.
  const offcutOffset = (count / 2 + 1) * SLICE_SPACING;
  if (offcuts[0] && offcuts[0].size > 0) {
    const g = new THREE.Group();
    renderPanelDim(offcuts[0], g);
    g.position.copy(planeN.clone().multiplyScalar(-offcutOffset));
    step1_top.add(g);
    g.userData.isOffcut = true;
  }
  if (offcuts[1] && offcuts[1].size > 0) {
    const g = new THREE.Group();
    renderPanelDim(offcuts[1], g);
    g.position.copy(planeN.clone().multiplyScalar(offcutOffset));
    step1_top.add(g);
    g.userData.isOffcut = true;
  }

  pvA.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), planeN);
  sizePlaneViz(pvA, initialPanel);

  bbStripA.box.setFromObject(step1_top);

  setStripSelection('A', null);
  setStripSelection('B', null);
  flipAxis1 = null;
  updateJoinButton();

  applyOffcutVisibility();

  console.log(`Cut A: rip=${rip}° bevel=${bevel}° pitch=${pitch}mm → ${slices.length} slices (extent ${extent.toFixed(0)}mm), ${offcuts.filter(o => o.size > 0).length} offcuts`);
}

// Toggle visibility of offcut groups in cut A based on checkbox state.
function applyOffcutVisibility() {
  const showA = document.getElementById('offcuts-cb')?.checked ?? true;
  step1_top.traverse(obj => {
    if (obj.userData?.isOffcut) obj.visible = showA;
  });
}

let currentRipA = 0, currentBevelA = 90, currentPitchA = 50;
// Arrangement state for view 1.
let modeA = 'pattern'; // 'pattern' | 'custom'
let patternA = 'flipAlternate';
let shiftA = 25;

function rebuildA() {
  rebuild(currentRipA, currentBevelA, currentPitchA);
  if (modeA === 'pattern') applyPatternA();
}

// Hard-coded species swatch colors (matches makeWoodMats base color).
const SPECIES_HEX = {
  maple: '#e4cc8f', walnut: '#3d2416', cherry: '#c97050',
  padauk: '#c84020', purpleheart: '#5a2a6a',
};

// Build the <option>s HTML for a species <select>, with `current` selected.
function speciesOptionsHTML(current) {
  return SPECIES_LIST.map(
    (name) => `<option value="${name}"${name === current ? ' selected' : ''}>${name}</option>`,

}

// Render the strip list UI from the current initialStrips state.
function renderStripList() {
  const list = document.getElementById('strip-list');

  const rowsHTML = initialStrips.map((strip, i) => `
    <div class="strip-row" data-idx="${i}">

      <button type="button" data-role="down" title="move down"${i === n - 1 ? ' disabled' : ''}>&darr;</button>

    </div>

// Preset seed generators. Each returns a fresh initialStrips array.
const STRIP_PRESETS = {
  ab8: () => {
    const out = [];
    for (let i = 0; i < 16; i++) out.push({ species: i % 2 === 0 ? 'maple' : 'walnut', width: 50 });
    return out;
  },
  abc4: () => {
    const out = [];
    const seq = ['maple', 'walnut', 'cherry'];
    for (let i = 0; i < 12; i++) out.push({ species: seq[i % 3], width: 50 });
    return out;
  },
  bookmatch: () => {
    const half = ['maple', 'walnut', 'maple', 'walnut', 'maple'];
    return [...half, ...half.slice().reverse()].map((sp) => ({ species: sp, width: 50 }));
  },
  single: () => [{ species: 'maple', width: 400 }],
  rainbow: () => SPECIES_LIST.map((sp) => ({ species: sp, width: 60 })),
};

// Wire up the strip-controls panel: render list, attach delegated
// handlers on the list, wire top-level height/length/add/preset.
(function initStripControls() {
  const list = document.getElementById('strip-list');
  const hSlider = document.getElementById('strip-h-slider');
  const lSlider = document.getElementById('strip-l-slider');
  const hVal = document.getElementById('strip-h-val');
  const lVal = document.getElementById('strip-l-val');
  const addBtn = document.getElementById('strip-add');
  const dupBtn = document.getElementById('strip-dup');
  const preset = document.getElementById('strip-preset');

  hSlider.value = initialStripHeight;
  lSlider.value = initialStripLength;
  hVal.textContent = `${initialStripHeight}mm`;
  lVal.textContent = `${initialStripLength}mm`;

  renderStripList();

  hSlider.addEventListener('input', () => {
    initialStripHeight = parseInt(hSlider.value, 10);
    hVal.textContent = `${initialStripHeight}mm`;
    rebuildInitialPanel();
  });
  lSlider.addEventListener('input', () => {
    initialStripLength = parseInt(lSlider.value, 10);
    lVal.textContent = `${initialStripLength}mm`;
    rebuildInitialPanel();
  });

  // Delegated change handler for species + width edits.
  list.addEventListener('change', (e) => {
    const row = e.target.closest('.strip-row');
    if (!row) return;
    const i = parseInt(row.dataset.idx, 10);
    const role = e.target.dataset.role;
    if (role === 'species') {
      initialStrips[i].species = e.target.value;
    } else if (role === 'width') {
      const w = parseInt(e.target.value, 10);
      if (!Number.isFinite(w) || w < 5) return;
      initialStrips[i].width = Math.min(w, 200);
    } else {
      return;
    }
    renderStripList();
    rebuildInitialPanel();
  });

  // Delegated click handler for up/down/remove.
  list.addEventListener('click', (e) => {
    const row = e.target.closest('.strip-row');
    if (!row) return;
    const i = parseInt(row.dataset.idx, 10);
    const role = e.target.dataset.role;
    if (role === 'up' && i > 0) {
      const tmp = initialStrips[i - 1];
      initialStrips[i - 1] = initialStrips[i];
      initialStrips[i] = tmp;
    } else if (role === 'down' && i < initialStrips.length - 1) {
      const tmp = initialStrips[i + 1];
      initialStrips[i + 1] = initialStrips[i];
      initialStrips[i] = tmp;
    } else if (role === 'remove' && initialStrips.length > 1) {
      initialStrips.splice(i, 1);
    } else {
      return;
    }
    renderStripList();
    rebuildInitialPanel();
  });

  addBtn.addEventListener('click', () => {
    const last = initialStrips[initialStrips.length - 1];
    const seed = last ? { ...last } : { species: 'maple', width: 50 };
    initialStrips.push(seed);
    renderStripList();
    rebuildInitialPanel();
  });
  dupBtn.addEventListener('click', () => {
    const last = initialStrips[initialStrips.length - 1];
    if (!last) return;
    initialStrips.push({ ...last });
    renderStripList();
    rebuildInitialPanel();
  });
  preset.addEventListener('change', () => {
    const key = preset.value;
    if (!key || !STRIP_PRESETS[key]) return;
    initialStrips = STRIP_PRESETS[key]();
    preset.value = '';
    renderStripList();
    rebuildInitialPanel();
  });
})();

// Rebuild the starting panel from the current strip species + repeat
// settings, render it into the dedicated starting-panel view, and then
// cascade-rebuild everything downstream.
function rebuildInitialPanel() {
  if (!manifoldReady) return;
  if (initialPanel) initialPanel.dispose();
  initialPanel = Panel.fromStripList(
    initialStrips, initialStripHeight, initialStripLength,
  );
  step0_panel.clear();
  renderPanel(initialPanel, step0_panel);
  const totalW = initialStrips.reduce((s, st) => s + st.width, 0);
  console.log(
    `Initial panel: ${initialStrips.length} strips, ` +
    `total ${totalW}×${initialStripHeight}×${initialStripLength}mm`,
  );
  rebuildA();
}

// Apply the current arrangement pattern to slicesA, rendering the result
// into step2_panel and updating the downstream panel2. Propagates
// automatically to cut B + join 2.
function applyPatternA() {
  if (!slicesA.length) return;
  if (panel2) { panel2.dispose(); panel2 = null; }
  step2_panel.clear();
  const planeN = planeNormal(currentRipA, currentBevelA);
  const opts = { shift: shiftA };
  const onDone = (result) => {
    if (!result) return;
    panel2 = result;
    bbPanel2.box.setFromObject(step2_panel);
  };
  if (ANIMATE_ARRANGEMENT) {
    animateArrangement(slicesA, patternA, planeN, currentPitchA, opts, step2_panel, onDone);
  } else {
    const result = applyArrangement(slicesA, patternA, planeN, currentPitchA, opts);
    if (result) renderPanel(result, step2_panel);
    onDone(result);
  }
}

  currentPitchA = parseInt(pitchSlider.value, 10);
  pitchVal.textContent = `${currentPitchA}mm`;
  rebuildA();
});

document.getElementById('offcuts-cb').addEventListener('change', applyOffcutVisibility);

// Mode switch: pattern vs custom (view 1).
function setModeA(mode) {
  modeA = mode;
  document.querySelectorAll('.mode-btn[data-view="1"]').forEach(b => {
    b.classList.toggle('selected', b.dataset.mode === mode);
  });
  document.querySelector('.pattern-ctrls[data-view="1"]').style.display = (mode === 'pattern') ? 'block' : 'none';
  document.querySelector('.custom-ctrls[data-view="1"]').style.display = (mode === 'custom') ? 'block' : 'none';
  if (mode === 'pattern') {
    applyPatternA();
  } else {
    // In custom mode, clear the pattern-generated panel2 so user starts fresh.
    if (panel2) { panel2.dispose(); panel2 = null; }
    step2_panel.clear();
  }
}
document.querySelectorAll('.mode-btn[data-view="1"]').forEach(btn => {
  btn.addEventListener('click', () => setModeA(btn.dataset.mode));
});

// Pattern select + shift slider (view 1).
const patternSelectA = document.querySelector('.pattern-select[data-view="1"]');
const shiftRowA = document.querySelector('.shift-row[data-view="1"]');
const shiftSliderA = document.querySelector('.shift-slider[data-view="1"]');
const shiftValA = document.querySelector('.shift-val[data-view="1"]');

function updateShiftVisibility() {
  shiftRowA.style.display = (patternA === 'shiftAlternate') ? 'block' : 'none';
}

patternSelectA.value = patternA;
patternSelectA.addEventListener('change', () => {
  patternA = patternSelectA.value;
  updateShiftVisibility();
  applyPatternA();
});
shiftSliderA.addEventListener('input', () => {
  shiftA = parseInt(shiftSliderA.value, 10);
  shiftValA.textContent = `${shiftA}mm`;
  if (patternA === 'shiftAlternate') applyPatternA();
});
updateShiftVisibility();

// Flip-axis button handlers (cut A only).
document.querySelectorAll('.flip-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const ax = btn.dataset.axis;
    flipAxis1 = (flipAxis1 === ax) ? null : ax;
    updateJoinButton();
  });
});

// Start async init
init();

// ─── Camera + controls ─────────────────────────────────────────────

const camera = new THREE.PerspectiveCamera(45, 1, 1, 10000);
camera.position.set(1000, 600, 800);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;

// Frame the camera so the given Box3 fits with some buffer.
// Keeps the existing view direction (orbital angle).
function frameCameraToBox(box, buffer = 1.3) {
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);

  // Use the starting-panel tile's aspect (width = W/3, height = full H).
  const tileAspect = (window.innerWidth / 3) / window.innerHeight;
  const fovV = camera.fov * Math.PI / 180;
  const fovH = 2 * Math.atan(Math.tan(fovV / 2) * tileAspect);

  // Radius of enclosing sphere
  const radius = size.length() / 2;
  const distV = radius / Math.sin(fovV / 2);
  const distH = radius / Math.sin(fovH / 2);
  const dist = Math.max(distV, distH) * buffer;

  // Keep current view direction
  const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
  camera.position.copy(center).addScaledVector(dir, dist);
  controls.target.copy(center);
  controls.update();
}
controls.target.set(0, 25, 0);

// ─── Layout ────────────────────────────────────────────────────────

function mkDivider(css) {
  const d = document.createElement('div'); d.className = 'divider';
  d.style.cssText = css; document.body.appendChild(d);
}
// Layout: three full-height columns — panel | cut A | join 1.
mkDivider('top:0; left:33.333%; width:1px; height:100%');
mkDivider('top:0; left:66.667%; width:1px; height:100%');

function mkLabel(txt, css) {
  const el = document.createElement('div'); el.className = 'step-label';
  el.textContent = txt; el.style.cssText = css; document.body.appendChild(el);
}
mkLabel('starting panel', 'top:8px; left:calc(16.667% - 40px)');
mkLabel('step 1: cut A', 'top:8px; left:calc(50% - 30px)');
mkLabel('step 2: join 1', 'top:8px; left:calc(83.333% - 30px)');

// ─── Quick camera-angle buttons next to each tile's axes gizmo ────

function setCameraView(name) {
  const target = controls.target.clone();
  const dist = Math.max(camera.position.distanceTo(target), 100);
  if (name === 'top') {
    // Ortho to XZ plane — camera looks down -Y.
    camera.position.copy(target).add(new THREE.Vector3(0, dist, 0));
    camera.up.set(0, 0, -1);
  } else if (name === 'front') {
    // Ortho to ZY plane — camera looks along -X from +X.
    camera.position.copy(target).add(new THREE.Vector3(dist, 0, 0));
    camera.up.set(0, 1, 0);
  }
  camera.lookAt(target);
  controls.update();
}

for (const tile of ['panel', 'cutA', 'join1']) {
  const container = document.createElement('div');
  container.className = 'view-quick-btns';
  container.dataset.tile = tile;
  for (const view of ['top', 'front']) {
    const btn = document.createElement('button');
    btn.textContent = view;
    btn.dataset.view = view;
    btn.addEventListener('click', () => setCameraView(view));
    container.appendChild(btn);
  }
  document.body.appendChild(container);
}

// ─── Hover / raycaster ─────────────────────────────────────────────

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const statusbar = document.getElementById('statusbar');
let hoveredMesh = null, hoveredOrig = null;

// Layout: three full-height columns — panel | cut A | join 1.
//
//   ┌────────┬────────┬────────┐
//   │ panel  │ cut A  │ join 1 │
//   └────────┴────────┴────────┘
//
// vpIdx values: 'panel' | 'cutA' | 'join1'
function tileBoundsCSS() {
  const W = window.innerWidth, H = window.innerHeight;
  const c1 = Math.floor(W / 3);
  const c2 = Math.floor(2 * W / 3);
  return { W, H, c1, c2 };
}

function viewportFor(clientX) {
  const { c1, c2 } = tileBoundsCSS();
  if (clientX < c1) return 'panel';
  if (clientX < c2) return 'cutA';
  return 'join1';
}

function viewportNDC(clientX, clientY) {
  const { W, H, c1, c2 } = tileBoundsCSS();
  const vpIdx = viewportFor(clientX);
  let vpX, vpW;
  if (vpIdx === 'panel')      { vpX = 0;  vpW = c1; }
  else if (vpIdx === 'cutA')  { vpX = c1; vpW = c2 - c1; }
  else                        { vpX = c2; vpW = W - c2; }
  const nx = ((clientX - vpX) / vpW) * 2 - 1;
  const ny = -(clientY / H) * 2 + 1;
  return { nx, ny, vpIdx };
}

renderer.domElement.addEventListener('mousemove', (e) => {
  const { nx, ny, vpIdx } = viewportNDC(e.clientX, e.clientY);
  mouse.set(nx, ny);
  raycaster.setFromCamera(mouse, camera);

  const groups =
      vpIdx === 'panel' ? [step0_panel]
    : vpIdx === 'cutA'  ? [step1_top, step1_bot]
    :                     [step2_panel];
  const meshes = [];
  groups.forEach(g => g.traverse(m => { if (m.isMesh) meshes.push(m); }));
  const hits = raycaster.intersectObjects(meshes, false);

  if (hoveredMesh && hoveredMesh !== hits[0]?.object) {
    const mats = Array.isArray(hoveredMesh.material) ? hoveredMesh.material : [hoveredMesh.material];
    mats.forEach((m, i) => { if (hoveredOrig?.[i]) m.emissive?.copy(hoveredOrig[i]); });
    hoveredMesh = null; hoveredOrig = null;
  }
  if (hits.length > 0) {
    const hit = hits[0], mesh = hit.object;
    if (mesh !== hoveredMesh) {
      hoveredMesh = mesh;
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      hoveredOrig = mats.map(m => m.emissive ? m.emissive.clone() : new THREE.Color(0));
      mats.forEach(m => { if (m.emissive) m.emissive.set(0x333333); });
    }
    let p = mesh.parent;
    while (p && p !== step1_top && p !== step1_bot && p !== step2_panel) p = p.parent;
    hoveredStrip = p === step1_top ? 'A' : p === step1_bot ? 'B'
      : p === step2_panel ? 'P' : null;
    const geo = mesh.geometry;
    const tris = geo.index ? geo.index.count / 3 : 0;
    const pt = hit.point;
    const bb = new THREE.Box3().setFromObject(mesh);
    const sz = new THREE.Vector3(); bb.getSize(sz);
    const vol = meshVolume(geo);
    const area = meshSurfaceArea(geo);
    const matCount = meshMaterialCount(mesh);
    const species = hitSpecies(hit);
    const fn = hit.face ? hit.face.normal : null;
    const normalStr = fn ? `(${fn.x.toFixed(2)}, ${fn.y.toFixed(2)}, ${fn.z.toFixed(2)})` : '—';
    // Compute the bounding box face area under the cursor.
    // The face normal tells us which bbox face we're on:
    // dominant axis of the normal determines the face plane,
    // and the face area is the product of the other two dimensions.
    let faceArea = 0;
    if (fn) {
      const ax = Math.abs(fn.x), ay = Math.abs(fn.y), az = Math.abs(fn.z);
      if (ax >= ay && ax >= az) faceArea = sz.y * sz.z;       // X face
      else if (ay >= ax && ay >= az) faceArea = sz.x * sz.z;  // Y face
      else faceArea = sz.x * sz.y;                             // Z face
    }
    statusbar.innerHTML =
      `<span class="label">species</span> <span class="val">${species}</span>  ` +
      `<span class="label">vol</span> <span class="val">${fmtVol(vol)}</span>  ` +
      `<span class="label">area</span> <span class="val">${fmtArea(area)}</span>  ` +
      `<span class="label">materials</span> <span class="val">${matCount}</span>  ` +
      `<span class="label">normal</span> <span class="val">${normalStr}</span>  ` +
      `<span class="label">face area</span> <span class="val">${fmtArea(faceArea)}</span>  ` +
      `<span class="label">bounds</span> <span class="val">${sz.x.toFixed(0)}×${sz.y.toFixed(0)}×${sz.z.toFixed(0)}</span>  ` +
      `<span class="label">tris</span> <span class="val">${tris}</span>`;
  } else {
    statusbar.innerHTML = '<span class="dim">hover a piece to inspect</span>';
    hoveredStrip = null;
  }
});

// ─── Click handler: select face on a strip ────────────────────────

// Track mousedown position and only treat mouseup as a "click" if the cursor
// moved less than this threshold (otherwise it was an orbit drag).
const CLICK_DRAG_THRESHOLD_PX = 4;
let mouseDownX = 0, mouseDownY = 0;
renderer.domElement.addEventListener('mousedown', (e) => {
  mouseDownX = e.clientX;
  mouseDownY = e.clientY;
});

renderer.domElement.addEventListener('mouseup', (e) => {
  const dx = e.clientX - mouseDownX;
  const dy = e.clientY - mouseDownY;
  if (Math.hypot(dx, dy) > CLICK_DRAG_THRESHOLD_PX) return; // was an orbit drag
  handleSelectionClick(e);
});

function handleSelectionClick(e) {
  const { nx, ny, vpIdx } = viewportNDC(e.clientX, e.clientY);
  if (vpIdx !== 'cutA') return;

  const clickMouse = new THREE.Vector2(nx, ny);
  const clickRay = new THREE.Raycaster();
  clickRay.setFromCamera(clickMouse, camera);

  const stripGroups = [
    { strip: 'A', group: step1_top },
    { strip: 'B', group: step1_bot },
  ];

  const meshes = [];
  stripGroups.forEach(({ group }) => group.traverse(m => { if (m.isMesh) meshes.push(m); }));
  const hits = clickRay.intersectObjects(meshes, false);
  if (hits.length === 0) return;

  const hit = hits[0];
  let parent = hit.object.parent;
  while (parent && !stripGroups.some(sg => sg.group === parent)) parent = parent.parent;
  if (!parent) return;
  const strip = stripGroups.find(sg => sg.group === parent).strip;

  const face = findFaceAtHit(hit, parent);
  if (!face) return;

  const curSel = { A: selectionA, B: selectionB }[strip];

  if (sameFace(curSel, face)) {
    if (!curSel.rotate) {
      setStripSelection(strip, { ...curSel, rotate: true });
    } else {
      setStripSelection(strip, null);
    }
  } else {
    setStripSelection(strip, face);
  }

  updateJoinButton();

  const fmt = (sel) => sel ? `n=(${sel.normal.x.toFixed(2)},${sel.normal.y.toFixed(2)},${sel.normal.z.toFixed(2)}), d=${sel.planeD.toFixed(1)}${sel.rotate ? ' (rot)' : ''}` : 'none';
  console.log(`Face: A=${fmt(selectionA)} B=${fmt(selectionB)}`);
}

// ─── Join button handler ──────────────────────────────────────────

// Result of the cut A + join 1 cascade.
let panel2 = null;

// ─── Join animation ───────────────────────────────────────────────
//
// The animation is a series of keyframes. At each frame we bake the
// current transform into a fresh Panel via manifold.transform and render
// that Panel. The manifold is the source of truth on every frame — there
// is no Three.js matrix state that needs to be baked back at the end.
// Consequence: the final frame's Panel IS the final state of the join,
// and handing it off to the caller cannot disagree with what was on
// screen.

// Flip to `true` to animate joins stage-by-stage as a debugging tool.
// Off by default — joins snap directly to final state. The animation code
// below is intact and requires no reimplementation to turn back on.
// When enabled, we also inject the per-view status footers that show
// stage progress; they're otherwise absent from the UI.
const ANIMATE_JOINS = false;

if (ANIMATE_JOINS) {
  const el = document.createElement('div');
  el.id = 'join1-status';
  el.className = 'tile-status';
  el.textContent = 'idle';
  document.body.appendChild(el);
}

let joinAnim = null;
const STAGE_DURATION_MS = 2000;

function cancelJoinAnim() {
  if (!joinAnim) return;
  if (joinAnim.rafId) cancelAnimationFrame(joinAnim.rafId);
  if (joinAnim.currentA) joinAnim.currentA.dispose();
  if (joinAnim.currentB) joinAnim.currentB.dispose();
  joinAnim = null;
}

function playJoinAnimation(srcA, srcB, selA, selB, flipAxis, onComplete) {
  cancelJoinAnim();

  const stages = buildJoinStages(srcA, srcB, selA, selB, flipAxis);

  const panelGroup = step2_panel;
  panelGroup.clear();
  const gA = new THREE.Group();
  const gB = new THREE.Group();
  panelGroup.add(gA);
  panelGroup.add(gB);

  const statusEl = document.getElementById('join1-status');
  const setStatus = (txt) => { if (statusEl) statusEl.textContent = txt; };

  // Degenerate: no stages (identical faces). Clone and hand off.
  if (stages.length === 0) {
    const a = srcA.clone(), b = srcB.clone();
    renderPanel(a, gA);
    renderPanel(b, gB);
    setStatus(`join complete (${a.size + b.size} segments)`);
    onComplete(a.concat(b));
    return;
  }

  // Pre-compute accumulated matrices at the START of each stage for A and B.
  // preAcc[i] = composition of all stages j < i that affect that group.
  // preAcc[stages.length] is the final accumulated transform for each side —
  // used both as animation scaffolding and as the "skip to final" target.
  const preAccA = [new THREE.Matrix4()];
  const preAccB = [new THREE.Matrix4()];
  for (let i = 0; i < stages.length; i++) {
    const s = stages[i];
    const a = preAccA[i].clone();
    const b = preAccB[i].clone();
    const m = stageMatrixAtProgress(s, 1);
    if (s.group === 'A' || s.group === 'BOTH') a.premultiply(m);
    if (s.group === 'B' || s.group === 'BOTH') b.premultiply(m);
    preAccA.push(a);
    preAccB.push(b);
  }

  // Non-animated path: bake the final accumulated transforms directly.
  if (!ANIMATE_JOINS) {
    const finalA = srcA.transform(preAccA[stages.length]);
    const finalB = srcB.transform(preAccB[stages.length]);
    renderPanel(finalA, gA);
    renderPanel(finalB, gB);
    const finalPanel = finalA.concat(finalB);
    setStatus(`join complete (${finalPanel.size} segments)`);
    onComplete(finalPanel);
    return;
  }

  joinAnim = {
    srcA, srcB, stages, preAccA, preAccB,
    gA, gB, statusEl,
    stageIdx: 0, stageStart: performance.now(),
    currentA: null, currentB: null, // Panels rendered last frame (to dispose)
    onComplete, rafId: null,
  };

  joinAnim.rafId = requestAnimationFrame(joinAnimFrame);
}

function joinAnimFrame(now) {
  if (!joinAnim) return;
  const { srcA, srcB, stages, preAccA, preAccB, gA, gB, statusEl } = joinAnim;
  const setStatus = (txt) => { if (statusEl) statusEl.textContent = txt; };

  // Finished all stages — currentA/B hold the final geometry. Hand it off.
  if (joinAnim.stageIdx >= stages.length) {
    const finalPanel = joinAnim.currentA.concat(joinAnim.currentB);
    // Ownership of segment manifolds transfers to finalPanel; don't dispose.
    joinAnim.currentA = null;
    joinAnim.currentB = null;
    setStatus(`join complete (${finalPanel.size} segments)`);
    const cb = joinAnim.onComplete;
    joinAnim = null;
    cb(finalPanel);
    return;
  }

  const stage = stages[joinAnim.stageIdx];
  const elapsed = now - joinAnim.stageStart;
  const progress = Math.min(elapsed / STAGE_DURATION_MS, 1);

  const stageMat = stageMatrixAtProgress(stage, progress);
  const matA = preAccA[joinAnim.stageIdx].clone();
  const matB = preAccB[joinAnim.stageIdx].clone();
  if (stage.group === 'A' || stage.group === 'BOTH') matA.premultiply(stageMat);
  if (stage.group === 'B' || stage.group === 'BOTH') matB.premultiply(stageMat);

  // Bake this frame's transforms into fresh Panels — the rendered mesh IS
  // the manifold geometry at this progress.
  const newA = srcA.transform(matA);
  const newB = srcB.transform(matB);

  renderPanel(newA, gA);
  renderPanel(newB, gB);

  if (joinAnim.currentA) joinAnim.currentA.dispose();
  if (joinAnim.currentB) joinAnim.currentB.dispose();
  joinAnim.currentA = newA;
  joinAnim.currentB = newB;

  setStatus(stageStatus(stage, progress));

  if (progress >= 1) {
    joinAnim.stageIdx++;
    joinAnim.stageStart = now;
  }

  joinAnim.rafId = requestAnimationFrame(joinAnimFrame);
}

document.getElementById('join-btn').addEventListener('click', () => {
  if (!selectionA || !selectionB || !currentStripAbove || !currentStripBelow) return;

  playJoinAnimation(currentStripAbove, currentStripBelow, selectionA, selectionB, flipAxis1, (finalPanel) => {
    if (panel2) panel2.dispose();
    panel2 = finalPanel;
    bbPanel2.box.setFromObject(step2_panel);
    const sz = new THREE.Vector3(); bbPanel2.box.getSize(sz);
    console.log(`Joined panel2: ${panel2.size} segments, bounds ${sz.x.toFixed(0)}×${sz.y.toFixed(0)}×${sz.z.toFixed(0)}`);
  });
});

// ─── Axes gizmo (corner reference) ─────────────────────────────────

const axesScene = new THREE.Scene();
const axesCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
axesCamera.position.set(0, 0, 3);
axesCamera.lookAt(0, 0, 0);

function makeAxis(dir, color) {
  const mat = new THREE.LineBasicMaterial({ color });
  const pts = [new THREE.Vector3(0,0,0), dir.clone()];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, mat);
}
const axesGroup = new THREE.Group();
axesGroup.add(makeAxis(new THREE.Vector3(1,0,0), 0xff4444));
axesGroup.add(makeAxis(new THREE.Vector3(0,1,0), 0x44ff44));
axesGroup.add(makeAxis(new THREE.Vector3(0,0,1), 0x4488ff));

function makeAxisLabel(text, position, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 32, 32);
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  sprite.position.copy(position);
  sprite.scale.set(0.3, 0.3, 1);
  return sprite;
}
axesGroup.add(makeAxisLabel('X', new THREE.Vector3(1.2, 0, 0), '#ff4444'));
axesGroup.add(makeAxisLabel('Y', new THREE.Vector3(0, 1.2, 0), '#44ff44'));
axesGroup.add(makeAxisLabel('Z', new THREE.Vector3(0, 0, 1.2), '#4488ff'));
axesScene.add(axesGroup);

// ─── Render loop: 2x2 viewports ────────────────────────────────────

const axesSize = 80;

function setView(name) {
  step0_panel.visible = name === 'panel';

  step1_top.visible = name === 'cut1';
  step1_bot.visible = name === 'cut1';
  pvA.visible = name === 'cut1';
  highlightA.visible = name === 'cut1';
  highlightB.visible = name === 'cut1';

  step2_panel.visible = name === 'join1';
}

function renderViewport(x, y, w, h, viewName, bg) {
  setView(viewName);
  renderer.setViewport(x, y, w, h);
  renderer.setScissor(x, y, w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setClearColor(bg, 1); renderer.clear();
  renderer.render(scene, camera);

  // Axes gizmo in bottom-left of this viewport
  renderer.setViewport(x + 8, y + 8, axesSize, axesSize);
  renderer.setScissor(x + 8, y + 8, axesSize, axesSize);
  renderer.clearDepth();
  renderer.render(axesScene, axesCamera);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const W = window.innerWidth, H = window.innerHeight;
  const c1 = Math.floor(W / 3);
  const c2 = Math.floor(2 * W / 3);
  renderer.setScissorTest(true);

  axesGroup.quaternion.copy(camera.quaternion).invert();

  renderViewport(0,  0, c1,      H, 'panel', 0x1c1917);
  renderViewport(c1, 0, c2 - c1, H, 'cut1',  0x1a1816);
  renderViewport(c2, 0, W - c2,  H, 'join1', 0x1c1917);

  renderer.setScissorTest(false);
}
animate();

window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));
</script>
