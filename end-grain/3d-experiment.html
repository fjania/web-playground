<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>End Grain — 3D Experiment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1c1917; overflow: hidden; font-family: 'Geist Mono', monospace; }
  #info {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    color: #a8a29e; font-size: 10px; line-height: 1.5;
    pointer-events: none; user-select: none;
  }
  #info strong { color: #e4cc8f; }
  #info .accent { color: #c0392b; }
  .panel-label {
    position: fixed; z-index: 10;
    color: #78716c; font-size: 8px; letter-spacing: 1px;
    text-transform: uppercase;
    pointer-events: none; user-select: none;
    background: rgba(28,25,23,0.7); padding: 2px 6px; border-radius: 3px;
  }
  .divider {
    position: fixed; background: #3d3835; z-index: 5;
  }
</style>
</head>
<body>
<div id="info">
  <strong>End Grain — 2 fixed cuts</strong><br>
  <span class="accent">diagonal + horizontal</span><br>
  orbit any view to orbit all
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Brush, Evaluator, SUBTRACTION, INTERSECTION } from 'three-bvh-csg';

// ─── Renderer ──────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// ─── Scene ─────────────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1917);

// Lighting
scene.add((() => {
  const k = new THREE.DirectionalLight(0xfff5e6, 1.6);
  k.position.set(300, 400, 200); k.castShadow = true;
  k.shadow.mapSize.set(1024, 1024);
  k.shadow.camera.near = 50; k.shadow.camera.far = 1200;
  k.shadow.camera.left = -500; k.shadow.camera.right = 500;
  k.shadow.camera.top = 500; k.shadow.camera.bottom = -500;
  return k;
})());
scene.add(new THREE.DirectionalLight(0xc8d8e8, 0.8).translateX(-200).translateY(100).translateZ(-100));
scene.add(new THREE.DirectionalLight(0xd4c8b8, 0.7).translateY(-300));
scene.add(new THREE.DirectionalLight(0xb8c0c8, 0.4).translateX(-100).translateY(200).translateZ(-300));
scene.add(new THREE.AmbientLight(0x4a4440, 1.2));

// (ground plane removed — it occluded pieces when orbiting from above)

// ─── Wood materials ────────────────────────────────────────────────

function makeEndGrainTex(base, ring) {
  const s = 256, c = document.createElement('canvas'); c.width = s; c.height = s;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, s, s);
  for (let i = 12; i >= 1; i--) {
    x.beginPath(); x.arc(s*.48, s*.52, (i/12)*s*.45, 0, Math.PI*2);
    x.strokeStyle = ring; x.lineWidth = 1.2; x.globalAlpha = .25+(i/12)*.15; x.stroke();
  }
  x.globalAlpha = 1;
  return new THREE.CanvasTexture(c);
}
function makeSideMat(base, grain) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 30; i++) {
    const px = Math.random()*256; x.beginPath(); x.moveTo(px, 0);
    for (let y = 0; y < 256; y += 10) x.lineTo(px+(Math.random()-.5)*4, y);
    x.strokeStyle = grain; x.lineWidth = .8+Math.random(); x.globalAlpha = .1+Math.random()*.15; x.stroke();
  }
  return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(c), roughness: 0.65 });
}
function makeWoodMats(base, ring, grain) {
  const e = new THREE.MeshStandardMaterial({ map: makeEndGrainTex(base, ring), roughness: 0.7 });
  const s = makeSideMat(base, grain);
  return [s, s, e, e, s, s];
}

const mapleMats = makeWoodMats('#e4cc8f', '#b5a06a', '#c4aa70');
const walnutMats = makeWoodMats('#3d2416', '#2a1a0e', '#4a2e1a');
const mapleCut = new THREE.MeshStandardMaterial({ color: 0xe4cc8f, roughness: 0.75 });
const walnutCut = new THREE.MeshStandardMaterial({ color: 0x3d2416, roughness: 0.75 });

// ─── Strip dimensions ──────────────────────────────────────────────

const cubeSize = 50, cubeCount = 8;
const halfLen = (cubeCount * cubeSize) / 2; // 200
const halfZ = cubeSize / 2;                 // 25

// ─── Two cutting planes ────────────────────────────────────────────
//
// Plane A: diagonal from left-front edge to right-back edge (fixed).
//   Passes through (-200, y, -25) and (200, y, 25) for all y.
//   Normal = normalize(1, 0, -8). Constant = 0.
//
// Plane B: passes through the strip center with random roll.
//   Starts as horizontal (0,1,0) at y=25, then rolls around the
//   strip's longitudinal axis (the X axis through the center of both
//   end faces). Random angle θ ∈ [-60°, 60°] on each load.
//
//   Roll axis: X, through (0, 25, 0).
//   Rolled normal: (0, cos(θ), sin(θ)).
//   Plane passes through (0, 25, 0), so constant = -dot(n, center).

const cutA = { normal: new THREE.Vector3(1, 0, -8).normalize(), constant: 0 };

const rollDeg = (Math.random() - 0.5) * 120; // −60° to +60°
const rollRad = rollDeg * Math.PI / 180;
const bNormal = new THREE.Vector3(0, Math.cos(rollRad), Math.sin(rollRad)).normalize();
const bCenter = new THREE.Vector3(0, cubeSize / 2, 0); // strip center
const cutB = { normal: bNormal, constant: -bNormal.dot(bCenter) };

console.log(`Plane B roll: ${rollDeg.toFixed(1)}°`);

// ─── CSG helper: build a half-space brush ──────────────────────────

const HS = 800;
function makeHalfSpace(cut, mat) {
  const b = new Brush(new THREE.BoxGeometry(HS, HS, HS), mat);
  b.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), cut.normal);
  const pp = cut.normal.clone().multiplyScalar(-cut.constant);
  b.position.copy(pp.add(cut.normal.clone().multiplyScalar(-HS / 2)));
  b.updateMatrixWorld();
  return b;
}

// ─── CSG: apply each plane independently, then combine ─────────────
//
// Instead of chaining CSG (which produces garbage), apply each plane
// SEPARATELY to the original cube, producing 2 meshes per plane.
// Then intersect the pairs to get the 4 quadrant pieces:
//
//   piece 0 (above A ∩ above B): cubeA_top ∩ complement_of_halfB
//   piece 1 (above A ∩ below B): cubeA_top ∩ halfB
//   piece 2 (below A ∩ above B): cubeA_bot ∩ complement_of_halfB
//   piece 3 (below A ∩ below B): cubeA_bot ∩ halfB
//
// But this STILL chains. The real fix: for each piece, build a SINGLE
// cutting volume that represents the intersection of two half-spaces,
// then do one CSG operation against the cube.
//
// A ∩ B half-space = intersection of two boxes = ...also complex.
//
// Simplest reliable approach: do the cuts SEQUENTIALLY on the full
// strip (not per-cube). Build one merged strip brush, cut by A into
// two halves, then cut each half by B.

const evaluator = new Evaluator();

// Step 1: Merge all cubes into one strip brush by unioning them.
// Since they're axis-aligned boxes that share faces, we can just
// create one long box. But we need per-cube materials... So instead,
// do the 2-step approach PER CUBE but more carefully.
//
// ACTUALLY: the simplest fix for chaining is to ensure the
// intermediate result is a proper Brush. The issue before was likely
// that the result Mesh doesn't have _needsUpdate set. Let's try
// using evaluator.evaluate which returns a result that can be passed
// directly as operandA to another evaluate (it IS a Brush already in
// three-bvh-csg v3+).

const pieceGroups = [
  new THREE.Group(), // above A, above B
  new THREE.Group(), // above A, below B
  new THREE.Group(), // below A, above B
  new THREE.Group(), // below A, below B
];

const combos = [
  [SUBTRACTION, SUBTRACTION],
  [SUBTRACTION, INTERSECTION],
  [INTERSECTION, SUBTRACTION],
  [INTERSECTION, INTERSECTION],
];

for (let i = 0; i < cubeCount; i++) {
  const x = i * cubeSize - halfLen + cubeSize / 2;
  const y = cubeSize / 2;
  const isMaple = i % 2 === 0;
  const cutMat = isMaple ? mapleCut : walnutCut;
  const mats = isMaple ? mapleMats : walnutMats;

  // Pre-build both half-space brushes for this cube (with correct cap material)
  const hsA = makeHalfSpace(cutA, cutMat);
  const hsB = makeHalfSpace(cutB, cutMat);

  // Do the 4 combinations. For each, we start from a FRESH cube brush
  // (CSG may mutate internal state).
  for (let p = 0; p < 4; p++) {
    try {
      // Fresh cube for each piece
      const cube = new Brush(new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize), mats);
      cube.position.set(x, y, 0);
      cube.updateMatrixWorld();

      // First cut (plane A)
      const result1 = evaluator.evaluate(cube, hsA, combos[p][0]);

      // Second cut (plane B) — use result1 directly since evaluate
      // returns a Brush in three-bvh-csg.
      result1.updateMatrixWorld();
      const result2 = evaluator.evaluate(result1, hsB, combos[p][1]);

      if (result2.geometry.index && result2.geometry.index.count > 0) {
        result2.castShadow = true;
        result2.receiveShadow = true;
        pieceGroups[p].add(result2);
      }
    } catch (e) {
      // Skip degenerate pieces
    }
  }
}

// Separate pieces visually
const sep = 30;
const offsets = [
  new THREE.Vector3(0, sep, -sep),   // above A (back), above B (top)
  new THREE.Vector3(0, -sep, -sep),  // above A (back), below B (bottom)
  new THREE.Vector3(0, sep, sep),    // below A (front), above B (top)
  new THREE.Vector3(0, -sep, sep),   // below A (front), below B (bottom)
];

const activePieces = [];
for (let p = 0; p < 4; p++) {
  if (pieceGroups[p].children.length > 0) {
    pieceGroups[p].position.copy(offsets[p]);
    scene.add(pieceGroups[p]);
    activePieces.push(pieceGroups[p]);
  }
}

// ─── Cut plane visualizations ──────────────────────────────────────

function makePlaneViz(cut, color) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(520, 150),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.07,
      side: THREE.DoubleSide, depthWrite: false,
    })
  );
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), cut.normal);
  m.position.copy(cut.normal.clone().multiplyScalar(-cut.constant));
  return m;
}
const pvA = makePlaneViz(cutA, 0xc0392b); scene.add(pvA);
const pvB = makePlaneViz(cutB, 0x2980b9); scene.add(pvB);

// ─── Camera + controls ─────────────────────────────────────────────

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(350, 250, 400);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.target.set(0, 25, 0);

// ─── Layout + labels ───────────────────────────────────────────────

const nPieces = activePieces.length;
const cols = nPieces <= 2 ? 1 : 2;
const rows = Math.ceil(nPieces / cols);

function buildLayout() {
  // Vertical divider
  const dv = document.createElement('div'); dv.className = 'divider';
  dv.style.cssText = 'top:0; left:50%; width:1px; height:100%';
  document.body.appendChild(dv);

  // Right-side grid dividers
  if (cols > 1) {
    const d = document.createElement('div'); d.className = 'divider';
    d.style.cssText = 'top:0; left:75%; width:1px; height:100%';
    document.body.appendChild(d);
  }
  for (let r = 1; r < rows; r++) {
    const d = document.createElement('div'); d.className = 'divider';
    d.style.cssText = `top:${(r/rows)*100}%; left:50%; width:50%; height:1px`;
    document.body.appendChild(d);
  }

  // Labels
  const mkLabel = (txt, css) => {
    const el = document.createElement('div');
    el.className = 'panel-label'; el.textContent = txt; el.style.cssText = css;
    document.body.appendChild(el);
  };
  mkLabel('combined', 'top:8px; left:calc(25% - 30px)');
  for (let i = 0; i < nPieces; i++) {
    const c = i % cols, r = Math.floor(i / cols);
    const lx = 50 + (c / cols) * 50 + 25 / cols;
    mkLabel(`piece ${i+1}`, `top:${(r/rows)*100 + 1}%; left:calc(${lx}% - 20px)`);
  }
}
buildLayout();

// ─── Render loop ───────────────────────────────────────────────────

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const W = window.innerWidth, H = window.innerHeight;
  renderer.setScissorTest(true);

  // Left: combined
  activePieces.forEach(g => g.visible = true);
  pvA.visible = true; pvB.visible = true;
  renderer.setViewport(0, 0, W/2|0, H);
  renderer.setScissor(0, 0, W/2|0, H);
  camera.aspect = (W/2) / H;
  camera.updateProjectionMatrix();
  renderer.setClearColor(0x1c1917, 1); renderer.clear();
  renderer.render(scene, camera);

  // Right: piece grid
  const rW = Math.ceil(W / 2);
  const cW = Math.floor(rW / cols), cH = Math.floor(H / rows);

  for (let i = 0; i < nPieces; i++) {
    const c = i % cols, r = Math.floor(i / cols);
    activePieces.forEach(g => g.visible = false);
    activePieces[i].visible = true;
    pvA.visible = false; pvB.visible = false;

    const vx = (W/2|0) + c * cW;
    const vy = H - (r + 1) * cH;
    renderer.setViewport(vx, vy, cW, cH);
    renderer.setScissor(vx, vy, cW, cH);
    camera.aspect = cW / cH;
    camera.updateProjectionMatrix();
    renderer.setClearColor(0x1a1816, 1); renderer.clear();
    renderer.render(scene, camera);
  }

  renderer.setScissorTest(false);
}
animate();

window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));
</script>
</body>
</html>
