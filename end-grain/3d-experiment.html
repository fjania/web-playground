<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>End Grain — 3D Experiment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1c1917; overflow: hidden; font-family: 'Geist Mono', monospace; }
  #info {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    color: #a8a29e; font-size: 10px; line-height: 1.5;
    pointer-events: none; user-select: none;
  }
  #info strong { color: #e4cc8f; font-weight: 500; }
  #info .accent { color: #c0392b; }
  .panel-label {
    position: fixed; z-index: 10;
    color: #78716c; font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase;
    pointer-events: none; user-select: none;
  }
  #label-main   { top: 12px; left: calc(25% - 30px); }
  #label-top    { top: 12px; right: calc(25% - 30px); }
  #label-bottom { top: calc(50% + 12px); right: calc(25% - 30px); }
  /* Vertical divider line */
  .divider-v {
    position: fixed; top: 0; left: 50%; width: 1px; height: 100%;
    background: #3d3835; z-index: 5;
  }
  /* Horizontal divider on right half */
  .divider-h {
    position: fixed; top: 50%; left: 50%; width: 50%; height: 1px;
    background: #3d3835; z-index: 5;
  }
</style>
</head>
<body>
<div id="info">
  <strong>End Grain — 3D Slice</strong><br>
  <span class="accent">CSG cut · 3 linked views</span><br>
  orbit any view to orbit all
</div>
<div class="panel-label" id="label-main">combined</div>
<div class="panel-label" id="label-top">piece A</div>
<div class="panel-label" id="label-bottom">piece B</div>
<div class="divider-v"></div>
<div class="divider-h"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Brush, Evaluator, SUBTRACTION, INTERSECTION } from 'three-bvh-csg';

// ─── Renderer (full window, we scissor per viewport) ───────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.autoClear = false; // we clear manually per viewport
document.body.appendChild(renderer.domElement);

// ─── Scene (shared by all viewports) ───────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1917);

// ─── Lighting ──────────────────────────────────────────────────────

const key = new THREE.DirectionalLight(0xfff5e6, 2.0);
key.position.set(300, 400, 200);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.camera.near = 50;  key.shadow.camera.far = 1200;
key.shadow.camera.left = -500; key.shadow.camera.right = 500;
key.shadow.camera.top = 500;  key.shadow.camera.bottom = -500;
scene.add(key);
scene.add(new THREE.DirectionalLight(0xc8d8e8, 0.6).translateX(-200).translateY(100).translateZ(-100));
scene.add(new THREE.AmbientLight(0x2a2420, 0.8));

// ─── Ground ────────────────────────────────────────────────────────

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1200, 1200),
  new THREE.MeshStandardMaterial({ color: 0x262220, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// ─── Wood materials ────────────────────────────────────────────────

function makeEndGrainTexture(baseColor, ringColor) {
  const size = 256, canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = baseColor; ctx.fillRect(0, 0, size, size);
  const cx = size * 0.48, cy = size * 0.52;
  for (let i = 12; i >= 1; i--) {
    ctx.beginPath(); ctx.arc(cx, cy, (i / 12) * size * 0.45, 0, Math.PI * 2);
    ctx.strokeStyle = ringColor; ctx.lineWidth = 1.2;
    ctx.globalAlpha = 0.25 + (i / 12) * 0.15; ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fillStyle = ringColor; ctx.globalAlpha = 0.6; ctx.fill(); ctx.globalAlpha = 1;
  return new THREE.CanvasTexture(canvas);
}

function makeSideMaterial(baseCSS, grainCSS) {
  const w = 256, h = 256, canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = baseCSS; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 40; i++) {
    const x = Math.random() * w; ctx.beginPath(); ctx.moveTo(x, 0);
    for (let y = 0; y < h; y += 10) ctx.lineTo(x + (Math.random() - 0.5) * 4, y);
    ctx.strokeStyle = grainCSS; ctx.lineWidth = 0.8 + Math.random() * 1.2;
    ctx.globalAlpha = 0.12 + Math.random() * 0.15; ctx.stroke();
  }
  ctx.globalAlpha = 1;
  return new THREE.MeshStandardMaterial({
    map: new THREE.CanvasTexture(canvas), roughness: 0.65,
  });
}

function makeWoodMaterials(baseCSS, ringCSS, grainCSS) {
  const endMat = new THREE.MeshStandardMaterial({ map: makeEndGrainTexture(baseCSS, ringCSS), roughness: 0.7 });
  const sideMat = makeSideMaterial(baseCSS, grainCSS);
  return [sideMat, sideMat, endMat, endMat, sideMat, sideMat];
}

const mapleMats = makeWoodMaterials('#e4cc8f', '#b5a06a', '#c4aa70');
const walnutMats = makeWoodMaterials('#3d2416', '#2a1a0e', '#4a2e1a');
const mapleCutMat = new THREE.MeshStandardMaterial({ color: 0xe4cc8f, roughness: 0.75 });
const walnutCutMat = new THREE.MeshStandardMaterial({ color: 0x3d2416, roughness: 0.75 });

// ─── Strip dimensions ──────────────────────────────────────────────

const cubeSize = 50;
const cubeCount = 8;
const halfLen = (cubeCount * cubeSize) / 2;
const halfZ = cubeSize / 2;

// ─── Random cutting plane (full-length) ────────────────────────────

function randomFullLengthPlane() {
  const margin = 8;
  const yRange = cubeSize - 2 * margin;
  const zRange = cubeSize - 2 * margin;
  const y1 = margin + Math.random() * yRange;
  const z1 = -halfZ + margin + Math.random() * zRange;
  const y2 = margin + Math.random() * yRange;
  const z2 = -halfZ + margin + Math.random() * zRange;
  const P1 = new THREE.Vector3(-halfLen, y1, z1);
  const P2 = new THREE.Vector3(halfLen, y2, z2);
  const d = new THREE.Vector3().subVectors(P2, P1);
  const theta = Math.random() * Math.PI * 2;
  const v = new THREE.Vector3(0, Math.cos(theta), Math.sin(theta));
  const normal = new THREE.Vector3().crossVectors(d, v).normalize();
  const constant = -normal.dot(P1);
  return { normal, constant };
}

const cut = randomFullLengthPlane();
const cutNormal = cut.normal;

// ─── CSG: slice each cube into two halves ──────────────────────────

const halfSpaceSize = 800;
const evaluator = new Evaluator();

const topGroup = new THREE.Group(); // "piece A"
const botGroup = new THREE.Group(); // "piece B"
const separation = 35;
topGroup.position.copy(cutNormal.clone().multiplyScalar(separation / 2));
botGroup.position.copy(cutNormal.clone().multiplyScalar(-separation / 2));

for (let i = 0; i < cubeCount; i++) {
  const x = i * cubeSize - halfLen + cubeSize / 2;
  const y = cubeSize / 2;
  const isMaple = i % 2 === 0;

  const cubeBrush = new Brush(
    new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize),
    isMaple ? mapleMats : walnutMats
  );
  cubeBrush.position.set(x, y, 0);
  cubeBrush.updateMatrixWorld();

  const halfSpaceBrush = new Brush(
    new THREE.BoxGeometry(halfSpaceSize, halfSpaceSize, halfSpaceSize),
    isMaple ? mapleCutMat : walnutCutMat
  );
  halfSpaceBrush.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), cutNormal);
  const planePoint = cutNormal.clone().multiplyScalar(-cut.constant);
  halfSpaceBrush.position.copy(
    planePoint.clone().add(cutNormal.clone().multiplyScalar(-halfSpaceSize / 2))
  );
  halfSpaceBrush.updateMatrixWorld();

  const topPiece = evaluator.evaluate(cubeBrush, halfSpaceBrush, SUBTRACTION);
  topPiece.castShadow = true; topPiece.receiveShadow = true;
  topGroup.add(topPiece);

  const botPiece = evaluator.evaluate(cubeBrush, halfSpaceBrush, INTERSECTION);
  botPiece.castShadow = true; botPiece.receiveShadow = true;
  botGroup.add(botPiece);
}

scene.add(topGroup);
scene.add(botGroup);

// ─── Cut plane visualization ───────────────────────────────────────

const planeViz = new THREE.Mesh(
  new THREE.PlaneGeometry(520, 150),
  new THREE.MeshBasicMaterial({
    color: 0xc0392b, transparent: true, opacity: 0.08,
    side: THREE.DoubleSide, depthWrite: false,
  })
);
planeViz.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), cutNormal);
planeViz.position.copy(cutNormal.clone().multiplyScalar(-cut.constant));
scene.add(planeViz);

// ─── Camera + controls ─────────────────────────────────────────────

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(350, 250, 400);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 25, 0);

// ─── Multi-viewport rendering ──────────────────────────────────────
//
// Layout:  left 50% = combined view
//          top-right 25% = piece A only
//          bottom-right 25% = piece B only
//
// We use one renderer with setViewport/setScissor per pass. Between
// passes we toggle group visibility so each viewport shows only its
// piece. The groups are the SAME objects — not clones.

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const W = window.innerWidth;
  const H = window.innerHeight;
  const dpr = renderer.getPixelRatio();

  renderer.setScissorTest(true);

  // ── Pass 1: left half — combined view (both pieces + plane) ──
  {
    topGroup.visible = true;
    botGroup.visible = true;
    planeViz.visible = true;

    const vx = 0, vy = 0, vw = Math.floor(W / 2), vh = H;
    renderer.setViewport(vx, vy, vw, vh);
    renderer.setScissor(vx, vy, vw, vh);
    camera.aspect = vw / vh;
    camera.updateProjectionMatrix();
    renderer.setClearColor(0x1c1917, 1);
    renderer.clear();
    renderer.render(scene, camera);
  }

  // ── Pass 2: top-right — piece A only ──
  {
    topGroup.visible = true;
    botGroup.visible = false;
    planeViz.visible = false;

    const vx = Math.floor(W / 2), vy = Math.floor(H / 2);
    const vw = Math.ceil(W / 2), vh = Math.ceil(H / 2);
    renderer.setViewport(vx, vy, vw, vh);
    renderer.setScissor(vx, vy, vw, vh);
    camera.aspect = vw / vh;
    camera.updateProjectionMatrix();
    renderer.setClearColor(0x1a1816, 1);
    renderer.clear();
    renderer.render(scene, camera);
  }

  // ── Pass 3: bottom-right — piece B only ──
  {
    topGroup.visible = false;
    botGroup.visible = true;
    planeViz.visible = false;

    const vx = Math.floor(W / 2), vy = 0;
    const vw = Math.ceil(W / 2), vh = Math.floor(H / 2);
    renderer.setViewport(vx, vy, vw, vh);
    renderer.setScissor(vx, vy, vw, vh);
    camera.aspect = vw / vh;
    camera.updateProjectionMatrix();
    renderer.setClearColor(0x1a1816, 1);
    renderer.clear();
    renderer.render(scene, camera);
  }

  renderer.setScissorTest(false);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
