<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>End Grain — 3D Experiment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1c1917; overflow: hidden; font-family: 'Geist Mono', monospace; }
  #info {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    color: #a8a29e; font-size: 10px; line-height: 1.5;
    pointer-events: none; user-select: none;
  }
  #info strong { color: #e4cc8f; }
  .panel-label {
    position: fixed; z-index: 10;
    color: #78716c; font-size: 8px; letter-spacing: 1px;
    text-transform: uppercase;
    pointer-events: none; user-select: none;
    background: rgba(28,25,23,0.7); padding: 2px 6px; border-radius: 3px;
  }
  .divider { position: fixed; background: #3d3835; z-index: 5; }
  #controls {
    position: fixed; bottom: 40px; left: 16px; z-index: 20;
    display: flex; align-items: center; gap: 10px;
    background: rgba(28,25,23,0.85); border: 1px solid #3d3835;
    border-radius: 6px; padding: 10px 16px;
  }
  #controls label {
    color: #a8a29e; font-size: 10px; letter-spacing: 0.5px;
    text-transform: uppercase; white-space: nowrap;
  }
  #controls input[type="range"] {
    width: 200px; accent-color: #2980b9;
  }
  #controls .value {
    color: #e4cc8f; font-size: 11px; min-width: 40px; text-align: right;
  }
  #statusbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    height: 28px; display: flex; align-items: center; gap: 16px;
    padding: 0 12px;
    background: rgba(28,25,23,0.92); border-top: 1px solid #3d3835;
    font-size: 10px; color: #78716c;
  }
  #statusbar .label { color: #a8a29e; text-transform: uppercase; letter-spacing: 0.5px; }
  #statusbar .val { color: #e4cc8f; }
  #statusbar .dim { color: #555; }
</style>
</head>
<body>
<div id="info">
  <strong>End Grain — 2-plane CSG</strong><br>
  drag slider to roll plane B
</div>
<div id="statusbar">
  <span class="dim">hover a piece</span>
</div>
<div id="controls">
  <label>plane B roll</label>
  <input type="range" id="rollSlider" min="-60" max="60" step="1" value="0">
  <span class="value" id="rollValue">0°</span>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Brush, Evaluator, SUBTRACTION, INTERSECTION } from 'three-bvh-csg';

// ─── Renderer ──────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// ─── Scene ─────────────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1917);

scene.add((() => {
  const k = new THREE.DirectionalLight(0xfff5e6, 1.6);
  k.position.set(300, 400, 200); k.castShadow = true;
  k.shadow.mapSize.set(1024, 1024);
  k.shadow.camera.near = 50; k.shadow.camera.far = 1200;
  k.shadow.camera.left = -500; k.shadow.camera.right = 500;
  k.shadow.camera.top = 500; k.shadow.camera.bottom = -500;
  return k;
})());
scene.add(new THREE.DirectionalLight(0xc8d8e8, 0.8).translateX(-200).translateY(100).translateZ(-100));
scene.add(new THREE.DirectionalLight(0xd4c8b8, 0.7).translateY(-300));
scene.add(new THREE.DirectionalLight(0xb8c0c8, 0.4).translateX(-100).translateY(200).translateZ(-300));
scene.add(new THREE.AmbientLight(0x4a4440, 1.2));

// ─── Wood materials ────────────────────────────────────────────────

function makeEndGrainTex(base, ring) {
  const s = 256, c = document.createElement('canvas'); c.width = s; c.height = s;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, s, s);
  for (let i = 12; i >= 1; i--) {
    x.beginPath(); x.arc(s*.48, s*.52, (i/12)*s*.45, 0, Math.PI*2);
    x.strokeStyle = ring; x.lineWidth = 1.2; x.globalAlpha = .25+(i/12)*.15; x.stroke();
  }
  x.globalAlpha = 1;
  return new THREE.CanvasTexture(c);
}
function makeSideMat(base, grain) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 30; i++) {
    const px = Math.random()*256; x.beginPath(); x.moveTo(px, 0);
    for (let y = 0; y < 256; y += 10) x.lineTo(px+(Math.random()-.5)*4, y);
    x.strokeStyle = grain; x.lineWidth = .8+Math.random(); x.globalAlpha = .1+Math.random()*.15; x.stroke();
  }
  return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(c), roughness: 0.65 });
}
function makeWoodMats(base, ring, grain) {
  const e = new THREE.MeshStandardMaterial({ map: makeEndGrainTex(base, ring), roughness: 0.7 });
  const s = makeSideMat(base, grain);
  return [s, s, e, e, s, s];
}
const mapleMats = makeWoodMats('#e4cc8f', '#b5a06a', '#c4aa70');
const walnutMats = makeWoodMats('#3d2416', '#2a1a0e', '#4a2e1a');
const mapleCut = new THREE.MeshStandardMaterial({ color: 0xe4cc8f, roughness: 0.75 });
const walnutCut = new THREE.MeshStandardMaterial({ color: 0x3d2416, roughness: 0.75 });

// ─── Strip ─────────────────────────────────────────────────────────

const cubeSize = 50, cubeCount = 8;
const halfLen = (cubeCount * cubeSize) / 2;
const halfZ = cubeSize / 2;
const stripCenter = new THREE.Vector3(0, cubeSize / 2, 0);

// ─── Planes ────────────────────────────────────────────────────────

const cutA = { normal: new THREE.Vector3(1, 0, -8).normalize(), constant: 0 };

function makeCutB(rollDeg) {
  const rad = rollDeg * Math.PI / 180;
  const n = new THREE.Vector3(0, Math.cos(rad), Math.sin(rad)).normalize();
  return { normal: n, constant: -n.dot(stripCenter) };
}

// ─── CSG infrastructure ────────────────────────────────────────────

const HS = 800;
const evaluator = new Evaluator();

function makeHalfSpace(cut, mat) {
  const b = new Brush(new THREE.BoxGeometry(HS, HS, HS), mat);
  b.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), cut.normal);
  const pp = cut.normal.clone().multiplyScalar(-cut.constant);
  b.position.copy(pp.add(cut.normal.clone().multiplyScalar(-HS / 2)));
  b.updateMatrixWorld();
  return b;
}

const combos = [
  [SUBTRACTION, SUBTRACTION],
  [SUBTRACTION, INTERSECTION],
  [INTERSECTION, SUBTRACTION],
  [INTERSECTION, INTERSECTION],
];

const sep = 30;

function makePlaneViz(cut, color) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(520, 150),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.07,
      side: THREE.DoubleSide, depthWrite: false,
    })
  );
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), cut.normal);
  m.position.copy(cut.normal.clone().multiplyScalar(-cut.constant));
  return m;
}

// ─── Mutable state: current pieces + viz ───────────────────────────

let activePieces = [];
let pvA = null, pvB = null;

function rebuildCuts(rollDeg) {
  // Remove old pieces + plane viz from scene
  activePieces.forEach(g => { scene.remove(g); });
  if (pvA) scene.remove(pvA);
  if (pvB) scene.remove(pvB);
  activePieces = [];

  const cutB = makeCutB(rollDeg);

  const pieceGroups = [
    new THREE.Group(),
    new THREE.Group(),
    new THREE.Group(),
    new THREE.Group(),
  ];

  for (let i = 0; i < cubeCount; i++) {
    const x = i * cubeSize - halfLen + cubeSize / 2;
    const y = cubeSize / 2;
    const isMaple = i % 2 === 0;
    const cutMat = isMaple ? mapleCut : walnutCut;
    const mats = isMaple ? mapleMats : walnutMats;
    const hsA = makeHalfSpace(cutA, cutMat);
    const hsB = makeHalfSpace(cutB, cutMat);

    for (let p = 0; p < 4; p++) {
      try {
        const cube = new Brush(new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize), mats);
        cube.position.set(x, y, 0);
        cube.updateMatrixWorld();

        const r1 = evaluator.evaluate(cube, hsA, combos[p][0]);
        r1.updateMatrixWorld();
        const r2 = evaluator.evaluate(r1, hsB, combos[p][1]);

        if (r2.geometry.index && r2.geometry.index.count > 0) {
          r2.castShadow = true;
          r2.receiveShadow = true;
          pieceGroups[p].add(r2);
        }
      } catch { /* skip degenerate */ }
    }
  }

  // ── Log the pieces for inspection ──
  const comboLabels = ['A+ B+', 'A+ B−', 'A− B+', 'A− B−'];
  console.group(`%cCSG rebuild (roll ${rollDeg}°)`, 'color: #e4cc8f; font-weight: bold');
  for (let p = 0; p < 4; p++) {
    const g = pieceGroups[p];
    if (g.children.length === 0) {
      console.log(`%c${comboLabels[p]}: empty`, 'color: #78716c');
      continue;
    }
    console.groupCollapsed(`%c${comboLabels[p]}: ${g.children.length} meshes`, 'color: #2980b9');
    g.children.forEach((mesh, idx) => {
      const geo = mesh.geometry;
      const triCount = geo.index ? geo.index.count / 3 : 0;
      const vertCount = geo.attributes.position ? geo.attributes.position.count : 0;
      const bb = new THREE.Box3().setFromBufferAttribute(geo.attributes.position);
      const size = new THREE.Vector3();
      bb.getSize(size);
      console.log(`  mesh[${idx}]`, {
        triangles: triCount,
        vertices: vertCount,
        boundingBox: { min: bb.min.toArray().map(v => +v.toFixed(1)), max: bb.max.toArray().map(v => +v.toFixed(1)) },
        size: size.toArray().map(v => +v.toFixed(1)),
        materialCount: Array.isArray(mesh.material) ? mesh.material.length : 1,
        groups: geo.groups?.length || 0,
        mesh,          // ← the actual Three.js Mesh — expand in console to inspect
        geometry: geo, // ← the BufferGeometry
      });
    });
    console.log('group object:', g); // ← the THREE.Group itself
    console.groupEnd();
  }
  console.groupEnd();

  // Separate pieces based on both normals
  const offsets = [
    new THREE.Vector3(0, sep, -sep),
    new THREE.Vector3(0, -sep, -sep),
    new THREE.Vector3(0, sep, sep),
    new THREE.Vector3(0, -sep, sep),
  ];

  for (let p = 0; p < 4; p++) {
    if (pieceGroups[p].children.length > 0) {
      pieceGroups[p].position.copy(offsets[p]);
      scene.add(pieceGroups[p]);
      activePieces.push(pieceGroups[p]);
    }
  }

  // Plane visualizations
  pvA = makePlaneViz(cutA, 0xc0392b); scene.add(pvA);
  pvB = makePlaneViz(cutB, 0x2980b9); scene.add(pvB);
}

// Initial build
const initRoll = Math.round((Math.random() - 0.5) * 120);
document.getElementById('rollSlider').value = initRoll;
document.getElementById('rollValue').textContent = `${initRoll}°`;
rebuildCuts(initRoll);

// ─── Slider wiring ─────────────────────────────────────────────────

let pendingRoll = null;
const slider = document.getElementById('rollSlider');
const valueEl = document.getElementById('rollValue');

slider.addEventListener('input', () => {
  const deg = +slider.value;
  valueEl.textContent = `${deg}°`;
  pendingRoll = deg;
});

// Debounce CSG rebuild — run at most once per animation frame
function checkPendingRebuild() {
  if (pendingRoll !== null) {
    rebuildCuts(pendingRoll);
    rebuildLayout();
    pendingRoll = null;
  }
  requestAnimationFrame(checkPendingRebuild);
}
requestAnimationFrame(checkPendingRebuild);

// ─── Camera + controls ─────────────────────────────────────────────

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(350, 250, 400);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.target.set(0, 25, 0);

// ─── Layout ────────────────────────────────────────────────────────

function rebuildLayout() {
  document.querySelectorAll('.divider, .panel-label').forEach(e => e.remove());

  const n = activePieces.length;
  const cols = n <= 2 ? 1 : 2;
  const rows = Math.ceil(n / cols);

  const dv = document.createElement('div'); dv.className = 'divider';
  dv.style.cssText = 'top:0; left:50%; width:1px; height:100%';
  document.body.appendChild(dv);

  if (cols > 1) {
    const d = document.createElement('div'); d.className = 'divider';
    d.style.cssText = 'top:0; left:75%; width:1px; height:100%';
    document.body.appendChild(d);
  }
  for (let r = 1; r < rows; r++) {
    const d = document.createElement('div'); d.className = 'divider';
    d.style.cssText = `top:${(r/rows)*100}%; left:50%; width:50%; height:1px`;
    document.body.appendChild(d);
  }

  const mkLabel = (txt, css) => {
    const el = document.createElement('div');
    el.className = 'panel-label'; el.textContent = txt; el.style.cssText = css;
    document.body.appendChild(el);
  };
  mkLabel('combined', 'top:8px; left:calc(25% - 30px)');
  for (let i = 0; i < n; i++) {
    const c = i % cols, r = Math.floor(i / cols);
    const lx = 50 + (c / cols) * 50 + 25 / cols;
    mkLabel(`piece ${i+1}`, `top:${(r/rows)*100 + 1}%; left:calc(${lx}% - 20px)`);
  }
}
rebuildLayout();

// ─── Raycaster: hover detection + status bar ───────────────────────

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const statusbar = document.getElementById('statusbar');
let hoveredMesh = null;
let hoveredOriginalEmissive = null;

renderer.domElement.addEventListener('mousemove', (e) => {
  // Figure out which viewport the mouse is in (left half = combined)
  const W = window.innerWidth, H = window.innerHeight;
  const leftW = Math.floor(W / 2);

  // For raycasting we need normalized device coords relative to the
  // viewport the mouse is over. We use the left (combined) viewport's
  // aspect for simplicity since all viewports share the same camera.
  let nx, ny;
  if (e.clientX < leftW) {
    // Left viewport
    nx = (e.clientX / leftW) * 2 - 1;
    ny = -(e.clientY / H) * 2 + 1;
  } else {
    // Right viewport — still same camera, just different scissor
    const rW = W - leftW;
    nx = ((e.clientX - leftW) / rW) * 2 - 1;
    ny = -(e.clientY / H) * 2 + 1;
  }

  mouse.set(nx, ny);
  raycaster.setFromCamera(mouse, camera);

  // Only test against the piece group meshes (skip plane viz, lights, etc.)
  const testMeshes = [];
  activePieces.forEach(g => {
    g.children.forEach(m => { if (m.isMesh) testMeshes.push(m); });
  });

  const hits = raycaster.intersectObjects(testMeshes, false);

  // Un-highlight previous
  if (hoveredMesh && hoveredMesh !== (hits[0]?.object)) {
    if (hoveredMesh.material) {
      const mats = Array.isArray(hoveredMesh.material) ? hoveredMesh.material : [hoveredMesh.material];
      mats.forEach((m, i) => {
        if (hoveredOriginalEmissive && hoveredOriginalEmissive[i]) {
          m.emissive?.copy(hoveredOriginalEmissive[i]);
        }
      });
    }
    hoveredMesh = null;
    hoveredOriginalEmissive = null;
  }

  if (hits.length > 0) {
    const hit = hits[0];
    const mesh = hit.object;

    // Highlight: add a subtle emissive glow
    if (mesh !== hoveredMesh) {
      hoveredMesh = mesh;
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      hoveredOriginalEmissive = mats.map(m => m.emissive ? m.emissive.clone() : new THREE.Color(0));
      mats.forEach(m => {
        if (m.emissive) m.emissive.set(0x333333);
      });
    }

    // Find which piece group this mesh belongs to
    let pieceIdx = -1;
    for (let i = 0; i < activePieces.length; i++) {
      if (activePieces[i].children.includes(mesh)) { pieceIdx = i; break; }
    }

    const geo = mesh.geometry;
    const triCount = geo.index ? geo.index.count / 3 : 0;
    const vertCount = geo.attributes.position ? geo.attributes.position.count : 0;
    const bb = new THREE.Box3().setFromBufferAttribute(geo.attributes.position);
    const size = new THREE.Vector3(); bb.getSize(size);
    const pt = hit.point;

    statusbar.innerHTML = [
      `<span class="label">piece</span> <span class="val">${pieceIdx + 1}</span>`,
      `<span class="label">tris</span> <span class="val">${triCount}</span>`,
      `<span class="label">verts</span> <span class="val">${vertCount}</span>`,
      `<span class="label">size</span> <span class="val">${size.x.toFixed(0)} × ${size.y.toFixed(0)} × ${size.z.toFixed(0)}</span>`,
      `<span class="label">hit</span> <span class="val">(${pt.x.toFixed(1)}, ${pt.y.toFixed(1)}, ${pt.z.toFixed(1)})</span>`,
      `<span class="label">face</span> <span class="val">${hit.faceIndex ?? '—'}</span>`,
      `<span class="label">materials</span> <span class="val">${Array.isArray(mesh.material) ? mesh.material.length : 1}</span>`,
    ].join('  ');
  } else {
    statusbar.innerHTML = '<span class="dim">hover a piece to inspect</span>';
  }
});

// Clear highlight when mouse leaves the canvas
renderer.domElement.addEventListener('mouseleave', () => {
  if (hoveredMesh) {
    const mats = Array.isArray(hoveredMesh.material) ? hoveredMesh.material : [hoveredMesh.material];
    mats.forEach((m, i) => {
      if (hoveredOriginalEmissive && hoveredOriginalEmissive[i]) {
        m.emissive?.copy(hoveredOriginalEmissive[i]);
      }
    });
    hoveredMesh = null;
    hoveredOriginalEmissive = null;
  }
  statusbar.innerHTML = '<span class="dim">hover a piece to inspect</span>';
});

// ─── Render loop ───────────────────────────────────────────────────

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const W = window.innerWidth, H = window.innerHeight;
  const n = activePieces.length;
  const cols = n <= 2 ? 1 : 2;
  const rows = Math.ceil(n / cols);

  renderer.setScissorTest(true);

  // Left: combined
  activePieces.forEach(g => g.visible = true);
  if (pvA) pvA.visible = true;
  if (pvB) pvB.visible = true;
  renderer.setViewport(0, 0, W/2|0, H);
  renderer.setScissor(0, 0, W/2|0, H);
  camera.aspect = (W/2) / H;
  camera.updateProjectionMatrix();
  renderer.setClearColor(0x1c1917, 1); renderer.clear();
  renderer.render(scene, camera);

  // Right: piece grid
  const rW = Math.ceil(W / 2);
  const cW = Math.floor(rW / cols), cH = Math.floor(H / rows);

  for (let i = 0; i < n; i++) {
    const c = i % cols, r = Math.floor(i / cols);
    activePieces.forEach(g => g.visible = false);
    activePieces[i].visible = true;
    if (pvA) pvA.visible = false;
    if (pvB) pvB.visible = false;

    const vx = (W/2|0) + c * cW;
    const vy = H - (r + 1) * cH;
    renderer.setViewport(vx, vy, cW, cH);
    renderer.setScissor(vx, vy, cW, cH);
    camera.aspect = cW / cH;
    camera.updateProjectionMatrix();
    renderer.setClearColor(0x1a1816, 1); renderer.clear();
    renderer.render(scene, camera);
  }

  renderer.setScissorTest(false);
}
animate();

window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));
</script>
</body>
</html>
