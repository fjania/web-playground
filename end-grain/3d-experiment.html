<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>End Grain — 3D Experiment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1c1917; overflow: hidden; font-family: 'Geist Mono', monospace; }
  #info {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    color: #a8a29e; font-size: 10px; line-height: 1.5;
    pointer-events: none; user-select: none;
  }
  #info strong { color: #e4cc8f; }
  .step-label {
    position: fixed; z-index: 10; pointer-events: none; user-select: none;
    color: #b45309; font-size: 9px; letter-spacing: 0.5px;
    background: rgba(28,25,23,0.8); padding: 3px 8px; border-radius: 3px;
  }
  .divider { position: fixed; background: #3d3835; z-index: 5; }
  #statusbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    height: 28px; display: flex; align-items: center; gap: 16px;
    padding: 0 12px;
    background: rgba(28,25,23,0.92); border-top: 1px solid #3d3835;
    font-size: 10px; color: #78716c;
  }
  #statusbar .label { color: #a8a29e; text-transform: uppercase; letter-spacing: 0.5px; }
  #statusbar .val { color: #e4cc8f; }
  #statusbar .dim { color: #555; }
  .slider-bar {
    position: fixed; bottom: 28px; z-index: 10;
    height: 32px; display: flex; align-items: center; gap: 8px;
    padding: 0 12px;
    background: rgba(28,25,23,0.92); border-top: 1px solid #3d3835;
    color: #a8a29e; font-size: 10px;
  }
  .slider-bar label { letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; }
  .slider-bar input[type="range"] {
    width: 120px; accent-color: #b45309;
  }
  .slider-bar .angle-val { color: #e4cc8f; font-weight: bold; }
</style>
</head>
<body>
<div id="info">
  <strong>End Grain — Cut + Combine + Recut</strong>
</div>
<div class="slider-bar" style="left:0; width:33.33%">
  <label>cut A: <span id="angle-a-val" class="angle-val">7°</span></label>
  <input type="range" id="angle-a-slider" min="-45" max="45" step="1" value="7">
</div>
<div class="slider-bar" style="left:33.33%; width:33.33%">
  <label>cut B: <span id="angle-b-val" class="angle-val">7°</span></label>
  <input type="range" id="angle-b-slider" min="-45" max="45" step="1" value="7">
</div>
<div id="statusbar"><span class="dim">hover a piece to inspect</span></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Brush, Evaluator, SUBTRACTION, INTERSECTION, ADDITION } from 'three-bvh-csg';

// ─── Renderer ──────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// ─── Scene ─────────────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1917);

scene.add((() => {
  const k = new THREE.DirectionalLight(0xfff5e6, 1.6);
  k.position.set(300, 400, 200); k.castShadow = true;
  k.shadow.mapSize.set(1024, 1024);
  k.shadow.camera.near = 50; k.shadow.camera.far = 1200;
  k.shadow.camera.left = -500; k.shadow.camera.right = 500;
  k.shadow.camera.top = 500; k.shadow.camera.bottom = -500;
  return k;
})());
scene.add(new THREE.DirectionalLight(0xc8d8e8, 0.8).translateX(-200).translateY(100).translateZ(-100));
scene.add(new THREE.DirectionalLight(0xd4c8b8, 0.7).translateY(-300));
scene.add(new THREE.DirectionalLight(0xb8c0c8, 0.4).translateX(-100).translateY(200).translateZ(-300));
scene.add(new THREE.AmbientLight(0x4a4440, 1.2));

// ─── Wood materials ────────────────────────────────────────────────

function makeEndGrainTex(base, ring) {
  const s = 256, c = document.createElement('canvas'); c.width = s; c.height = s;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, s, s);
  for (let i = 12; i >= 1; i--) {
    x.beginPath(); x.arc(s*.48, s*.52, (i/12)*s*.45, 0, Math.PI*2);
    x.strokeStyle = ring; x.lineWidth = 1.2; x.globalAlpha = .25+(i/12)*.15; x.stroke();
  }
  x.globalAlpha = 1;
  return new THREE.CanvasTexture(c);
}
function makeSideMat(base, grain) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 30; i++) {
    const px = Math.random()*256; x.beginPath(); x.moveTo(px, 0);
    for (let y = 0; y < 256; y += 10) x.lineTo(px+(Math.random()-.5)*4, y);
    x.strokeStyle = grain; x.lineWidth = .8+Math.random(); x.globalAlpha = .1+Math.random()*.15; x.stroke();
  }
  return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(c), roughness: 0.65 });
}
function makeWoodMats(base, ring, grain) {
  const e = new THREE.MeshStandardMaterial({ map: makeEndGrainTex(base, ring), roughness: 0.7 });
  const s = makeSideMat(base, grain);
  return [s, s, e, e, s, s];
}
const mapleMats = makeWoodMats('#e4cc8f', '#b5a06a', '#c4aa70');
const walnutMats = makeWoodMats('#3d2416', '#2a1a0e', '#4a2e1a');
const mapleCut = new THREE.MeshStandardMaterial({ color: 0xe4cc8f, roughness: 0.75 });
const walnutCut = new THREE.MeshStandardMaterial({ color: 0x3d2416, roughness: 0.75 });

// ─── Dimensions ────────────────────────────────────────────────────

const segW = 50, segH = 50, segD = 500, cubeCount = 32;
const halfLen = (cubeCount * segW) / 2;

// ─── CSG helpers ───────────────────────────────────────────────────

const HS = 2000;
const evaluator = new Evaluator();

function makeHalfSpace(normal, constant, mat) {
  const b = new Brush(new THREE.BoxGeometry(HS, HS, HS), mat);
  b.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
  const pp = normal.clone().multiplyScalar(-constant);
  b.position.copy(pp.add(normal.clone().multiplyScalar(-HS / 2)));
  b.updateMatrixWorld();
  return b;
}

// ─── Groups (persistent across rebuilds) ──────────────────────────

const step1_top = new THREE.Group();
const step1_bot = new THREE.Group();
scene.add(step1_top);
scene.add(step1_bot);

const pvA = new THREE.Mesh(
  new THREE.PlaneGeometry(520, 150),
  new THREE.MeshBasicMaterial({ color: 0xc0392b, transparent: true, opacity: 0.07, side: THREE.DoubleSide, depthWrite: false })
);
scene.add(pvA);

const step2_union = new THREE.Group();
scene.add(step2_union);

const pvB = new THREE.Mesh(
  new THREE.PlaneGeometry(520, 600),
  new THREE.MeshBasicMaterial({ color: 0x2980b9, transparent: true, opacity: 0.07, side: THREE.DoubleSide, depthWrite: false })
);
scene.add(pvB);

const step3_top = new THREE.Group();
const step3_bot = new THREE.Group();
scene.add(step3_top);
scene.add(step3_bot);

// ─── Build pipeline from angle ────────────────────────────────────

function rebuild(angleA, angleB) {
  const radA = angleA * Math.PI / 180;
  const planeN = new THREE.Vector3(Math.sin(radA), 0, -Math.cos(radA)).normalize();
  const planeD = 0;

  // Clear previous geometry
  step1_top.clear();
  step1_bot.clear();
  step2_union.clear();
  step3_top.clear();
  step3_bot.clear();

  // ── Step 1: Cut each cube with the plane ──
  for (let i = 0; i < cubeCount; i++) {
    const x = i * segW - halfLen + segW / 2;
    const y = segH / 2;
    const isMaple = i % 2 === 0;
    const mats = isMaple ? mapleMats : walnutMats;
    const cutMat = isMaple ? mapleCut : walnutCut;
    const hs = makeHalfSpace(planeN, planeD, cutMat);

    const c1 = new Brush(new THREE.BoxGeometry(segW, segH, segD), mats);
    c1.position.set(x, y, 0); c1.updateMatrixWorld();
    const top = evaluator.evaluate(c1, hs, SUBTRACTION);
    top.castShadow = true; step1_top.add(top);

    const c2 = new Brush(new THREE.BoxGeometry(segW, segH, segD), mats);
    c2.position.set(x, y, 0); c2.updateMatrixWorld();
    const bot = evaluator.evaluate(c2, hs, INTERSECTION);
    bot.castShadow = true; step1_bot.add(bot);
  }

  // Separate halves along the cut normal for left viewport
  const sep = 20;
  step1_top.position.copy(planeN.clone().multiplyScalar(sep));
  step1_bot.position.copy(planeN.clone().multiplyScalar(-sep));

  // Update plane viz
  pvA.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), planeN);

  // ── Step 2: Combine — slide top half along Z, then union ──
  // Collect all meshes with world transforms baked in, applying the Z offset
  // so uncut faces touch.
  const allMeshes = [];

  // Top half: offset in +Z so its min-Z face meets bot's max-Z face
  step1_top.updateMatrixWorld(true);
  const bbTopTemp = new THREE.Box3().setFromObject(step1_top);
  const bbBotTemp = new THREE.Box3().setFromObject(step1_bot);
  // Remove separation offset for the combine calculation
  const topMinZ = bbTopTemp.min.z - sep * planeN.z;
  const botMaxZ = bbBotTemp.max.z + sep * planeN.z;
  const zOffset = botMaxZ - topMinZ;

  // Collect top half meshes with Z offset
  step1_top.children.forEach(mesh => {
    const geo = mesh.geometry.clone();
    const m4 = new THREE.Matrix4();
    m4.compose(mesh.position, mesh.quaternion, mesh.scale);
    geo.applyMatrix4(m4);
    // Apply Z offset
    const pos = geo.attributes.position;
    for (let v = 0; v < pos.count; v++) {
      pos.setZ(v, pos.getZ(v) + zOffset);
    }
    pos.needsUpdate = true;
    allMeshes.push({ geo, material: mesh.material });
  });

  // Collect bottom half meshes at original positions
  step1_bot.children.forEach(mesh => {
    const geo = mesh.geometry.clone();
    const m4 = new THREE.Matrix4();
    m4.compose(mesh.position, mesh.quaternion, mesh.scale);
    geo.applyMatrix4(m4);
    allMeshes.push({ geo, material: mesh.material });
  });

  // Union all meshes
  console.log(`Rebuilding: angleA=${angleA}°, unioning ${allMeshes.length} meshes...`);
  let result = new Brush(allMeshes[0].geo, allMeshes[0].material);
  result.updateMatrixWorld();

  for (let i = 1; i < allMeshes.length; i++) {
    const b = new Brush(allMeshes[i].geo, allMeshes[i].material);
    b.updateMatrixWorld();
    result = evaluator.evaluate(result, b, ADDITION);
    result.updateMatrixWorld();
  }

  result.castShadow = true;

  // Center the union geometry at the origin so plane B cuts through it
  result.geometry.computeBoundingBox();
  const center = new THREE.Vector3();
  result.geometry.boundingBox.getCenter(center);
  result.geometry.translate(-center.x, -center.y, -center.z);
  result.geometry.computeBoundingBox();

  step2_union.add(result);

  // Log result
  const bb = new THREE.Box3().setFromObject(result);
  const sz = new THREE.Vector3(); bb.getSize(sz);
  const tris = result.geometry.index ? result.geometry.index.count / 3 : 0;
  console.log(`Union: ${tris} tris, bounds: ${sz.x.toFixed(1)} × ${sz.y.toFixed(1)} × ${sz.z.toFixed(1)}, centered at origin`);

  // ── Step 3: Recut the union with plane B ──
  const radB = angleB * Math.PI / 180;
  const planeB_n = new THREE.Vector3(Math.sin(radB), 0, -Math.cos(radB)).normalize();
  const planeB_d = 0;

  pvB.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), planeB_n);

  const cutMat3 = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.7 });
  const hsB = makeHalfSpace(planeB_n, planeB_d, cutMat3);

  // The union result is a single Brush-compatible mesh. Cut it with plane B.
  const unionBrush = new Brush(result.geometry.clone(), result.material);
  unionBrush.updateMatrixWorld();

  const recutTop = evaluator.evaluate(unionBrush, hsB, SUBTRACTION);
  recutTop.castShadow = true;
  step3_top.add(recutTop);

  const unionBrush2 = new Brush(result.geometry.clone(), result.material);
  unionBrush2.updateMatrixWorld();
  const recutBot = evaluator.evaluate(unionBrush2, hsB, INTERSECTION);
  recutBot.castShadow = true;
  step3_bot.add(recutBot);

  // Separate recut halves along plane B normal
  step3_top.position.copy(planeB_n.clone().multiplyScalar(20));
  step3_bot.position.copy(planeB_n.clone().multiplyScalar(-20));

  console.log(`Recut: angle=${angleB}°`);
}

// Initial build
rebuild(7, 7);

// ─── Sliders ──────────────────────────────────────────────────────

const sliderA = document.getElementById('angle-a-slider');
const valA = document.getElementById('angle-a-val');
const sliderB = document.getElementById('angle-b-slider');
const valB = document.getElementById('angle-b-val');

function onSliderChange() {
  const a = parseInt(sliderA.value, 10);
  const b = parseInt(sliderB.value, 10);
  valA.textContent = `${a}°`;
  valB.textContent = `${b}°`;
  rebuild(a, b);
}
sliderA.addEventListener('input', onSliderChange);
sliderB.addEventListener('input', onSliderChange);

// ─── Camera + controls ─────────────────────────────────────────────

const camera = new THREE.PerspectiveCamera(45, 1, 1, 10000);
camera.position.set(1000, 600, 800);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.target.set(0, 25, 0);

// ─── Layout ────────────────────────────────────────────────────────

function mkDiv(css) {
  const d = document.createElement('div'); d.className = 'divider';
  d.style.cssText = css; document.body.appendChild(d);
}
mkDiv('top:0; left:33.33%; width:1px; height:100%');
mkDiv('top:0; left:66.66%; width:1px; height:100%');

function mkLabel(txt, css) {
  const el = document.createElement('div'); el.className = 'step-label';
  el.textContent = txt; el.style.cssText = css; document.body.appendChild(el);
}
mkLabel('step 1: cut', 'top:8px; left:calc(16.66% - 20px)');
mkLabel('step 2: joined', 'top:8px; left:calc(50% - 25px)');
mkLabel('step 3: recut', 'top:8px; left:calc(83.33% - 25px)');

// ─── Hover / raycaster ─────────────────────────────────────────────

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const statusbar = document.getElementById('statusbar');
let hoveredMesh = null, hoveredOrig = null;

renderer.domElement.addEventListener('mousemove', (e) => {
  const W = window.innerWidth, H = window.innerHeight;
  const thirdW = Math.floor(W / 3);
  const vpIdx = e.clientX < thirdW ? 0 : e.clientX < thirdW * 2 ? 1 : 2;
  const vpX = vpIdx * thirdW;
  const vpW = vpIdx === 2 ? W - thirdW * 2 : thirdW;
  const nx = ((e.clientX - vpX) / vpW) * 2 - 1;
  const ny = -(e.clientY / H) * 2 + 1;
  mouse.set(nx, ny);
  raycaster.setFromCamera(mouse, camera);

  const groups = vpIdx === 0 ? [step1_top, step1_bot]
    : vpIdx === 1 ? [step2_union]
    : [step3_top, step3_bot];
  const meshes = [];
  groups.forEach(g => g.traverse(m => { if (m.isMesh) meshes.push(m); }));
  const hits = raycaster.intersectObjects(meshes, false);

  if (hoveredMesh && hoveredMesh !== hits[0]?.object) {
    const mats = Array.isArray(hoveredMesh.material) ? hoveredMesh.material : [hoveredMesh.material];
    mats.forEach((m, i) => { if (hoveredOrig?.[i]) m.emissive?.copy(hoveredOrig[i]); });
    hoveredMesh = null; hoveredOrig = null;
  }
  if (hits.length > 0) {
    const hit = hits[0], mesh = hit.object;
    if (mesh !== hoveredMesh) {
      hoveredMesh = mesh;
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      hoveredOrig = mats.map(m => m.emissive ? m.emissive.clone() : new THREE.Color(0));
      mats.forEach(m => { if (m.emissive) m.emissive.set(0x333333); });
    }
    const geo = mesh.geometry;
    const tris = geo.index ? geo.index.count / 3 : 0;
    const pt = hit.point;
    const bb = new THREE.Box3().setFromObject(mesh);
    const sz = new THREE.Vector3(); bb.getSize(sz);
    statusbar.innerHTML = `<span class="label">tris</span> <span class="val">${tris}</span>  ` +
      `<span class="label">hit</span> <span class="val">(${pt.x.toFixed(1)}, ${pt.y.toFixed(1)}, ${pt.z.toFixed(1)})</span>  ` +
      `<span class="label">bounds</span> <span class="val">${sz.x.toFixed(0)}×${sz.y.toFixed(0)}×${sz.z.toFixed(0)}</span>  ` +
      `<span class="label">face</span> <span class="val">${hit.faceIndex ?? '—'}</span>`;
  } else {
    statusbar.innerHTML = '<span class="dim">hover a piece to inspect</span>';
  }
});

// ─── Axes gizmo (corner reference) ─────────────────────────────────

const axesScene = new THREE.Scene();
const axesCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
axesCamera.position.set(0, 0, 3);
axesCamera.lookAt(0, 0, 0);

function makeAxis(dir, color) {
  const mat = new THREE.LineBasicMaterial({ color });
  const pts = [new THREE.Vector3(0,0,0), dir.clone()];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, mat);
}
const axesGroup = new THREE.Group();
axesGroup.add(makeAxis(new THREE.Vector3(1,0,0), 0xff4444));
axesGroup.add(makeAxis(new THREE.Vector3(0,1,0), 0x44ff44));
axesGroup.add(makeAxis(new THREE.Vector3(0,0,1), 0x4488ff));

function makeAxisLabel(text, position, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 32, 32);
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  sprite.position.copy(position);
  sprite.scale.set(0.3, 0.3, 1);
  return sprite;
}
axesGroup.add(makeAxisLabel('X', new THREE.Vector3(1.2, 0, 0), '#ff4444'));
axesGroup.add(makeAxisLabel('Y', new THREE.Vector3(0, 1.2, 0), '#44ff44'));
axesGroup.add(makeAxisLabel('Z', new THREE.Vector3(0, 0, 1.2), '#4488ff'));
axesScene.add(axesGroup);

// ─── Render loop: 3 viewports ──────────────────────────────────────

const axesSize = 80;

function setAllVisible(vis) {
  step1_top.visible = vis.s1 || false;
  step1_bot.visible = vis.s1 || false;
  pvA.visible = vis.s1 || false;
  step2_union.visible = vis.s2 || false;
  pvB.visible = vis.s2 || false;
  step3_top.visible = vis.s3 || false;
  step3_bot.visible = vis.s3 || false;
}

function renderViewport(x, y, w, h, vis, bg) {
  setAllVisible(vis);
  renderer.setViewport(x, y, w, h);
  renderer.setScissor(x, y, w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setClearColor(bg, 1); renderer.clear();
  renderer.render(scene, camera);

  // Axes gizmo
  renderer.setViewport(x + 8, 8, axesSize, axesSize);
  renderer.setScissor(x + 8, 8, axesSize, axesSize);
  renderer.clearDepth();
  renderer.render(axesScene, axesCamera);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const W = window.innerWidth, H = window.innerHeight;
  const thirdW = Math.floor(W / 3);
  renderer.setScissorTest(true);

  axesGroup.quaternion.copy(camera.quaternion).invert();

  renderViewport(0, 0, thirdW, H, { s1: true }, 0x1c1917);
  renderViewport(thirdW, 0, thirdW, H, { s2: true }, 0x1a1816);
  renderViewport(thirdW * 2, 0, W - thirdW * 2, H, { s3: true }, 0x1c1917);

  renderer.setScissorTest(false);
}
animate();

window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));
</script>
</body>
</html>
