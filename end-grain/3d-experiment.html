<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>End Grain — 3D Experiment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1c1917; overflow: hidden; font-family: 'Geist Mono', monospace; }
  #info {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    color: #a8a29e; font-size: 10px; line-height: 1.5;
    pointer-events: none; user-select: none;
  }
  #info strong { color: #e4cc8f; }
  #info .accent { color: #c0392b; }
  .panel-label {
    position: fixed; z-index: 10;
    color: #78716c; font-size: 8px; letter-spacing: 1px;
    text-transform: uppercase;
    pointer-events: none; user-select: none;
    background: rgba(28,25,23,0.7); padding: 2px 6px; border-radius: 3px;
  }
  .divider {
    position: fixed; background: #3d3835; z-index: 5;
  }
</style>
</head>
<body>
<div id="info">
  <strong>End Grain — 2-plane CSG</strong><br>
  <span class="accent">2 random cuts · all pieces</span><br>
  orbit any view to orbit all
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Brush, Evaluator, SUBTRACTION, INTERSECTION } from 'three-bvh-csg';

// ─── Renderer ──────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// ─── Scene ─────────────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1917);

// Lighting
const key = new THREE.DirectionalLight(0xfff5e6, 1.6);
key.position.set(300, 400, 200);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.camera.near = 50; key.shadow.camera.far = 1200;
key.shadow.camera.left = -500; key.shadow.camera.right = 500;
key.shadow.camera.top = 500; key.shadow.camera.bottom = -500;
scene.add(key);
scene.add(new THREE.DirectionalLight(0xc8d8e8, 0.8).translateX(-200).translateY(100).translateZ(-100));
scene.add(new THREE.DirectionalLight(0xd4c8b8, 0.7).translateY(-300));
scene.add(new THREE.DirectionalLight(0xb8c0c8, 0.4).translateX(-100).translateY(200).translateZ(-300));
scene.add(new THREE.AmbientLight(0x4a4440, 1.2));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1200, 1200),
  new THREE.MeshStandardMaterial({ color: 0x262220, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// ─── Wood materials ────────────────────────────────────────────────

function makeEndGrainTexture(base, ring) {
  const s = 256, c = document.createElement('canvas'); c.width = s; c.height = s;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, s, s);
  const cx = s * 0.48, cy = s * 0.52;
  for (let i = 12; i >= 1; i--) {
    x.beginPath(); x.arc(cx, cy, (i/12)*s*0.45, 0, Math.PI*2);
    x.strokeStyle = ring; x.lineWidth = 1.2; x.globalAlpha = 0.25+(i/12)*0.15; x.stroke();
  }
  x.globalAlpha = 1; x.beginPath(); x.arc(cx, cy, 3, 0, Math.PI*2);
  x.fillStyle = ring; x.globalAlpha = 0.6; x.fill();
  return new THREE.CanvasTexture(c);
}
function makeSideMat(base, grain) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 40; i++) {
    const px = Math.random()*256; x.beginPath(); x.moveTo(px, 0);
    for (let y = 0; y < 256; y += 10) x.lineTo(px+(Math.random()-0.5)*4, y);
    x.strokeStyle = grain; x.lineWidth = 0.8+Math.random()*1.2;
    x.globalAlpha = 0.12+Math.random()*0.15; x.stroke();
  }
  return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(c), roughness: 0.65 });
}
function makeWoodMats(base, ring, grain) {
  const e = new THREE.MeshStandardMaterial({ map: makeEndGrainTexture(base, ring), roughness: 0.7 });
  const s = makeSideMat(base, grain);
  return [s, s, e, e, s, s];
}
const mapleMats = makeWoodMats('#e4cc8f', '#b5a06a', '#c4aa70');
const walnutMats = makeWoodMats('#3d2416', '#2a1a0e', '#4a2e1a');
const mapleCut = new THREE.MeshStandardMaterial({ color: 0xe4cc8f, roughness: 0.75 });
const walnutCut = new THREE.MeshStandardMaterial({ color: 0x3d2416, roughness: 0.75 });

// ─── Strip ─────────────────────────────────────────────────────────

const cubeSize = 50, cubeCount = 8;
const halfLen = (cubeCount * cubeSize) / 2;
const halfZ = cubeSize / 2;

// ─── Two random full-length cutting planes ─────────────────────────

function randomFullLengthPlane() {
  const margin = 8;
  const yr = cubeSize - 2 * margin, zr = cubeSize - 2 * margin;
  const y1 = margin + Math.random() * yr, z1 = -halfZ + margin + Math.random() * zr;
  const y2 = margin + Math.random() * yr, z2 = -halfZ + margin + Math.random() * zr;
  const P1 = new THREE.Vector3(-halfLen, y1, z1);
  const P2 = new THREE.Vector3(halfLen, y2, z2);
  const d = new THREE.Vector3().subVectors(P2, P1);
  const theta = Math.random() * Math.PI * 2;
  const v = new THREE.Vector3(0, Math.cos(theta), Math.sin(theta));
  const normal = new THREE.Vector3().crossVectors(d, v).normalize();
  const constant = -normal.dot(P1);
  return { normal, constant };
}

const cutA = randomFullLengthPlane();
const cutB = randomFullLengthPlane();

// ─── Build half-space brush for a cut ──────────────────────────────

const halfSpaceSize = 800;
function makeHalfSpace(cut, material) {
  const b = new Brush(
    new THREE.BoxGeometry(halfSpaceSize, halfSpaceSize, halfSpaceSize),
    material
  );
  b.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), cut.normal);
  const pp = cut.normal.clone().multiplyScalar(-cut.constant);
  b.position.copy(pp.add(cut.normal.clone().multiplyScalar(-halfSpaceSize / 2)));
  b.updateMatrixWorld();
  return b;
}

// ─── CSG: two cuts → up to 4 pieces per cube ──────────────────────
//
// For each cube, apply both planes:
//   piece 0: above A, above B  → SUB(A) then SUB(B)
//   piece 1: above A, below B  → SUB(A) then INTER(B)
//   piece 2: below A, above B  → INTER(A) then SUB(B)
//   piece 3: below A, below B  → INTER(A) then INTER(B)
//
// Some pieces may be empty if the plane doesn't intersect that cube.

const evaluator = new Evaluator();

// 4 groups (one per piece region). Not all will have content.
const pieceGroups = [
  new THREE.Group(), // A+B+
  new THREE.Group(), // A+B-
  new THREE.Group(), // A-B+
  new THREE.Group(), // A-B-
];

const ops = [
  [SUBTRACTION, SUBTRACTION],   // above A, above B
  [SUBTRACTION, INTERSECTION],  // above A, below B
  [INTERSECTION, SUBTRACTION],  // below A, above B
  [INTERSECTION, INTERSECTION], // below A, below B
];

for (let i = 0; i < cubeCount; i++) {
  const x = i * cubeSize - halfLen + cubeSize / 2;
  const y = cubeSize / 2;
  const isMaple = i % 2 === 0;
  const cutMat = isMaple ? mapleCut : walnutCut;

  const cubeBrush = new Brush(
    new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize),
    isMaple ? mapleMats : walnutMats
  );
  cubeBrush.position.set(x, y, 0);
  cubeBrush.updateMatrixWorld();

  const halfA = makeHalfSpace(cutA, cutMat);
  const halfB = makeHalfSpace(cutB, cutMat);

  for (let p = 0; p < 4; p++) {
    try {
      // First cut
      const after1 = evaluator.evaluate(cubeBrush, halfA, ops[p][0]);
      // Wrap result as a Brush for the second cut
      const brush1 = new Brush(after1.geometry, after1.material);
      brush1.updateMatrixWorld();
      // Second cut
      const after2 = evaluator.evaluate(brush1, halfB, ops[p][1]);
      // Only add if geometry has triangles
      if (after2.geometry.index && after2.geometry.index.count > 0) {
        after2.castShadow = true;
        after2.receiveShadow = true;
        pieceGroups[p].add(after2);
      }
    } catch {
      // CSG can fail on degenerate cases — skip this piece
    }
  }
}

// Separate pieces visually: offset each group along a combination of
// the two cut normals so they spread apart.
const sep = 25;
const offsets = [
  cutA.normal.clone().multiplyScalar(sep).add(cutB.normal.clone().multiplyScalar(sep)),
  cutA.normal.clone().multiplyScalar(sep).add(cutB.normal.clone().multiplyScalar(-sep)),
  cutA.normal.clone().multiplyScalar(-sep).add(cutB.normal.clone().multiplyScalar(sep)),
  cutA.normal.clone().multiplyScalar(-sep).add(cutB.normal.clone().multiplyScalar(-sep)),
];

// Filter out empty groups and collect non-empty ones
const activePieces = [];
for (let p = 0; p < 4; p++) {
  if (pieceGroups[p].children.length > 0) {
    pieceGroups[p].position.copy(offsets[p]);
    scene.add(pieceGroups[p]);
    activePieces.push(pieceGroups[p]);
  }
}

// ─── Cut plane visualizations ──────────────────────────────────────

function makePlaneViz(cut, color) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(520, 150),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.07,
      side: THREE.DoubleSide, depthWrite: false,
    })
  );
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), cut.normal);
  m.position.copy(cut.normal.clone().multiplyScalar(-cut.constant));
  return m;
}

const planeVizA = makePlaneViz(cutA, 0xc0392b);
const planeVizB = makePlaneViz(cutB, 0x2980b9);
scene.add(planeVizA);
scene.add(planeVizB);

// ─── Camera + controls ─────────────────────────────────────────────

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(350, 250, 400);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 25, 0);

// ─── Dynamic layout: dividers + labels ─────────────────────────────

const nPieces = activePieces.length;
const labelsEl = [];

function buildLayout() {
  // Remove old dividers/labels
  document.querySelectorAll('.divider, .panel-label').forEach(e => e.remove());

  // Vertical divider
  const dv = document.createElement('div');
  dv.className = 'divider';
  dv.style.cssText = 'top:0; left:50%; width:1px; height:100%';
  document.body.appendChild(dv);

  // Right-side piece grid: arrange in rows based on piece count
  const cols = nPieces <= 2 ? 1 : 2;
  const rows = Math.ceil(nPieces / cols);

  for (let r = 0; r < rows; r++) {
    if (r > 0) {
      const dh = document.createElement('div');
      dh.className = 'divider';
      dh.style.cssText = `top:${(r / rows) * 100}%; left:50%; width:50%; height:1px`;
      document.body.appendChild(dh);
    }
  }
  if (cols > 1) {
    const dh2 = document.createElement('div');
    dh2.className = 'divider';
    dh2.style.cssText = 'top:0; left:75%; width:1px; height:100%';
    document.body.appendChild(dh2);
  }

  // Labels
  const addLabel = (text, css) => {
    const el = document.createElement('div');
    el.className = 'panel-label';
    el.textContent = text;
    el.style.cssText = css;
    document.body.appendChild(el);
  };
  addLabel('combined', 'top:10px; left:calc(25% - 30px)');
  for (let i = 0; i < nPieces; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const lx = 50 + (col / cols) * 50 + 25 / cols;
    const ly = (row / rows) * 100;
    addLabel(`piece ${i + 1}`, `top:${ly + 1}%; left:calc(${lx}% - 20px)`);
  }
}
buildLayout();

// ─── Multi-viewport rendering ──────────────────────────────────────

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const W = window.innerWidth, H = window.innerHeight;
  const cols = nPieces <= 2 ? 1 : 2;
  const rows = Math.ceil(nPieces / cols);

  renderer.setScissorTest(true);

  // ── Left half: combined ──
  {
    activePieces.forEach(g => g.visible = true);
    planeVizA.visible = true;
    planeVizB.visible = true;

    const vw = Math.floor(W / 2), vh = H;
    renderer.setViewport(0, 0, vw, vh);
    renderer.setScissor(0, 0, vw, vh);
    camera.aspect = vw / vh;
    camera.updateProjectionMatrix();
    renderer.setClearColor(0x1c1917, 1);
    renderer.clear();
    renderer.render(scene, camera);
  }

  // ── Right grid: one pass per piece ──
  const rightW = Math.ceil(W / 2);
  const cellW = Math.floor(rightW / cols);
  const cellH = Math.floor(H / rows);

  for (let i = 0; i < nPieces; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);

    // Toggle visibility: only this piece
    activePieces.forEach(g => g.visible = false);
    activePieces[i].visible = true;
    planeVizA.visible = false;
    planeVizB.visible = false;

    // Viewport: bottom-left origin in WebGL, so flip row
    const vx = Math.floor(W / 2) + col * cellW;
    const vy = H - (row + 1) * cellH; // flip Y
    renderer.setViewport(vx, vy, cellW, cellH);
    renderer.setScissor(vx, vy, cellW, cellH);
    camera.aspect = cellW / cellH;
    camera.updateProjectionMatrix();
    renderer.setClearColor(0x1a1816, 1);
    renderer.clear();
    renderer.render(scene, camera);
  }

  renderer.setScissorTest(false);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
