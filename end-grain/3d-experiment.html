<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>End Grain — 3D Experiment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1c1917; overflow: hidden; font-family: 'Geist Mono', monospace; }
  #info {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    color: #a8a29e; font-size: 10px; line-height: 1.5;
    pointer-events: none; user-select: none;
  }
  #info strong { color: #e4cc8f; }
  .panel-label {
    position: fixed; z-index: 10;
    color: #78716c; font-size: 8px; letter-spacing: 1px;
    text-transform: uppercase;
    pointer-events: none; user-select: none;
    background: rgba(28,25,23,0.7); padding: 2px 6px; border-radius: 3px;
  }
  .divider { position: fixed; background: #3d3835; z-index: 5; }
  #statusbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    height: 28px; display: flex; align-items: center; gap: 16px;
    padding: 0 12px;
    background: rgba(28,25,23,0.92); border-top: 1px solid #3d3835;
    font-size: 10px; color: #78716c;
  }
  #statusbar .label { color: #a8a29e; text-transform: uppercase; letter-spacing: 0.5px; }
  #statusbar .val { color: #e4cc8f; }
  #statusbar .dim { color: #555; }
  .step-label {
    position: fixed; z-index: 10; pointer-events: none; user-select: none;
    color: #b45309; font-size: 9px; letter-spacing: 0.5px;
    background: rgba(28,25,23,0.8); padding: 3px 8px; border-radius: 3px;
  }
</style>
</head>
<body>
<div id="info">
  <strong>End Grain — Cut · Combine · Recut</strong><br>
  3-step pipeline
</div>
<div id="statusbar"><span class="dim">hover a piece to inspect</span></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Brush, Evaluator, SUBTRACTION, INTERSECTION, ADDITION } from 'three-bvh-csg';

// ─── Renderer ──────────────────────────────────────────────────────

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// ─── Scene ─────────────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1c1917);

scene.add((() => {
  const k = new THREE.DirectionalLight(0xfff5e6, 1.6);
  k.position.set(300, 400, 200); k.castShadow = true;
  k.shadow.mapSize.set(1024, 1024);
  k.shadow.camera.near = 50; k.shadow.camera.far = 1200;
  k.shadow.camera.left = -500; k.shadow.camera.right = 500;
  k.shadow.camera.top = 500; k.shadow.camera.bottom = -500;
  return k;
})());
scene.add(new THREE.DirectionalLight(0xc8d8e8, 0.8).translateX(-200).translateY(100).translateZ(-100));
scene.add(new THREE.DirectionalLight(0xd4c8b8, 0.7).translateY(-300));
scene.add(new THREE.DirectionalLight(0xb8c0c8, 0.4).translateX(-100).translateY(200).translateZ(-300));
scene.add(new THREE.AmbientLight(0x4a4440, 1.2));

// ─── Wood materials ────────────────────────────────────────────────

function makeEndGrainTex(base, ring) {
  const s = 256, c = document.createElement('canvas'); c.width = s; c.height = s;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, s, s);
  for (let i = 12; i >= 1; i--) {
    x.beginPath(); x.arc(s*.48, s*.52, (i/12)*s*.45, 0, Math.PI*2);
    x.strokeStyle = ring; x.lineWidth = 1.2; x.globalAlpha = .25+(i/12)*.15; x.stroke();
  }
  x.globalAlpha = 1;
  return new THREE.CanvasTexture(c);
}
function makeSideMat(base, grain) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const x = c.getContext('2d'); x.fillStyle = base; x.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 30; i++) {
    const px = Math.random()*256; x.beginPath(); x.moveTo(px, 0);
    for (let y = 0; y < 256; y += 10) x.lineTo(px+(Math.random()-.5)*4, y);
    x.strokeStyle = grain; x.lineWidth = .8+Math.random(); x.globalAlpha = .1+Math.random()*.15; x.stroke();
  }
  return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(c), roughness: 0.65 });
}
function makeWoodMats(base, ring, grain) {
  const e = new THREE.MeshStandardMaterial({ map: makeEndGrainTex(base, ring), roughness: 0.7 });
  const s = makeSideMat(base, grain);
  return [s, s, e, e, s, s];
}
const mapleMats = makeWoodMats('#e4cc8f', '#b5a06a', '#c4aa70');
const walnutMats = makeWoodMats('#3d2416', '#2a1a0e', '#4a2e1a');
const mapleCut = new THREE.MeshStandardMaterial({ color: 0xe4cc8f, roughness: 0.75 });
const walnutCut = new THREE.MeshStandardMaterial({ color: 0x3d2416, roughness: 0.75 });

// ─── Dimensions ────────────────────────────────────────────────────

const cubeSize = 50, cubeCount = 8;
const halfLen = (cubeCount * cubeSize) / 2;
const halfZ = cubeSize / 2;

// ─── CSG helpers ───────────────────────────────────────────────────

const HS = 800;
const evaluator = new Evaluator();

function makeHalfSpace(normal, constant, mat) {
  const b = new Brush(new THREE.BoxGeometry(HS, HS, HS), mat);
  b.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
  const pp = normal.clone().multiplyScalar(-constant);
  b.position.copy(pp.add(normal.clone().multiplyScalar(-HS / 2)));
  b.updateMatrixWorld();
  return b;
}

function makePlaneViz(normal, constant, color) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(520, 150),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.07,
      side: THREE.DoubleSide, depthWrite: false,
    })
  );
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), normal);
  m.position.copy(normal.clone().multiplyScalar(-constant));
  return m;
}

// ═══════════════════════════════════════════════════════════════════
// STEP 1: Cut the strip with plane A (diagonal front-left → back-right)
// ═══════════════════════════════════════════════════════════════════

const planeA = { n: new THREE.Vector3(1, 0, -8).normalize(), d: 0 };

const step1_top = new THREE.Group();
const step1_bot = new THREE.Group();

for (let i = 0; i < cubeCount; i++) {
  const x = i * cubeSize - halfLen + cubeSize / 2;
  const y = cubeSize / 2;
  const isMaple = i % 2 === 0;
  const mats = isMaple ? mapleMats : walnutMats;
  const cutMat = isMaple ? mapleCut : walnutCut;
  const hs = makeHalfSpace(planeA.n, planeA.d, cutMat);

  const cubeTop = new Brush(new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize), mats);
  cubeTop.position.set(x, y, 0); cubeTop.updateMatrixWorld();
  const top = evaluator.evaluate(cubeTop, hs, SUBTRACTION);
  top.castShadow = true; step1_top.add(top);

  const cubeBot = new Brush(new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize), mats);
  cubeBot.position.set(x, y, 0); cubeBot.updateMatrixWorld();
  const bot = evaluator.evaluate(cubeBot, hs, INTERSECTION);
  bot.castShadow = true; step1_bot.add(bot);
}

// Show step 1 with separation
const sep1 = 20;
step1_top.position.copy(planeA.n.clone().multiplyScalar(sep1));
step1_bot.position.copy(planeA.n.clone().multiplyScalar(-sep1));
scene.add(step1_top);
scene.add(step1_bot);

const pvA = makePlaneViz(planeA.n, planeA.d, 0xc0392b);
scene.add(pvA);

// ═══════════════════════════════════════════════════════════════════
// STEP 2: Combine — flip bottom piece and join cut-faces together.
//
// In woodworking: you flip one piece over and glue the cut faces
// together. We mirror the bottom half across the cut plane (reflect
// in Z so front↔back), then position them touching.
//
// For the CSG recut, we don't need to ADDITION them — we just
// position all the meshes as if glued and cut each one individually.
// ═══════════════════════════════════════════════════════════════════

// The combined group: top half stays in place, bottom half is flipped
// (mirrored in Z) so the cut faces meet.
const step2_combined = new THREE.Group();

// Clone top meshes into combined group at original positions (no sep offset)
step1_top.children.forEach(m => {
  const c = m.clone();
  // Undo the step1 separation offset
  c.position.sub(step1_top.position);
  step2_combined.add(c);
});

// Clone bottom meshes, mirror in Z, into combined group
step1_bot.children.forEach(m => {
  const c = m.clone();
  c.position.sub(step1_bot.position);
  // Mirror in Z: reflect geometry across z=0
  c.scale.z = -1;
  step2_combined.add(c);
});

// Offset the combined group to the right so it doesn't overlap step 1
step2_combined.position.set(0, 0, 0);
// We'll show this in a separate viewport, not overlapping

// ═══════════════════════════════════════════════════════════════════
// STEP 3: Recut the combined piece with the opposite diagonal.
//
// Plane A went front-left → back-right: normal (1, 0, -8)
// Opposite diagonal goes front-right → back-left: normal (1, 0, 8)
// This crosses plane A, creating an X pattern when viewed from above.
// ═══════════════════════════════════════════════════════════════════

const planeB = { n: new THREE.Vector3(1, 0, 8).normalize(), d: 0 };

const step3_pieces = [new THREE.Group(), new THREE.Group()]; // above B, below B

step2_combined.children.forEach(mesh => {
  for (let side = 0; side < 2; side++) {
    try {
      const geo = mesh.geometry.clone();
      // Apply the mesh's world transform (including any scale flip) to the geometry
      const m4 = new THREE.Matrix4();
      m4.compose(mesh.position, mesh.quaternion, mesh.scale);
      geo.applyMatrix4(m4);

      const brush = new Brush(geo, mesh.material);
      brush.updateMatrixWorld();

      // Determine species for cap color from the first material
      const firstMat = Array.isArray(mesh.material) ? mesh.material[0] : mesh.material;
      const isLight = firstMat.map || (firstMat.color && firstMat.color.r > 0.5);
      const capMat = isLight ? mapleCut : walnutCut;

      const hs = makeHalfSpace(planeB.n, planeB.d, capMat);
      const op = side === 0 ? SUBTRACTION : INTERSECTION;
      const result = evaluator.evaluate(brush, hs, op);

      if (result.geometry.index && result.geometry.index.count > 0) {
        result.castShadow = true;
        step3_pieces[side].add(result);
      }
    } catch { /* skip degenerate */ }
  }
});

// Separate the recut pieces
step3_pieces[0].position.copy(planeB.n.clone().multiplyScalar(sep1));
step3_pieces[1].position.copy(planeB.n.clone().multiplyScalar(-sep1));
step3_pieces.forEach(g => { if (g.children.length > 0) scene.add(g); });

const pvB = makePlaneViz(planeB.n, planeB.d, 0x2980b9);
scene.add(pvB);

// Collect all visible piece groups for the viewport grid
const allDisplayGroups = [
  { group: step1_top, label: 'cut A — top' },
  { group: step1_bot, label: 'cut A — bot' },
  { group: step2_combined, label: 'combined' },
  ...step3_pieces.filter(g => g.children.length > 0).map((g, i) =>
    ({ group: g, label: `recut ${i + 1}` })
  ),
];

// ─── Camera + controls ─────────────────────────────────────────────

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(350, 250, 400);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.target.set(0, 25, 0);

// ─── Layout ────────────────────────────────────────────────────────
//
// Left 50%: step 1 (the initial cut, both halves separated + plane A)
// Right 50%: grid showing step 3 recut pieces + the combined form

// For the left panel we show step 1 (cut A).
// For the right panel we show the recut pieces.
// We hide/show groups per pass.

const rightGroups = step3_pieces.filter(g => g.children.length > 0);
const nRight = rightGroups.length + 1; // +1 for the combined view
const rightAll = [step2_combined, ...rightGroups];
const rightLabels = ['combined (flipped + joined)', ...rightGroups.map((_, i) => `recut piece ${i+1}`)];

const cols = nRight <= 2 ? 1 : 2;
const rows = Math.ceil(nRight / cols);

function buildLayout() {
  document.querySelectorAll('.divider, .panel-label, .step-label').forEach(e => e.remove());

  // Vertical divider
  const dv = document.createElement('div'); dv.className = 'divider';
  dv.style.cssText = 'top:0; left:50%; width:1px; height:100%'; document.body.appendChild(dv);

  if (cols > 1) {
    const d = document.createElement('div'); d.className = 'divider';
    d.style.cssText = 'top:0; left:75%; width:1px; height:100%'; document.body.appendChild(d);
  }
  for (let r = 1; r < rows; r++) {
    const d = document.createElement('div'); d.className = 'divider';
    d.style.cssText = `top:${(r/rows)*100}%; left:50%; width:50%; height:1px`; document.body.appendChild(d);
  }

  const mkLabel = (txt, css, cls = 'panel-label') => {
    const el = document.createElement('div'); el.className = cls; el.textContent = txt;
    el.style.cssText = css; document.body.appendChild(el);
  };

  mkLabel('step 1: diagonal cut', 'top:8px; left:calc(25% - 50px)', 'step-label');
  for (let i = 0; i < nRight; i++) {
    const c = i % cols, r = Math.floor(i / cols);
    const lx = 50 + (c / cols) * 50 + 25 / cols;
    const label = i === 0 ? 'step 2: combined' : `step 3: recut piece ${i}`;
    mkLabel(label, `top:${(r/rows)*100 + 1}%; left:calc(${lx}% - 40px)`, 'step-label');
  }
}
buildLayout();

// ─── Hover / raycaster ─────────────────────────────────────────────

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const statusbar = document.getElementById('statusbar');
let hoveredMesh = null, hoveredOrig = null;

function getAllMeshes() {
  const out = [];
  [step1_top, step1_bot, step2_combined, ...step3_pieces].forEach(g => {
    g.traverse(m => { if (m.isMesh) out.push(m); });
  });
  return out;
}

renderer.domElement.addEventListener('mousemove', (e) => {
  const W = window.innerWidth, H = window.innerHeight;
  const leftW = Math.floor(W / 2);
  let nx, ny;
  if (e.clientX < leftW) {
    nx = (e.clientX / leftW) * 2 - 1; ny = -(e.clientY / H) * 2 + 1;
  } else {
    nx = ((e.clientX - leftW) / (W - leftW)) * 2 - 1; ny = -(e.clientY / H) * 2 + 1;
  }
  mouse.set(nx, ny);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(getAllMeshes(), false);

  // Un-highlight
  if (hoveredMesh && hoveredMesh !== hits[0]?.object) {
    const mats = Array.isArray(hoveredMesh.material) ? hoveredMesh.material : [hoveredMesh.material];
    mats.forEach((m, i) => { if (hoveredOrig?.[i]) m.emissive?.copy(hoveredOrig[i]); });
    hoveredMesh = null; hoveredOrig = null;
  }

  if (hits.length > 0) {
    const hit = hits[0], mesh = hit.object;
    if (mesh !== hoveredMesh) {
      hoveredMesh = mesh;
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      hoveredOrig = mats.map(m => m.emissive ? m.emissive.clone() : new THREE.Color(0));
      mats.forEach(m => { if (m.emissive) m.emissive.set(0x333333); });
    }
    const geo = mesh.geometry;
    const tris = geo.index ? geo.index.count / 3 : 0;
    const verts = geo.attributes.position?.count || 0;
    const pt = hit.point;
    statusbar.innerHTML = [
      `<span class="label">tris</span> <span class="val">${tris}</span>`,
      `<span class="label">verts</span> <span class="val">${verts}</span>`,
      `<span class="label">hit</span> <span class="val">(${pt.x.toFixed(1)}, ${pt.y.toFixed(1)}, ${pt.z.toFixed(1)})</span>`,
      `<span class="label">face</span> <span class="val">${hit.faceIndex ?? '—'}</span>`,
    ].join('  ');
  } else {
    statusbar.innerHTML = '<span class="dim">hover a piece to inspect</span>';
  }
});

renderer.domElement.addEventListener('mouseleave', () => {
  if (hoveredMesh) {
    const mats = Array.isArray(hoveredMesh.material) ? hoveredMesh.material : [hoveredMesh.material];
    mats.forEach((m, i) => { if (hoveredOrig?.[i]) m.emissive?.copy(hoveredOrig[i]); });
    hoveredMesh = null; hoveredOrig = null;
  }
  statusbar.innerHTML = '<span class="dim">hover a piece to inspect</span>';
});

// ─── Render loop ───────────────────────────────────────────────────

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const W = window.innerWidth, H = window.innerHeight;
  renderer.setScissorTest(true);

  // ── Left: Step 1 (the diagonal cut, two halves + plane A) ──
  {
    step1_top.visible = true; step1_bot.visible = true;
    pvA.visible = true; pvB.visible = false;
    step2_combined.visible = false;
    step3_pieces.forEach(g => g.visible = false);

    const vw = Math.floor(W / 2);
    renderer.setViewport(0, 0, vw, H);
    renderer.setScissor(0, 0, vw, H);
    camera.aspect = vw / H;
    camera.updateProjectionMatrix();
    renderer.setClearColor(0x1c1917, 1); renderer.clear();
    renderer.render(scene, camera);
  }

  // ── Right: grid of step 2 (combined) + step 3 (recut pieces) ──
  const rW = Math.ceil(W / 2);
  const cW = Math.floor(rW / cols), cH = Math.floor(H / rows);

  for (let i = 0; i < nRight; i++) {
    const c = i % cols, r = Math.floor(i / cols);

    // Hide everything, show only this group
    step1_top.visible = false; step1_bot.visible = false;
    pvA.visible = false;
    step2_combined.visible = false;
    step3_pieces.forEach(g => g.visible = false);
    pvB.visible = false;

    if (i === 0) {
      // Combined view
      step2_combined.visible = true;
    } else {
      // Recut piece
      rightGroups[i - 1].visible = true;
      pvB.visible = true;
    }

    const vx = Math.floor(W / 2) + c * cW;
    const vy = H - (r + 1) * cH;
    renderer.setViewport(vx, vy, cW, cH);
    renderer.setScissor(vx, vy, cW, cH);
    camera.aspect = cW / cH;
    camera.updateProjectionMatrix();
    renderer.setClearColor(0x1a1816, 1); renderer.clear();
    renderer.render(scene, camera);
  }

  renderer.setScissorTest(false);
}
animate();

window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));
</script>
</body>
</html>
