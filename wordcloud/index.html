<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bitter:wght@400;700&family=DM+Sans:wght@400;700&family=Fira+Code:wght@400;700&family=Josefin+Sans:wght@400;700&family=Lora:wght@400;700&family=Merriweather:wght@400;700&family=Nunito:wght@400;700&family=Playfair+Display:wght@400;700&family=Raleway:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #0f0f23;
      color: #c9c9e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 24px;
      background: #16162e;
      border-bottom: 1px solid #2a2a4a;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e0e0f0;
      letter-spacing: 0.5px;
    }

    .controls {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .control-group > span.label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8888aa;
      margin-right: 2px;
    }

    select, button {
      background: #1e1e3a;
      color: #c9c9e0;
      border: 1px solid #3a3a5c;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    select:hover, button:hover {
      border-color: #5a5a8c;
      background: #24244a;
    }

    .font-picker {
      position: relative;
      display: inline-block;
    }
    .font-picker-btn {
      background: #1e1e3a;
      color: #c9c9e0;
      border: 1px solid #3a3a5c;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      min-width: 140px;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .font-picker-btn:hover { border-color: #5a5a8c; background: #24244a; }
    .font-picker-btn .arrow { color: #666; font-size: 10px; }
    .font-picker-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      background: #1e1e3a;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      padding: 4px 0;
      z-index: 100;
      min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .font-picker-menu.open { display: block; }
    .font-picker-item {
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
      color: #c9c9e0;
      transition: background 0.1s;
    }
    .font-picker-item:hover { background: #2a2a5a; }
    .font-picker-item.selected { color: #53d8fb; }

    .chip-group {
      display: flex;
      gap: 3px;
    }

    .chip {
      padding: 3px 9px;
      font-size: 11px;
      border-radius: 3px;
      border: 1px solid #3a3a5c;
      background: #1e1e3a;
      color: #8888aa;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .chip:hover { border-color: #5a5a8c; color: #c9c9e0; }
    .chip.active { background: #2a2a5a; border-color: #53d8fb; color: #e0e0f0; }

    .color-chip {
      display: flex;
      gap: 2px;
      align-items: center;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid #3a3a5c;
      background: #1e1e3a;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 11px;
      color: #8888aa;
    }
    .color-chip:hover { border-color: #5a5a8c; color: #c9c9e0; }
    .color-chip.active { background: #2a2a5a; border-color: #53d8fb; color: #e0e0f0; }
    .color-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .step-slider {
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
      height: 20px;
    }
    .step-slider .step-track {
      position: absolute;
      top: 50%;
      left: 6px;
      right: 6px;
      height: 2px;
      background: #3a3a5c;
      transform: translateY(-50%);
    }
    .step-slider .step-fill {
      position: absolute;
      top: 50%;
      left: 6px;
      height: 2px;
      background: #53d8fb;
      transform: translateY(-50%);
      transition: width 0.15s;
    }
    .step-slider .step-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #3a3a5c;
      background: #1e1e3a;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .step-slider .step-dot:hover {
      border-color: #5a5a8c;
    }
    .step-slider .step-dot.active {
      border-color: #53d8fb;
      background: #53d8fb;
    }
    .step-slider .step-dot.past {
      border-color: #53d8fb;
      background: #2a2a5a;
    }
    .step-slider .step-gap {
      width: 14px;
      flex-shrink: 0;
    }

    #regenerate-btn {
      background: none;
      border: 1px solid #3a3a5c;
      color: #8888aa;
      padding: 3px 10px;
      font-size: 11px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #regenerate-btn:hover { border-color: #53d8fb; color: #e0e0f0; }

    #cloud-container {
      flex: 1;
      min-height: 400px;
      background: #1a1a2e;
      position: relative;
    }

    footer {
      padding: 8px 24px;
      background: #16162e;
      border-top: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #666688;
      min-height: 36px;
    }

    #status { transition: color 0.3s; }
    #status.active { color: #53d8fb; }

    #description-bar {
      padding: 10px 24px;
      background: #12122a;
      border-top: 1px solid #2a2a4a;
      font-size: 12px;
      line-height: 1.5;
      color: #8888aa;
    }
    #desc-line1 { margin-bottom: 6px; }
    #desc-line1 .desc-title {
      color: #c9c9e0;
      font-weight: 600;
    }
    #desc-line2 {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #666688;
    }
    #desc-line2 .desc-metric { color: #53d8fb; }
    #desc-line2 .desc-extent { white-space: nowrap; }
    #desc-sparkline {
      flex: 1;
      height: 24px;
      min-width: 100px;
      max-width: 400px;
    }

    #text-input-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(15, 15, 35, 0.95);
      z-index: 10;
      padding: 40px;
      flex-direction: column;
      gap: 16px;
    }

    #text-input-overlay.visible { display: flex; }

    #text-input-overlay h2 {
      font-size: 14px;
      color: #8888aa;
      font-weight: 400;
    }

    #text-input {
      flex: 1;
      background: #1a1a2e;
      color: #c9c9e0;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      padding: 16px;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      line-height: 1.6;
    }

    #text-input:focus { outline: none; border-color: #53d8fb; }

    #text-input-overlay .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    #text-input-overlay button { padding: 8px 20px; }

    #generate-btn {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }
  </style>
</head>

      <div class="control-group">

  <!-- Layout Worker — placement only (rasterization happens on main thread for font access) -->
  <script id="layout-worker-source" type="text/js-worker">
'use strict';

let generation = 0;

onmessage = function (e) {
  if (e.data.cmd === 'start') {
    generation++;
    runLayout(e.data.sprites, e.data.config, generation);
  }
};

function runLayout(sprites, config, gen) {
  const startTime = performance.now();
  const { width, height } = config;

  const boardW = Math.ceil(width * 2);
  const boardH = Math.ceil(height * 2);
  const boardW32 = Math.ceil(boardW / 32);
  const board = new Uint32Array(boardW32 * boardH);

  const cx = Math.floor(boardW / 2);
  const cy = Math.floor(boardH / 2);
  const aspect = width / height;

  const bounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
  let placed = 0;
  let skipped = 0;
  const total = sprites.length;

  for (let si = 0; si < total; si++) {
    if (gen !== generation) return;

    const s = sprites[si];
    const pos = spiralPlace(s, board, boardW32, boardH, cx, cy, aspect);

    if (pos) {
      placeOnBoard(s.data, s.w32, s.h, pos.bx, pos.by, board, boardW32);

      const lx = pos.bx - cx;
      const ly = pos.by - cy;
      bounds.minX = Math.min(bounds.minX, lx);
      bounds.minY = Math.min(bounds.minY, ly);
      bounds.maxX = Math.max(bounds.maxX, lx + s.w);
      bounds.maxY = Math.max(bounds.maxY, ly + s.h);

      placed++;

      postMessage({
        cmd: 'wordPlaced',
        word: {
          text: s.text, x: lx, y: ly,
          fontSize: s.fontSize, rotation: s.rotation, color: s.color,
          spriteW: s.w, spriteH: s.h, textX: s.textX, textY: s.textY,
        },
        progress: { placed: placed, total: total },
      });
    } else {
      skipped++;
    }
  }

  postMessage({
    cmd: 'complete', bounds: bounds,
    stats: { timeMs: Math.round(performance.now() - startTime), placed: placed, skipped: skipped },
  });
}

function testPosition(spriteData, sw32, sh, bx, by, board, boardW32, boardH) {
  if (bx < 0 || by < 0 || by + sh > boardH) return false;

  const bitOffset = bx & 31;
  const wordOffset = bx >> 5;

  if (bx + sw32 * 32 > boardW32 * 32) return false;

  if (bitOffset === 0) {
    for (let y = 0; y < sh; y++) {
      const boardRow = (by + y) * boardW32;
      const spriteRow = y * sw32;
      for (let i = 0; i < sw32; i++) {
        if (spriteData[spriteRow + i] & board[boardRow + wordOffset + i]) return false;
      }
    }
  } else {
    const rShift = bitOffset;
    const lShift = 32 - bitOffset;
    for (let y = 0; y < sh; y++) {
      const boardRow = (by + y) * boardW32;
      const spriteRow = y * sw32;
      for (let i = 0; i < sw32; i++) {
        const bits = spriteData[spriteRow + i];
        if (bits === 0) continue;

        const bIdx = wordOffset + i;
        if ((bits >>> rShift) & board[boardRow + bIdx]) return false;
        if (bIdx + 1 < boardW32) {
          if ((bits << lShift) & board[boardRow + bIdx + 1]) return false;
        }
      }
    }
  }

  return true;
}

function placeOnBoard(spriteData, sw32, sh, bx, by, board, boardW32) {
  const bitOffset = bx & 31;
  const wordOffset = bx >> 5;

  if (bitOffset === 0) {
    for (let y = 0; y < sh; y++) {
      const boardRow = (by + y) * boardW32;
      const spriteRow = y * sw32;
      for (let i = 0; i < sw32; i++) {
        board[boardRow + wordOffset + i] |= spriteData[spriteRow + i];
      }
    }
  } else {
    const rShift = bitOffset;
    const lShift = 32 - bitOffset;
    for (let y = 0; y < sh; y++) {
      const boardRow = (by + y) * boardW32;
      const spriteRow = y * sw32;
      for (let i = 0; i < sw32; i++) {
        const bits = spriteData[spriteRow + i];
        if (bits === 0) continue;
        const bIdx = wordOffset + i;
        if (bIdx < boardW32) board[boardRow + bIdx] |= bits >>> rShift;
        if (bIdx + 1 < boardW32) board[boardRow + bIdx + 1] |= bits << lShift;
      }
    }
  }
}

function spiralPlace(sprite, board, boardW32, boardH, cx, cy, aspect) {
  const maxSteps = 50000;
  const dt = 0.05;
  const startAngle = Math.random() * Math.PI * 2;

  for (let t = 0; t < maxSteps; t++) {
    const theta = startAngle + dt * t;
    const r = dt * t * 0.5;
    const x = Math.round(cx + r * Math.cos(theta) * aspect - sprite.w / 2);
    const y = Math.round(cy + r * Math.sin(theta) - sprite.h / 2);

    if (testPosition(sprite.data, sprite.w32, sprite.h, x, y, board, boardW32, boardH)) {
      return { bx: x, by: y };
    }
  }

  return null;
}
  </script>

  <script>
    // --- WordCloud Class ---
    class WordCloud {
      static PALETTES = {
        vibrant: ['#e94560', '#53d8fb', '#f5a623', '#7ed957', '#bd93f9', '#ff79c6', '#f1fa8c', '#50fa7b'],
        sunset:  ['#ff6b6b', '#ee5a24', '#ffa502', '#ffd93d', '#e84393', '#fd79a8', '#fab1a0', '#fdcb6e'],
        ocean:   ['#74b9ff', '#a29bfe', '#81ecec', '#55efc4', '#0984e3', '#6c5ce7', '#00cec9', '#dfe6e9'],
        forest:  ['#00b894', '#55efc4', '#fdcb6e', '#e17055', '#00cec9', '#badc58', '#f9ca24', '#6ab04c'],
        neon:    ['#ff00ff', '#00ffff', '#ffff00', '#ff3366', '#33ff99', '#ff6600', '#9933ff', '#00ff66'],
        pastel:  ['#fab1a0', '#ffeaa7', '#81ecec', '#a29bfe', '#dfe6e9', '#55efc4', '#fdcb6e', '#fd79a8'],
        mono:    ['#ffffff', '#e0e0e0', '#c0c0c0', '#a0a0a0', '#d0d0d0', '#b8b8b8', '#f0f0f0', '#cccccc'],
      };

      constructor(container, options = {}) {
        this.container = container;
        this.options = {
          fontFamily: 'DM Sans, sans-serif',
          minFontSize: 12,
          maxFontSize: null,
          scaling: 'sqrt',
          colorScheme: 'vibrant',
          rotationProbability: 0.3,
          padding: 4,
          dynamicSpacing: false,
          maxWords: 300,
          backgroundColor: '#1a1a2e',
          ...options,
        };

        this._listeners = {};
        this._placedWords = [];
        this._worker = null;
        this._animationFrame = null;
        this._dirty = false;
        this._layoutComplete = false;

        // Zoom state: current (rendered) and target (computed from bounds)
        this._zoom = { scale: 1, tx: 0, ty: 0 };
        this._zoomTarget = { scale: 1, tx: 0, ty: 0 };
        this._bounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };

        this._setupCanvas();
      }

      _setupCanvas() {
        this.canvas = document.createElement('canvas');
        this.canvas.style.width = '100%';
        this.canvas.style.height = '100%';
        this.canvas.style.display = 'block';
        this.container.appendChild(this.canvas);
        this.ctx = this.canvas.getContext('2d');
        this._resize();

        this._resizeObserver = new ResizeObserver(() => {

      _resize() {

        this._width = rect.width;
        this._height = rect.height;
        this.canvas.width = rect.width * dpr;
        this.canvas.height = rect.height * dpr;

      _createWorker() {
        const source = document.getElementById('layout-worker-source').textContent;
        const blob = new Blob([source], { type: 'application/javascript' });

      async render(words) {

        if (!words || words.length === 0) return;

        // Wait for Google Fonts to be fully loaded before measuring
        await document.fonts.ready;

        words = words
          .slice()
          .sort((a, b) => b.value - a.value)
          .slice(0, this.options.maxWords);

        const palette = this._getPalette();
        const maxFontSize = this.options.maxFontSize || Math.round(this._height * 0.18);
        const { minFontSize, scaling, rotationProbability, padding, fontFamily, dynamicSpacing } = this.options;
        const maxValue = words[0].value;
        const sprites = [];

        for (let i = 0; i < words.length; i++) {
          const w = words[i];
          const norm = w.value / maxValue;
          let scaled;
          if (scaling === 'log') {
            scaled = Math.log(w.value + 1) / Math.log(maxValue + 1);
          } else if (scaling === 'linear') {
            scaled = norm;
          } else {
            scaled = Math.sqrt(norm);
          }
          const fontSize = Math.round(minFontSize + (maxFontSize - minFontSize) * scaled);
          const rotation = (i === 0) ? 0 : (Math.random() < rotationProbability ? Math.PI / 2 : 0);
          const color = typeof palette === 'function' ? palette(w, i) : palette[i % palette.length];

          // Dynamic spacing: scale padding proportionally with font size
          const effectivePadding = dynamicSpacing
            ? Math.round(padding * (0.3 + 0.7 * fontSize / maxFontSize))
            : padding;

          const sprite = this._rasterizeWord(w.text, fontSize, fontFamily, rotation, effectivePadding);
          if (sprite) {
            sprites.push({ ...sprite, text: w.text, fontSize, rotation, color });

        this._worker = this._createWorker();
        this._worker.onmessage = (e) => this._handleWorkerMessage(e);
        this._worker.onerror = (e) => console.error('Layout worker error:', e);

          cmd: 'start',
          sprites,
          config: { width: this._width, height: this._height },

        this.ctx.fillStyle = this.options.backgroundColor;
        this.ctx.fillRect(0, 0, this._width, this._height);

      _rasterizeWord(text, fontSize, fontFamily, rotation, padding) {
        const font = `${fontSize}px ${fontFamily}`;

        // Measure and draw on the SAME OffscreenCanvas to guarantee
        // metrics and rendering agree exactly (no cross-context hinting differences).
        // Step 1: create an oversized canvas, measure on it
        const probe = new OffscreenCanvas(fontSize * text.length + padding * 4, fontSize * 3 + padding * 4);
        const pctx = probe.getContext('2d');
        pctx.font = font;
        pctx.textBaseline = 'alphabetic';
        const metrics = pctx.measureText(text);

        const textW = Math.ceil(metrics.actualBoundingBoxLeft + metrics.actualBoundingBoxRight);
        const textH = Math.ceil(metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent);
        if (textW <= 0 || textH <= 0) return null;

        // Step 2: create correctly-sized canvas and draw
        const natW = textW + padding * 4;  // extra room for stroke
        const natH = textH + padding * 4;
        const natTextX = metrics.actualBoundingBoxLeft + padding * 2;
        const natTextY = metrics.actualBoundingBoxAscent + padding * 2;

        const spriteW = rotation !== 0 ? natH : natW;
        const spriteH = rotation !== 0 ? natW : natH;

        const canvas = new OffscreenCanvas(spriteW, spriteH);
        const ctx = canvas.getContext('2d');
        ctx.font = font;
        ctx.textBaseline = 'alphabetic';

        let textX, textY;
        if (rotation !== 0) {
          ctx.translate(spriteW / 2, spriteH / 2);
          ctx.rotate(Math.PI / 2);
          textX = -natW / 2 + natTextX;
          textY = -natH / 2 + natTextY;
        } else {
          textX = natTextX;
          textY = natTextY;
        }

        // Stroke creates a buffer zone the collision bitmap respects as padding
        if (padding > 0) {
          ctx.strokeStyle = '#000';
          ctx.lineWidth = padding * 2;
          ctx.lineJoin = 'round';
          ctx.strokeText(text, textX, textY);
        }
        ctx.fillStyle = '#000';
        ctx.fillText(text, textX, textY);

        // Pack pixels into bitmap
        const imageData = ctx.getImageData(0, 0, spriteW, spriteH);
        const pixels = imageData.data;
        const w32 = Math.ceil(spriteW / 32);
        const packed = new Uint32Array(w32 * spriteH);

        for (let y = 0; y < spriteH; y++) {
          for (let x = 0; x < spriteW; x++) {
            if (pixels[(y * spriteW + x) * 4 + 3] > 32) {
              packed[y * w32 + (x >> 5)] |= 1 << (31 - (x & 31));
            }
          }
        }

        return { data: packed, w: spriteW, h: spriteH, w32, textX, textY };
      }

        this._layoutComplete = false;
        this._zoom = { scale: 1, tx: 0, ty: 0 };

        this._bounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };

        if (this.ctx) {
          this.ctx.fillStyle = this.options.backgroundColor;
          this.ctx.fillRect(0, 0, this._width, this._height);
        }
      }

        if (!this._listeners[event]) this._listeners[event] = [];
        this._listeners[event].push(callback);

      off(event, callback) {
        if (!this._listeners[event]) return;
        this._listeners[event] = this._listeners[event].filter((cb) => cb !== callback);

      _emit(event, data) {
        if (this._listeners[event]) {

      _getPalette() {
        const scheme = this.options.colorScheme;
        if (typeof scheme === 'function') return scheme;
        return WordCloud.PALETTES[scheme] || WordCloud.PALETTES.vibrant;

      _handleWorkerMessage(e) {
        const { cmd } = e.data;
        if (cmd === 'wordPlaced') {
          const { word, progress } = e.data;
          this._placedWords.push(word);

          // Update running bounds
          const b = this._bounds;
          b.minX = Math.min(b.minX, word.x);
          b.minY = Math.min(b.minY, word.y);
          b.maxX = Math.max(b.maxX, word.x + word.spriteW);
          b.maxY = Math.max(b.maxY, word.y + word.spriteH);

          // Recompute target zoom from current bounds
          this._updateZoomTarget();
          this._dirty = true;

          this._emit('wordPlaced', { word, progress });
        } else if (cmd === 'complete') {
          this._layoutComplete = true;
          this._emit('complete', e.data);
        }

      _updateZoomTarget() {
        const b = this._bounds;
        if (!isFinite(b.minX)) return;

        const cloudW = b.maxX - b.minX;
        const cloudH = b.maxY - b.minY;
        if (cloudW <= 0 || cloudH <= 0) return;

        const margin = 0.05;
        const availW = this._width * (1 - margin * 2);
        const availH = this._height * (1 - margin * 2);
        const scale = Math.min(availW / cloudW, availH / cloudH);

        const cloudCX = this._width / 2 + (b.minX + b.maxX) / 2;
        const cloudCY = this._height / 2 + (b.minY + b.maxY) / 2;

        this._zoomTarget = {
          scale,
          tx: this._width / 2 - cloudCX * scale,
          ty: this._height / 2 - cloudCY * scale,
        };
      }

      _startRenderLoop() {
        const LERP_SPEED = 0.12; // how fast current zoom catches up to target
        const EPSILON = 0.5; // pixel threshold to consider zoom "settled"

        const draw = () => {
          // Interpolate current zoom toward target
          const z = this._zoom;
          const zt = this._zoomTarget;

          const dScale = zt.scale - z.scale;
          const dTx = zt.tx - z.tx;
          const dTy = zt.ty - z.ty;
          const moving = Math.abs(dScale * this._width) > EPSILON
                      || Math.abs(dTx) > EPSILON
                      || Math.abs(dTy) > EPSILON;

          if (moving) {
            z.scale += dScale * LERP_SPEED;
            z.tx += dTx * LERP_SPEED;
            z.ty += dTy * LERP_SPEED;
            this._dirty = true;
          } else if (this._dirty) {
            // Snap to target on last frame
            z.scale = zt.scale;
            z.tx = zt.tx;
            z.ty = zt.ty;
          }

          if (this._dirty) {
            this._redrawAll();
            this._dirty = false;
          }

          this._animationFrame = requestAnimationFrame(draw);
        };

      _drawWord(word) {
        const ctx = this.ctx;
        const z = this._zoom;

        ctx.save();
        ctx.translate(z.tx, z.ty);
        ctx.scale(z.scale, z.scale);

        const sx = this._width / 2 + word.x;
        const sy = this._height / 2 + word.y;

        ctx.font = `${word.fontSize}px ${this.options.fontFamily}`;
        ctx.fillStyle = word.color;
        ctx.textBaseline = 'alphabetic';

        if (word.rotation !== 0) {
          ctx.translate(sx + word.spriteW / 2, sy + word.spriteH / 2);
          ctx.rotate(word.rotation);
          ctx.fillText(word.text, word.textX, word.textY);
        } else {
          ctx.fillText(word.text, sx + word.textX, sy + word.textY);
        }

        ctx.restore();
      }

      _redrawAll() {
        this.ctx.fillStyle = this.options.backgroundColor;
        this.ctx.fillRect(0, 0, this._width, this._height);
        for (const word of this._placedWords) {
          this._drawWord(word);
        }
      }

      _handleClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;
        const z = this._zoom;

        for (let i = this._placedWords.length - 1; i >= 0; i--) {
          const word = this._placedWords[i];
          const wx = z.tx + (this._width / 2 + word.x) * z.scale;
          const wy = z.ty + (this._height / 2 + word.y) * z.scale;
          const ww = word.spriteW * z.scale;
          const wh = word.spriteH * z.scale;

          if (clickX >= wx && clickX <= wx + ww && clickY >= wy && clickY <= wy + wh) {
            this._emit('click', { word, event: e });
            return;
          }
        }
      }

    function textToWords(text) {
      const counts = {};
      const tokens = text.toLowerCase().replace(/[^a-záéíóúüñàèìòùâêîôûäëïöü'-]/gi, ' ').split(/\s+/);
      for (const token of tokens) {
        const word = token.replace(/^['-]+|['-]+$/g, '');
        if (word.length < 2 || STOP_WORDS.has(word)) continue;
        counts[word] = (counts[word] || 0) + 1;
      }
      return Object.entries(counts)
        .map(([text, value]) => ({ text, value }))
        .sort((a, b) => b.value - a.value);
    }

    // Padding step slider
    const paddingSlider = document.getElementById('padding-slider');
    const paddingDots = paddingSlider.querySelectorAll('.step-dot');
    const paddingFill = paddingSlider.querySelector('.step-fill');

    function updatePaddingSlider() {
      let found = false;
      const dots = [...paddingDots];
      const activeIdx = dots.findIndex(d => d.classList.contains('active'));
      // Compute fill width: from first dot center to active dot center
      if (activeIdx >= 0 && dots.length > 1) {
        const sliderRect = paddingSlider.getBoundingClientRect();
        const firstRect = dots[0].getBoundingClientRect();
        const activeRect = dots[activeIdx].getBoundingClientRect();
        const start = firstRect.left + firstRect.width / 2 - sliderRect.left;
        const end = activeRect.left + activeRect.width / 2 - sliderRect.left;
        paddingFill.style.left = start + 'px';
        paddingFill.style.width = (end - start) + 'px';
      }
      dots.forEach((d, i) => {
        if (i < activeIdx) { d.className = 'step-dot past'; }
        else if (i === activeIdx) { d.className = 'step-dot active'; }
        else { d.className = 'step-dot'; }
      });
    }

    paddingSlider.addEventListener('click', (e) => {
      const dot = e.target.closest('.step-dot');
      if (!dot) return;
      paddingDots.forEach(d => d.classList.remove('active', 'past'));
      dot.classList.add('active');
      updatePaddingSlider();
      renderDataset(datasetSelect.value);
    });

    function getPaddingValue() {
      const active = paddingSlider.querySelector('.step-dot.active');
      return active ? parseInt(active.dataset.value) : 4;

    function createCloud() {
      if (wc) wc.destroy();

      wc = new WordCloud(container, {
        fontFamily: selectedFont,
        scaling: getChipValue('scaling-chips'),
        colorScheme: getChipValue('color-chips'),
        rotationProbability: parseFloat(getChipValue('rotation-chips')),
        padding: getPaddingValue(),
        dynamicSpacing: dynamicBtn.classList.contains('active'),
        backgroundColor: '#1a1a2e',
      });

      wc.on('wordPlaced', ({ progress }) => {
        statusEl.textContent = `Placing word ${progress.placed} of ${progress.total}...`;
        statusEl.className = 'active';
      });

      wc.on('complete', ({ stats }) => {
        statusEl.textContent = 'Layout complete';
        statusEl.className = '';
        statsEl.textContent = `${stats.placed} words placed in ${(stats.timeMs / 1000).toFixed(1)}s` +
          (stats.skipped > 0 ? ` (${stats.skipped} skipped)` : '');
      });

      wc.on('click', ({ word }) => {
        statusEl.textContent = `${word.text}`;
        statusEl.className = '';
      });
    }

      constitution: { title: 'US Constitution', desc: 'Content word frequencies across the full text of the US Constitution', metric: 'occurrences', unit: '' },
      declaration: { title: 'Declaration of Independence', desc: 'Content word frequencies in the Declaration of Independence', metric: 'occurrences', unit: '' },
      gettysburg: { title: 'Gettysburg Address', desc: 'Every content word in Lincoln\'s 271-word address', metric: 'occurrences', unit: '' },
      beatles: { title: 'Beatles Lyrics', desc: 'Most frequently used words across all Beatles songs', metric: 'occurrences', unit: '' },
      shakespeare: { title: "Shakespeare's Inventions", desc: 'Words Shakespeare coined, sized by how common they are in modern English', metric: 'modern usage frequency', unit: '' },
      phobias: { title: 'Phobia Prevalence', desc: 'Named phobias sized by the percentage of the population affected', metric: '% of population', unit: '%' },
      elements: { title: 'Elements by Abundance', desc: 'Chemical elements sized by their abundance in Earth\'s crust', metric: 'ppm', unit: ' ppm' },
      spices: { title: 'Spices by Production', desc: 'Spices and herbs sized by annual global production volume', metric: 'metric tons/year', unit: ' t' },
      cognitive_biases: { title: 'Cognitive Biases', desc: 'Named cognitive biases sized by research citation count (thousands)', metric: 'citations (K)', unit: 'K' },
      fallacies: { title: 'Logical Fallacies', desc: 'Named logical fallacies sized by monthly Google search volume (thousands)', metric: 'searches/mo (K)', unit: 'K' },
      french_culinary: { title: 'French Culinary Terms', desc: 'French cooking terms used in English, sized by recipe frequency', metric: 'relative frequency', unit: '' },
      hiphop: { title: 'Hip-Hop Vocabulary', desc: 'Words distinctively used in rap lyrics vs. other genres', metric: 'distinctiveness score', unit: '' },
      dreams: { title: 'Common Dreams', desc: 'Dream themes sized by the percentage of people who report them', metric: '% of dreamers', unit: '%' },
      loanwords: { title: 'English Loanwords', desc: 'English words borrowed from other languages, sized by modern usage frequency', metric: 'usage frequency', unit: '' },
      emotions: { title: 'Emotion Words', desc: 'Words for emotions sized by how often English speakers use them', metric: 'corpus frequency', unit: '' },
      programming: { title: 'Programming Keywords', desc: 'Reserved keywords across languages, sized by GitHub code frequency', metric: 'relative frequency', unit: '' },
    };

    const descLine1 = document.getElementById('desc-line1');
    const descExtents = document.getElementById('desc-extents');
    const sparkCanvas = document.getElementById('desc-sparkline');

    function fmt(v, unit) {
      if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M' + unit;
      if (v >= 1000) return (v / 1000).toFixed(1) + 'K' + unit;
      if (v < 0.01) return v.toExponential(1) + unit;
      if (v < 1) return v.toFixed(2) + unit;
      return v.toLocaleString() + unit;
    }

    function drawSparkline(values) {
      const dpr = window.devicePixelRatio || 1;
      const rect = sparkCanvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      sparkCanvas.width = w * dpr;
      sparkCanvas.height = h * dpr;
      const ctx = sparkCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      if (values.length === 0) return;

      const max = values[0];
      const barW = Math.max(1, (w - 2) / values.length);
      const pad = 2;

      // Draw bars
      ctx.fillStyle = '#2a2a5a';
      ctx.fillRect(0, 0, w, h);

      for (let i = 0; i < values.length; i++) {
        const norm = values[i] / max;
        const barH = Math.max(1, norm * (h - pad * 2));
        const x = i * barW;
        const y = h - pad - barH;

        // Color gradient: bright for high values, dim for low
        const t = norm;
        const r = Math.round(83 + t * (233 - 83));
        const g = Math.round(136 + t * (69 - 136));
        const b = Math.round(251 + t * (96 - 251));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x, y, Math.max(1, barW - 0.5), barH);
      }
    }

    function updateDescription(id) {
      const meta = DATASET_META[id];
      if (!meta) {
        descLine1.innerHTML = '';
        descExtents.innerHTML = '';
        return;
      }
      const data = DATASETS[id];
      if (!data || data.length === 0) return;

      const sorted = data.slice().sort((a, b) => b.value - a.value);
      const max = sorted[0];
      const min = sorted[sorted.length - 1];

      descLine1.innerHTML =
        `<span class="desc-title">${meta.title}</span> · ${meta.desc} · ${data.length} words`;

      descExtents.innerHTML =
        `<span class="desc-metric">${meta.metric}</span>: ` +
        `${max.text} (${fmt(max.value, meta.unit)}) → ${min.text} (${fmt(min.value, meta.unit)})`;

      drawSparkline(sorted.map(d => d.value));
    }

    // Datasets that need log scaling due to extreme value ranges
    const LOG_DATASETS = new Set(['elements', 'spices']);

    let userChangedScaling = false;

    function renderDataset(id) {
      // Auto-switch scaling for extreme-range datasets, but only if user didn't manually choose
      if (!userChangedScaling) {
        if (LOG_DATASETS.has(id)) {
          setChipValue('scaling-chips', 'log');
        } else {
          setChipValue('scaling-chips', 'linear');
        }
      }

      if (id === 'custom') {
        if (customWords) {
          createCloud();
          wc.render(customWords);
        } else {
          textOverlay.classList.add('visible');
        }
        return;
      }

      textOverlay.classList.remove('visible');
      updateDescription(id);
      createCloud();
      wc.render(DATASETS[id]);
    }

    datasetSelect.addEventListener('change', () => { userChangedScaling = false; renderDataset(datasetSelect.value); });
    // (font picker events handled above)
    regenerateBtn.addEventListener('click', () => renderDataset(datasetSelect.value));

    cancelBtn.addEventListener('click', () => {
      textOverlay.classList.remove('visible');
      datasetSelect.value = 'lovecraft';
      renderDataset('lovecraft');
    });

    generateBtn.addEventListener('click', () => {
      const text = textInput.value.trim();
      if (!text) return;
      customWords = textToWords(text);
      textOverlay.classList.remove('visible');
      descLine1.innerHTML = `<span class="desc-title">Your Text</span> · Word frequencies from pasted text · ${customWords.length} unique words`;
      if (customWords.length > 0) {
        const cSorted = customWords.slice().sort((a, b) => b.value - a.value);
        descExtents.innerHTML = `<span class="desc-metric">occurrences</span>: ${cSorted[0].text} (${cSorted[0].value}) → ${cSorted[cSorted.length-1].text} (${cSorted[cSorted.length-1].value})`;
        drawSparkline(cSorted.map(d => d.value));
      }
      createCloud();
      wc.render(customWords);
    });

    // Randomize dataset, font, and color scheme on page load
    const datasetKeys = Object.keys(DATASETS);
    datasetSelect.value = datasetKeys[Math.floor(Math.random() * datasetKeys.length)];

    const fontItemsArr = [...fontItems];
    const randomFontItem = fontItemsArr[Math.floor(Math.random() * fontItemsArr.length)];
    fontItems.forEach(i => i.classList.remove('selected'));
    randomFontItem.classList.add('selected');
    selectedFont = randomFontItem.dataset.value;
    fontPickerLabel.textContent = randomFontItem.textContent;
    fontPickerBtn.style.fontFamily = randomFontItem.style.fontFamily;

    const colorChips = [...document.querySelectorAll('#color-chips .color-chip')];
    colorChips.forEach(c => c.classList.remove('active'));
    colorChips[Math.floor(Math.random() * colorChips.length)].classList.add('active');

    updatePaddingSlider();
    renderDataset(datasetSelect.value);
  </script>
</body>
